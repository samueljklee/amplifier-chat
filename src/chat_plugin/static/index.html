    const turnTokensRef = useRef(null);
    const placeholderIdRef = useRef(null);
    const historySyncInFlightRef = useRef(false);
    const transcriptFetchAbortRef = useRef(null);
    const diskRefreshInFlightRef = useRef(new Set());
    const autoDiskRefreshAtRef = useRef({});

    // — Message queue —
    // Map<sessionKey, Array<{ id: string, content: string, images: string[], queuedAt: number }>>
    const msgQueueRef = useRef(new Map());
    // Re-render trigger — bump this counter whenever the queue changes
    const [queueVersion, setQueueVersion] = useState(0);
    // Map<sessionKey, 'idle' | 'countdown' | 'paused'>
    const queueDrainStateRef = useRef(new Map());
    // Active setTimeout ID for the countdown
    const countdownTimerRef = useRef(null);
    // Seconds remaining in the active countdown (drives UI); null when inactive
    const [countdownRemaining, setCountdownRemaining] = useState(null);

    // — Sub-session rendering —
    const subSessionsRef = useRef(new Map());
    const subBlockMapRef = useRef(new Map());
    const subNextIndexRef = useRef(new Map());
    const [subSessionRevision, setSubSessionRevision] = useState(0);
    const subSessionRafRef = useRef(null);

    function resetSubSessionState() {
      subSessionsRef.current = new Map();
      subBlockMapRef.current = new Map();
      subNextIndexRef.current = new Map();
      childToToolRef.current = {};
      childAgentRef.current = {};
      if (subSessionRafRef.current) { cancelAnimationFrame(subSessionRafRef.current); subSessionRafRef.current = null; }
    }

    // — Message queue helpers —
    function getQueue(key) {
      return msgQueueRef.current.get(key || activeKeyRef.current) || [];
    }

    function pushToQueue(content, images) {
      const key = activeKeyRef.current;
      if (!key) return;
      const queue = msgQueueRef.current.get(key) || [];
      queue.push({ id: makeId(), content, images: images || [], queuedAt: Date.now() });
      msgQueueRef.current.set(key, queue);
      setQueueVersion(v => v + 1);
    }

    function removeFromQueue(msgId, sessionKey) {
      const key = sessionKey || activeKeyRef.current;
      if (!key) return;
      const queue = (msgQueueRef.current.get(key) || []).filter(m => m.id !== msgId);
      if (queue.length === 0) {
        msgQueueRef.current.delete(key);
      } else {
        msgQueueRef.current.set(key, queue);
      }
      setQueueVersion(v => v + 1);
    }

    function prependToQueue(msg, sessionKey) {
      const key = sessionKey || activeKeyRef.current;
      if (!key) return;
      const queue = msgQueueRef.current.get(key) || [];
      queue.unshift(msg);
      msgQueueRef.current.set(key, queue);
      setQueueVersion(v => v + 1);
    }

    function clearSessionQueue(key) {
      msgQueueRef.current.delete(key || activeKeyRef.current);
      queueDrainStateRef.current.delete(key || activeKeyRef.current);
      setQueueVersion(v => v + 1);
    }

    function getQueueDrainState(key) {
      return queueDrainStateRef.current.get(key || activeKeyRef.current) || 'idle';
    }

    function setQueueDrainStateFn(state, key) {
      queueDrainStateRef.current.set(key || activeKeyRef.current, state);
      // Force re-render so QueuePanel picks up the new state
      setQueueVersion(v => v + 1);
    }

    function cancelCountdown(sessionKey) {
      const hadActiveTimer = !!countdownTimerRef.current;
      if (countdownTimerRef.current) {
        clearTimeout(countdownTimerRef.current);
        countdownTimerRef.current = null;
      }
      setCountdownRemaining(null);
      // Only reset drain state when actually cancelling an active countdown
      // (not when startCountdown calls us to clear before starting a new one)
      if (hadActiveTimer) {
        const key = sessionKey || activeKeyRef.current;
        if (key && getQueueDrainState(key) === 'countdown') {
          setQueueDrainStateFn('idle', key);
        }
      }
    }

    function startCountdown(callback) {
      cancelCountdown(); // clear any existing countdown
      let remaining = 5;
      setCountdownRemaining(remaining);
      const tick = () => {
        remaining -= 1;
        if (remaining <= 0) {
          countdownTimerRef.current = null;
          setCountdownRemaining(null);
          callback();
        } else {
          setCountdownRemaining(remaining);
          countdownTimerRef.current = setTimeout(tick, 1000);
        }
      };
      countdownTimerRef.current = setTimeout(tick, 1000);
    }

    function tryDrainQueue() {
      const key = activeKeyRef.current;
      if (!key) return;
      if (executingRef.current) return;
      const queue = getQueue(key);
      const drainState = getQueueDrainState(key);
      if (queue.length === 0 || drainState === 'paused' || drainState === 'countdown') {
        if (drainState !== 'paused') setQueueDrainStateFn('idle', key);
        return;
      }
      setQueueDrainStateFn('countdown', key);
      startCountdown(() => {
        // Guard: session switched away or execution started while counting down
        if (executingRef.current || activeKeyRef.current !== key) {
          setQueueDrainStateFn('idle', key);
          return;
        }
        // Pop the first item and send it
        const q = getQueue(key);
        if (q.length === 0) {
          setQueueDrainStateFn('idle', key);
          return;
        }
        const nextMsg = q[0];
        removeFromQueue(nextMsg.id, key);
        setQueueDrainStateFn('idle', key);
        // sendMessage may fail — if so, re-push the item to front of queue
        try {
          sendMessage(nextMsg.content, nextMsg.images || []);
        } catch (err) {
          console.error('[queue] sendMessage failed for queued item, re-queuing', err);
          prependToQueue(nextMsg, key);
        }
      });
    }

    function resumeQueue() {
      const key = activeKeyRef.current;
      if (!key) return;
      const drainState = getQueueDrainState(key);
      if (drainState !== 'paused') return;
      setQueueDrainStateFn('idle', key);
      tryDrainQueue();
    }

    useEffect(() => {
      activeKeyRef.current = activeKey;
    }, [activeKey]);

    useEffect(() => {
      chronoItemsRef.current = chronoItems;
    }, [chronoItems]);

    useEffect(() => {
      sessionsRef.current = sessions;
    }, [sessions]);

    useEffect(() => {
      turnCountRef.current = turnCount;
    }, [turnCount]);

    useEffect(() => { executingRef.current = executing; }, [executing]);

    useEffect(() => {
      defaultCwdRef.current = defaultCwd;
    }, [defaultCwd]);

    // Fetch default CWD from distro settings (if distro plugin is present).
    useEffect(() => {
      fetch(`${API_BASE}/chat/api/config`)
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.default_cwd && data.default_cwd !== '~') {
            setDefaultCwd(data.default_cwd);
            defaultCwdRef.current = data.default_cwd;
          }
        })
        .catch(() => {});
    }, []);

    useEffect(() => {
      return () => {
        if (transcriptFetchAbortRef.current) {
          try { transcriptFetchAbortRef.current.abort(); } catch {}
          transcriptFetchAbortRef.current = null;
        }
      };
    }, []);

    useEffect(() => {
      document.body.setAttribute('data-theme', theme);
      try {
        localStorage.setItem('chat-theme', theme);
      } catch {}
    }, [theme]);

    // Persist view mode preference
    useEffect(() => {
      try { localStorage.setItem('chat-view-mode', viewMode); } catch {}
    }, [viewMode]);

    // Mount shared feedback widget into header slot (once)
    useEffect(() => {
      const slot = feedbackSlotRef.current;
      if (!slot || slot.childElementCount > 0) return;
      if (window.AmplifierFeedback) {
        window.AmplifierFeedback.init({
          mode: 'header',
          container: slot,
          context: { app: 'chat' },
          getSessionId: function() { return sessionIdRef.current; },
        });
      }
    }, []);

    useEffect(() => {
      const onMouseMove = (e) => {
        const drag = dragStateRef.current;
        if (!drag) return;
        const dx = e.clientX - drag.startX;
        const vw = window.innerWidth;

        if (drag.pane === 'sessions') {
          const min = 180;
          const actSpace = (viewMode === 'workspace' && showActivity)
            ? activityPanelWidth + 6 : 0;
          const budgetMax = vw - 6 - MIN_CHAT_WIDTH - actSpace;
          const max = Math.max(min, Math.min(560, budgetMax));
          const next = Math.max(min, Math.min(max, drag.startWidth + dx));
          setSessionPanelWidth(next);
          return;
        }
        if (drag.pane === 'activity') {
          const min = 280;
          const sessSpace = showSessions ? sessionPanelWidth + 6 : 0;
          const budgetMax = vw - sessSpace - 6 - MIN_CHAT_WIDTH;
          const max = Math.max(min, Math.min(900, budgetMax));
          const next = Math.max(min, Math.min(max, drag.startWidth - dx));
          setActivityPanelWidth(next);
        }
      };

      const onMouseUp = () => {
        if (!dragStateRef.current) return;
        dragStateRef.current = null;
        setDraggingPane(null);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      };

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      return () => {
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      };
    }, []);

    // Auto-collapse activity panel when viewport shrinks below AUTO_COLLAPSE_BP
    useEffect(() => {
      if (viewMode !== 'workspace') return;
      const onResize = () => {
        const vw = window.innerWidth;
        if (vw <= 768) return;
        if (vw < AUTO_COLLAPSE_BP && showActivity) {
          setShowActivity(false);
          activityAutoCollapsedRef.current = true;
        } else if (vw >= AUTO_COLLAPSE_BP && !showActivity && activityAutoCollapsedRef.current) {
          setShowActivity(true);
          activityAutoCollapsedRef.current = false;
        }
      };
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, [viewMode, showActivity]);

    // When entering workspace mode, decide initial activity panel state
    useEffect(() => {
      if (viewMode === 'workspace') {
        const vw = window.innerWidth;
        if (vw <= 768) return;
        if (vw < AUTO_COLLAPSE_BP) {
          setShowActivity(false);
          activityAutoCollapsedRef.current = true;
        } else {
          setShowActivity(true);
          activityAutoCollapsedRef.current = false;
        }
      }
    }, [viewMode]);

    useEffect(() => {
      if (!activeKey) return;
      const active = sessions.get(activeKey);
      if (!active) return;
      const isDraft =
        active.source !== 'history'
        && (active.turnCount || 0) === 0;
      if (!isDraft) {
        if (draftCwdSyncKeyRef.current === activeKey) {
          draftCwdSyncKeyRef.current = null;
        }
        return;
      }
      if (draftCwdSyncKeyRef.current === activeKey) return;
      const nextCwd = active.cwd || cwd || '~';
      draftCwdSyncKeyRef.current = activeKey;
      defaultCwdRef.current = nextCwd;
      setDefaultCwd(nextCwd);
    }, [activeKey, sessions, cwd]);

    useEffect(() => {
      if (!mobileSidebarOpen) return;
      const onKeyDown = (e) => {
        if (e.key === 'Escape') {
          setMobileSidebarOpen(false);
        }
      };
      window.addEventListener('keydown', onKeyDown);
      return () => {
        window.removeEventListener('keydown', onKeyDown);
      };
    }, [mobileSidebarOpen]);

    // —— Global Escape-to-focus-input shortcut ——————————————————————
    // Pressing Escape from anywhere on the page focuses the message textarea,
    // so the user can start typing immediately without tabbing through the UI.
    useEffect(() => {
      const onEscFocus = (e) => {
        if (e.key !== 'Escape') return;
        // Don't steal Escape from open modals, slash menu, or the mobile sidebar
        if (mobileSidebarOpen) return;
        const ta = document.getElementById('message-input');
        if (!ta) return;
        // If the textarea already has focus, let Escape do its default thing
        if (document.activeElement === ta) return;
        e.preventDefault();
        ta.focus();
      };
      window.addEventListener('keydown', onEscFocus);
      return () => window.removeEventListener('keydown', onEscFocus);
    }, [mobileSidebarOpen]);

    // —— Index mapping ————————————————————————————————————————————
    function getLocalIndex(serverIndex) {
      const key = `${cycleRef.current}-${serverIndex}`;
      if (!(key in blockMapRef.current)) {
        blockMapRef.current[key] = localIndexRef.current++;
      }
      return blockMapRef.current[key];
    }

    function getRequestedCwd() {
      return (defaultCwdRef.current || '').trim() || '~';
    }

    function nextOrder(items) {
      if (!Array.isArray(items) || items.length === 0) return 0;
      let maxOrder = -1;
      for (const item of items) {
        const order = Number(item?.order);
        if (Number.isFinite(order) && order > maxOrder) {
          maxOrder = order;
        }
      }
      return maxOrder + 1;
    }

    const applySessionForkLineage = useCallback((msg) => {
      const childId = normalizeSessionParentId(msg && msg.child_id);
      const parentId = normalizeSessionParentId(msg && msg.parent_id);
      const childAgent = typeof msg?.agent === 'string' && msg.agent ? msg.agent : null;

      if (childId && childAgent) {
        childAgentRef.current[childId] = childAgent;
      }
      if (childId && parentId) {
        sessionParentByIdRef.current[childId] = parentId;
      }
      if (!childId) return;

      setSessions(prev => {
        let changed = false;
        const next = new Map(prev);
        for (const [key, session] of next.entries()) {
          if (!session || session.sessionId !== childId) continue;
          const nextParent = parentId || session.parentSessionId || null;
          const nextAgent = childAgent || session.spawnAgent || null;
          if (nextParent === session.parentSessionId && nextAgent === session.spawnAgent) {
            continue;
          }
          next.set(key, {
            ...session,
            parentSessionId: nextParent,
            spawnAgent: nextAgent,
          });
          changed = true;
        }
        return changed ? next : prev;
      });
    }, []);

    // — Sub-session helpers —
    function bumpSubSessionRevision() {
      if (subSessionRafRef.current) return;
      subSessionRafRef.current = requestAnimationFrame(() => {
        subSessionRafRef.current = null;
        setSubSessionRevision(r => r + 1);
      });
    }

    function createSubSession(parentToolCallId, sessionId, agent) {
      subSessionsRef.current.set(parentToolCallId, {
        sessionId,
        parentToolCallId,
        agent: agent || null,
        status: 'running',
        content: [],
        toolCalls: [],
        orderCounter: 0,
        _rev: 0,
      });
      subBlockMapRef.current.set(parentToolCallId, new Map());
      subNextIndexRef.current.set(parentToolCallId, 0);
    }

    function resolveSubSessionKey(msg) {
      if (msg.parent_tool_call_id && subSessionsRef.current.has(msg.parent_tool_call_id)) {
        return msg.parent_tool_call_id;
      }
      if (msg.child_session_id) {
        const mapped = childToToolRef.current[msg.child_session_id];
        if (mapped && subSessionsRef.current.has(mapped)) return mapped;
      }
      return null;
    }

    function addSubSessionContent(parentToolCallId, item) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      item.order = sub.orderCounter++;
      sub.content.push(item);
      sub._rev = (sub._rev || 0) + 1;
      bumpSubSessionRevision();
    }

    function updateSubSessionContent(parentToolCallId, updateFn) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      updateFn(sub);
      sub._rev = (sub._rev || 0) + 1;
      bumpSubSessionRevision();
    }

    function addSubSessionToolCall(parentToolCallId, item) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      item.order = sub.orderCounter++;
      sub.toolCalls.push(item);
      sub._rev = (sub._rev || 0) + 1;
      bumpSubSessionRevision();
    }

    function updateSubSessionToolCall(parentToolCallId, toolCallId, updateFn) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      const tc = sub.toolCalls.find(t => t.toolCallId === toolCallId);
      if (tc) updateFn(tc);
      sub._rev = (sub._rev || 0) + 1;
      bumpSubSessionRevision();
    }

    function endSubSession(parentToolCallId, status) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      sub.status = status;
      subBlockMapRef.current.delete(parentToolCallId);
      subNextIndexRef.current.delete(parentToolCallId);
      sub._rev = (sub._rev || 0) + 1;
      bumpSubSessionRevision();
    }

    // —— WebSocket event handler ————————————————————————————————————
    const clearWatchdogTimer = useCallback(() => {
      if (watchdogTimerRef.current) {
        clearTimeout(watchdogTimerRef.current);
        watchdogTimerRef.current = null;
      }
    }, []);

    const startWatchdogTimer = useCallback(() => {
      clearWatchdogTimer();
      watchdogTimerRef.current = setTimeout(() => {
        console.warn('[chat] Watchdog: cleaning up stuck streaming state');
        setChronoItems(prev => {
          if (!prev.some(i => i.streaming)) return prev;
          return prev.map(i => i.streaming ? { ...i, streaming: false } : i);
        });
        const key = activeKeyRef.current;
        if (!key) return;
        setSessions(prev => {
          const next = new Map(prev);
          const s = next.get(key);
          if (s && s.status === 'running') {
            next.set(key, { ...s, status: 'idle' });
            return next;
          }
          return prev;
        });
      }, 5000);
    }, [clearWatchdogTimer]);

    // Immediately complete all in-flight synthetic animations, setting
    // proper content and htmlContent so items aren't left half-rendered
    // when prompt_complete or session switches cancel them early.
    const finalizeSyntheticAnimations = useCallback(() => {
      if (syntheticAnimRef.current.size === 0) return;
      const finalizations = new Map();
      for (const [idx, entry] of syntheticAnimRef.current.entries()) {
        cancelAnimationFrame(entry.rafId);
        const domEl = entry.textItemId ? document.getElementById(entry.textItemId) : null;
        if (domEl) domEl.textContent = '';
        finalizations.set(entry.textItemId, entry.fullText);
      }
      syntheticAnimRef.current.clear();
      if (finalizations.size > 0) {
        setChronoItems(prev => prev.map(item => {
          const fullText = finalizations.get(item.id);
          if (fullText !== undefined) {
            return {
              ...item,
              streaming: false,
              content: fullText,
              htmlContent: sanitizeHtml(marked.parse(fullText)),
            };
          }
          return item;
        }));
      }
    }, []);

    const handleWsMessage = useCallback((msg, sourceKey = null) => {
      const ownerKey = sourceKey || activeKeyRef.current;
      const isActiveStream = ownerKey === activeKeyRef.current;
      if (!ownerKey) return;

      // user_message: broadcast from another client's prompt submission.
      // Handled before the active/background split so it works for both.
      // The originating browser already added the message optimistically
      // in sendMessage(), so skip if the latest user item matches.
      if (msg.type === 'user_message') {
        const umContent = msg.content || '';
        setChronoItems(prev => {
          const lastUser = [...prev].reverse().find(i => i.role === 'user' && i.type === 'text');
          if (lastUser && lastUser.content === umContent) return prev;
          return [...prev, {
            id: makeId(), type: 'text', role: 'user',
            content: umContent, streaming: false,
            order: orderCounterRef.current++,
          }];
        });
        return;
      }

      if (!isActiveStream) {
        // Keep session list metadata live even when this session is in
        // background, and queue renderable events for later replay.
        if (msg.type === 'session_created') {
          const nowIso = new Date().toISOString();
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const parentSessionId = normalizeSessionParentId(
              sessionParentByIdRef.current[msg.session_id] || s.parentSessionId
            );
            const spawnAgent = childAgentRef.current[msg.session_id] || s.spawnAgent || null;
            next.set(ownerKey, {
              ...s,
              sessionId: msg.session_id,
              cwd: msg.cwd || '~',
              serverCwd: msg.cwd || s.serverCwd || null,
              bundle: msg.bundle,
              source: 'live',
              status: 'idle',
              lastUpdated: s.lastUpdated || nowIso,
              hasExternalUpdate: false,
              isNewSession: false,
              parentSessionId,
              spawnAgent,
            });
            return next;
          });
          return;
        }

        if (msg.type === 'prompt_complete') {
          if (msg.child_session_id) return;  // D-06: child terminal event, don't alter parent sidebar status
          const nowIso = new Date().toISOString();
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const nextTurn = (s.turnCount || 0) + 1;
            next.set(ownerKey, {
              ...s,
              turnCount: nextTurn,
              savedTurnCount: nextTurn,
              status: 'idle',
              pendingApproval: false,
              lastUpdated: nowIso,
            });
            return next;
          });
          return;
        }

        if (msg.type === 'execution_cancelled') {
          if (msg.child_session_id) return;  // D-06: child terminal event, don't alter parent sidebar status
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, status: 'idle' });
            return next;
          });
          return;
        }

        if (msg.type === 'approval_request') {
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, pendingApproval: true });
            return next;
          });
          return;
        }

        if (msg.type === 'execution_error') {
          if (msg.child_session_id) return;  // D-06: child terminal event, don't alter parent sidebar status
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, {
              ...s,
              status: s.source === 'history' ? 'history' : 'error',
            });
            return next;
          });
        }

        if (msg.type === 'session_renamed') {
          setSessions(prev => {
            const next = new Map(prev);
            for (const [key, s] of next) {
              if (s.sessionId === msg.session_id) {
                next.set(key, { ...s, name: msg.name });
                break;
              }
            }
            return next;
          });
          return;
        }

        if (msg.type === 'session_fork') {
          applySessionForkLineage(msg);
          // Guarantee child→parent mapping from the routing-derived ownerKey
          const forkChildId = typeof msg.child_id === 'string' ? msg.child_id : null;
          if (forkChildId) {
            const parentSession = sessionsRef.current.get(ownerKey);
            if (parentSession?.sessionId) {
              sessionParentByIdRef.current[forkChildId] = parentSession.sessionId;
            }
          }
        }

        const replayableEvents = new Set([
          // Use UI names — msg.type is already mapped via SSE_EVENT_TYPE_MAP
          'content_start', 'content_delta', 'content_end',
          'thinking_delta', 'thinking_final',
          'tool_call', 'tool_result',
          'session_fork', 'display_message',
          'execution_start', 'execution_end',
          'execution_error', 'approval_request',
        ]);

        if (replayableEvents.has(msg.type)) {
          const queued = pendingEventsRef.current.get(ownerKey) || [];
          queued.push(msg);
          pendingEventsRef.current.set(ownerKey, queued);
        }
        return;
      }

      // Fix A: buffer early child events that arrive before session_fork is processed
      if (msg.child_session_id && !childToToolRef.current[msg.child_session_id]) {
        const buf = pendingChildEventsRef.current.get(msg.child_session_id) || [];
        buf.push(msg);
        pendingChildEventsRef.current.set(msg.child_session_id, buf);
        return;
      }

      switch (msg.type) {
        case 'auth_ok':
          break;

        case 'session_created': {
          const nowIso = new Date().toISOString();
          if (isActiveStream) {
            setSessionId(msg.session_id);
            setCwd(msg.cwd || '~');
          }
          if (!ownerKey) break;
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const parentSessionId = normalizeSessionParentId(
              sessionParentByIdRef.current[msg.session_id] || s.parentSessionId
            );
            const spawnAgent = childAgentRef.current[msg.session_id] || s.spawnAgent || null;
            next.set(ownerKey, {
              ...s,
              sessionId: msg.session_id,
              cwd: msg.cwd || '~',
              // Track the server's canonical CWD (may differ from what we
              // sent if the server expanded ~ or resolved symlinks).
              serverCwd: msg.cwd || s.serverCwd || null,
              bundle: msg.bundle,
              source: 'live',
              status: 'idle',
              turnCount: s.turnCount || 0,
              lastUpdated: s.lastUpdated || nowIso,
              hasExternalUpdate: false,
              isNewSession: false,
              parentSessionId,
              spawnAgent,
            });
            return next;
          });
          break;
        }

        case 'execution_start':
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, status: 'running' });
            return next;
          });
          break;

        case 'execution_end':
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, {
              ...s,
              status: s.source === 'history' ? 'history' : 'idle',
            });
            return next;
          });
          break;

        case 'content_start': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey) {
              if (msg.block_type === 'text') {
                const itemId = makeId();
                const subIdx = subNextIndexRef.current.get(subKey) ?? 0;
                subNextIndexRef.current.set(subKey, subIdx + 1);
                const blockMap = subBlockMapRef.current.get(subKey);
                if (blockMap) blockMap.set('id-' + subIdx, itemId);
                addSubSessionContent(subKey, {
                  id: itemId, type: 'text', content: '', streaming: true, role: 'assistant',
                });
              } else if (msg.block_type === 'thinking') {
                const itemId = makeId();
                const subIdx = subNextIndexRef.current.get(subKey) ?? 0;
                subNextIndexRef.current.set(subKey, subIdx + 1);
                const blockMap = subBlockMapRef.current.get(subKey);
                if (blockMap) blockMap.set('thinking-id-' + subIdx, itemId);
                const thinkingItem = {
                  id: itemId, type: 'thinking', content: '', streaming: true,
                };
                addSubSessionContent(subKey, thinkingItem);
                // S-07: cache for O(1) lookup in thinking_delta / thinking_final
                const sub = subSessionsRef.current.get(subKey);
                if (sub) sub._activeThinkingItem = thinkingItem;
              }
              break;
            }
          }
          // Remove client-side placeholder if present
          const placeholderId = placeholderIdRef.current;
          if (placeholderId) {
            setChronoItems(prev => prev.filter(item => item.id !== placeholderId));
            placeholderIdRef.current = null;
          }

          if (msg.block_type === 'text') {
            // Defensive: clear any prior block stuck in streaming state
            // (covers orphaned thinking blocks too — if one is still streaming
            // when the text block starts, its content_stop was dropped)
            setChronoItems(prev =>
              prev.some(i => i.streaming)
                ? prev.map(i => i.streaming ? { ...i, streaming: false } : i)
                : prev
            );
            const itemId = makeId();
            const localIdx = getLocalIndex(msg.index);
            blockMapRef.current['id-' + localIdx] = itemId;
            setChronoItems(prev => [...prev, {
              id: itemId, type: 'text', content: '', streaming: true,
              order: orderCounterRef.current++, role: 'assistant',
            }]);
            startWatchdogTimer();
          } else if (msg.block_type === 'thinking') {
            const itemId = makeId();
            const localIdx = getLocalIndex(msg.index);
            blockMapRef.current['thinking-id-' + localIdx] = itemId;
            setChronoItems(prev => [...prev, {
              id: itemId, type: 'thinking', content: '', streaming: true,
              order: orderCounterRef.current++,
            }]);
          }
          break;
        }

        case 'content_delta': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey) {
              const delta = typeof msg.delta === 'string' ? msg.delta : '';
              if (!delta) break;
              const blockMap = subBlockMapRef.current.get(subKey);
              const subIdx = msg.index ?? 0;
              const textItemId = blockMap ? blockMap.get('id-' + subIdx) : null;
              if (textItemId) {
                const el = document.getElementById(textItemId);
                if (el) {
                  el.textContent += delta;
                  // Keep in-memory state in sync so React re-renders
                  // (triggered by bumpSubSessionRevision) don't overwrite
                  // the DOM with stale empty content.
                  const sub = subSessionsRef.current.get(subKey);
                  if (sub) {
                    const stateItem = sub.content.find(c => c.id === textItemId);
                    if (stateItem) stateItem.content += delta;
                  }
                } else {
                  updateSubSessionContent(subKey, sub => {
                    const item = sub.content.find(c => c.id === textItemId);
                    if (item) item.content += delta;
                  });
                }
              }
              break;
            }
          }
          const delta = typeof msg.delta === 'string' ? msg.delta : '';
          if (!delta) break;
          const localIdx = getLocalIndex(msg.index);
          // E2: mark this block as having received real streaming deltas
          seenDeltasRef.current.add(localIdx);
          startWatchdogTimer();
          const textItemId = blockMapRef.current['id-' + localIdx];
          const thinkingItemId = blockMapRef.current['thinking-id-' + localIdx];

          if (textItemId) {
            const el = document.getElementById(textItemId);
            if (el) {
              el.textContent += delta;
              // Keep ref in sync so switchSession saves accumulated content
              // (mirrors the sub-session pattern at lines 5572-5575).
              const refItem = chronoItemsRef.current.find(item => item.id === textItemId);
              if (refItem) refItem.content += delta;
            } else {
              setChronoItems(prev => prev.map(item =>
                item.id === textItemId
                  ? { ...item, content: item.content + delta }
                  : item
              ));
            }
          }

          if (thinkingItemId) {
            setChronoItems(prev => prev.map(item =>
              item.id === thinkingItemId
                ? { ...item, content: item.content + delta }
                : item
            ));
          }
          break;
        }

        case 'content_end': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey) {
              const blockMap = subBlockMapRef.current.get(subKey);
              const subIdx = msg.index ?? 0;
              const textItemId = blockMap ? blockMap.get('id-' + subIdx) : null;
              const thinkItemId = blockMap ? blockMap.get('thinking-id-' + subIdx) : null;
              const payloadText = typeof msg.text === 'string' ? msg.text : '';
              if (textItemId) {
                const domEl = document.getElementById(textItemId);
                const domText = domEl ? domEl.textContent : '';
                const finalText = payloadText || domText;
                const parsedHtml = sanitizeHtml(marked.parse(finalText));
                // Clear DOM text before re-render (same orphan-node fix)
                if (domEl) domEl.textContent = '';
                updateSubSessionContent(subKey, sub => {
                  const item = sub.content.find(c => c.id === textItemId);
                  if (item) {
                    item.streaming = false;
                    item.content = finalText;
                    item.htmlContent = parsedHtml;
                  }
                });
              } else if (thinkItemId) {
                updateSubSessionContent(subKey, sub => {
                  const item = sub.content.find(c => c.id === thinkItemId);
                  if (item) {
                    item.streaming = false;
                    item.content = payloadText || item.content || '';
                  }
                });
              }
              break;
            }
          }
          const localIdx = getLocalIndex(msg.index);
          const payloadText = typeof msg.text === 'string' ? msg.text : '';
          const textItemId = blockMapRef.current['id-' + localIdx];
          const thinkingItemId = blockMapRef.current['thinking-id-' + localIdx];
          const domEl = textItemId ? document.getElementById(textItemId) : null;
          const domText = domEl?.textContent || '';

          // E2: Synthetic streaming — if a text block received its full text
          // via content_end but had zero prior content_delta events, the
          // provider doesn't stream.  Animate the text with rAF so the
          // response appears progressively instead of flashing in all at once.

                  && (ci.toolStatus === 'pending' || ci.toolStatus === 'running')

    const connect = useCallback(async (sessionKey) => {

          session_id: sessionId,
          cwd: result.working_dir || requestedCwd,

    // child → root.
    const findRootParent = (sessionId) => {
      let current = sessionId;
      let parent = sessionParentByIdRef.current[current];
      while (parent) {
        current = parent;
        parent = sessionParentByIdRef.current[current];
      }

    const syncSessionHistory = useCallback((options = {}) => {

      api.listSessionHistory(HISTORY_PAGE_SIZE)
        .then(data => {
          const rows = Array.isArray(data?.sessions) ? data.sessions : [];
          setHasMoreHistory(!!data?.has_more);
          // Cap at HISTORY_PAGE_SIZE so that any extra sessions injected
          // by ensure_ids (pinned sessions outside the pagination window)
          // don't inflate the offset and cause "load more" to skip pages.
          setHistoryOffset(Math.min(rows.length, HISTORY_PAGE_SIZE));
          if (!rows.length) {
            setPendingHistorySyncCount(0);
            return;
          }

          setSessions(prev => {
            const next = new Map(prev);
            const sessionKeyById = new Map();
            for (const [key, session] of next.entries()) {
              if (session && session.sessionId) {
                sessionKeyById.set(session.sessionId, key);
              }
            }

            let changed = false;
            for (const s of rows) {
              if (!s || !s.session_id) continue;
              const messageCount = Number(s.message_count) || 0;
              if (messageCount <= 0 && !s.last_user_message) continue;

              const sessionId = s.session_id;
              const revision = typeof s.revision === 'string' ? s.revision : null;
              const parentSessionId = normalizeSessionParentId(
                s.parent_session_id || sessionParentByIdRef.current[sessionId]
              );
              const spawnAgent = (
                (typeof s.spawn_agent === 'string' && s.spawn_agent)
                || childAgentRef.current[sessionId]
                || null
              );
              const forkedFromTurn = (typeof s.forked_from_turn === 'number' && s.forked_from_turn >= 1) ? s.forked_from_turn : null;
              if (parentSessionId) {
                sessionParentByIdRef.current[sessionId] = parentSessionId;
              }
              if (spawnAgent) {
                childAgentRef.current[sessionId] = spawnAgent;
              }
              const existingKey = sessionKeyById.get(sessionId);

              if (!existingKey) {
                // D-03: skip phantom entry for known children of live sessions
                const knownParentId = sessionParentByIdRef.current[sessionId];
                if (knownParentId) {
                  let parentIsLive = false;
                  for (const [, sess] of next) {
                    if (sess.sessionId === knownParentId && sess.source === 'live') {
                      parentIsLive = true;
                      break;
                    }
                  }
                  if (parentIsLive) continue;  // known child of a live session — don't create phantom entry
                }
                const historyKey = 'history-' + sessionId;
                if (next.has(historyKey)) continue;
                // Resolve the parent, walking the full ref chain so that
                // N-level grandchildren don't get added as root entries even
                // when the server row's parent_session_id hasn't landed yet
                // but a live session_fork event already populated the ref.
                let resolvedParentSessionId = parentSessionId;
                if (!resolvedParentSessionId) {
                  // findRootParent returns non-null only when the ref chain
                  // has at least one entry for sessionId, which means the
                  // direct parent is also available in the ref.
                  if (findRootParent(sessionId)) {
                    resolvedParentSessionId = sessionParentByIdRef.current[sessionId];
                  }
                }
                if (resolvedParentSessionId && !sessionParentByIdRef.current[sessionId]) {
                  sessionParentByIdRef.current[sessionId] = resolvedParentSessionId;
                }
                // New session never seen by this client.
                // Only badge on explicit user-initiated sync (!silent) — not on
                // initial page load or background refresh, which would flag every
                // historical session as "New" after a server restart.
                const hasContent = messageCount > 0;
                const badgeNew = !silent && hasContent;
                next.set(historyKey, {
                  source: 'history',
                  status: 'history',
                  sessionId,
                  cwd: s.cwd || '~',
                  turnCount: messageCount,
                  savedTurnCount: messageCount,
                  messageCount,
                  lastUserMessage: s.last_user_message || null,
                  lastUpdated: s.last_updated || null,
                  name: s.name || null,
                  description: s.description || null,
                  knownRevision: badgeNew ? null : revision,
                  remoteRevision: revision,
                  hasExternalUpdate: badgeNew,
                  isNewSession: badgeNew,
                  parentSessionId: resolvedParentSessionId,
                  spawnAgent,
                  forkedFromTurn,
                  name: s.name || null,
                  description: s.description || null,
                });
                sessionKeyById.set(sessionId, historyKey);
                changed = true;
                continue;
              }

              const cur = next.get(existingKey) || {};
              const remoteRevision = revision ?? cur.remoteRevision ?? null;
              // For live sessions (active WS), keep knownRevision in sync with
              // disk so the "Updated" badge doesn't flicker — WS delivers content.
              const isLive = cur.source === 'live';
              const knownRevision = (cur.knownRevision == null || isLive) ? remoteRevision : cur.knownRevision;
              const hasExternalUpdate = !!cur.hasExternalUpdate
                || (
                  knownRevision != null
                  && remoteRevision != null
                  && knownRevision !== remoteRevision
                );

              const treatAsHistory = cur.source === 'history';
              const nextSource = treatAsHistory ? 'history' : cur.source;
              const nextStatus = treatAsHistory
                ? ((cur.status && cur.status !== 'history') ? cur.status : 'history')
                : cur.status;
              const nextTurnCount = (
                treatAsHistory && (cur.status === 'history' || cur.source === 'history')
              )
                ? (messageCount || cur.turnCount || 0)
                : cur.turnCount;
              const nextSavedTurnCount = (
                treatAsHistory && (cur.status === 'history' || cur.source === 'history')
              )
                ? (messageCount || cur.savedTurnCount || cur.turnCount || 0)
                : cur.savedTurnCount;
              const nextMessageCount = messageCount || cur.messageCount || cur.turnCount || 0;
              const nextCwd = s.cwd || cur.cwd || '~';
              const nextLastUserMessage = s.last_user_message || cur.lastUserMessage || null;
              const nextLastUpdated = s.last_updated || cur.lastUpdated || null;
              const nextParentSessionId = parentSessionId || cur.parentSessionId || sessionParentByIdRef.current[sessionId] || null;
              const nextSpawnAgent = spawnAgent || cur.spawnAgent || null;
              const nextName = s.name || cur.name || null;
              const nextDescription = s.description || cur.description || null;

              const rowChanged =
                nextCwd !== cur.cwd
                || nextMessageCount !== cur.messageCount
                || nextLastUserMessage !== cur.lastUserMessage
                || nextLastUpdated !== cur.lastUpdated
                || remoteRevision !== cur.remoteRevision
                || knownRevision !== cur.knownRevision
                || hasExternalUpdate !== !!cur.hasExternalUpdate
                || nextSource !== cur.source
                || nextStatus !== cur.status
                || nextTurnCount !== cur.turnCount
                || nextSavedTurnCount !== cur.savedTurnCount
                || nextParentSessionId !== cur.parentSessionId
                || nextSpawnAgent !== cur.spawnAgent
                || nextName !== cur.name
                || nextDescription !== cur.description;

              if (!rowChanged) continue;

              next.set(existingKey, {
                ...cur,
                source: nextSource,
                status: nextStatus,
                cwd: nextCwd,
                turnCount: nextTurnCount,
                savedTurnCount: nextSavedTurnCount,
                messageCount: nextMessageCount,
                lastUserMessage: nextLastUserMessage,
                lastUpdated: nextLastUpdated,
                knownRevision,
                remoteRevision,
                hasExternalUpdate,
                parentSessionId: nextParentSessionId,
                spawnAgent: nextSpawnAgent,
                name: nextName,
                description: nextDescription,
              });
              changed = true;
            }

            return changed ? next : prev;
          });
          setPendingHistorySyncCount(0);
          // Load pin state from server
          fetchPinnedSessions().then(pinSet => setPinnedSessionIds(pinSet));
        })
        .catch(err => {
          console.warn('[chat] failed to load session history', err);
        })
        .finally(() => {
          historySyncInFlightRef.current = false;
          setHistoryListLoading(false);
          if (!silent) setSyncingHistory(false);
        });
    }, []);

    const refreshHistory = useCallback(() => {

              if (parentSessionId) sessionParentByIdRef.current[sessionId] = parentSessionId;
              if (spawnAgent) childAgentRef.current[sessionId] = spawnAgent;

              if (next.has(historyKey)) continue;

                status: 'history',

                turnCount: messageCount,

                messageCount,

                lastUpdated: s.last_updated || null,

    const handleTogglePin = useCallback(async (sessionId, currentlyPinned) => {

    useEffect(() => {
      if (sessionGroupMode !== 'project') return;
      const groupKeys = new Set();
      const allEntries = Array.from(sessions.entries());
      const tree = buildSessionTree(allEntries);
      for (const [, session] of tree.roots) {
        groupKeys.add(normalizeCwd(session && session.cwd));
      }
      setCollapsedDirGroups(prev => {
        const next = { ...prev };
        let changed = false;
        for (const key of groupKeys) {
          if (!(key in next)) {
            next[key] = true;
            changed = true;
          }
        }
        for (const key of Object.keys(next)) {
          if (!groupKeys.has(key)) {
            delete next[key];
            changed = true;
          }
        }
        return changed ? next : prev;
      });
    }, [sessionGroupMode, sessions]);

    useEffect(() => {
      const allEntries = Array.from(sessions.entries());
      const tree = buildSessionTree(allEntries);
      const parentIds = new Set();
      for (const [key, session] of tree.roots) {
        const children = tree.childrenByParentKey.get(key) || [];
        if (!children.length) continue;
        const sid = session && session.sessionId ? session.sessionId : key;
        parentIds.add(sid);
      }
      for (const children of tree.childrenByParentKey.values()) {
        for (const [key, session] of children) {
          const grandchildren = tree.childrenByParentKey.get(key) || [];
          if (!grandchildren.length) continue;
          const sid = session && session.sessionId ? session.sessionId : key;
          parentIds.add(sid);
        }
      }
      setCollapsedSpawnGroups(prev => {
        const next = { ...prev };
        let changed = false;
        for (const sid of parentIds) {
          if (!(sid in next)) {
            next[sid] = true;
            changed = true;
          }
        }
        for (const sid of Object.keys(next)) {
          if (!parentIds.has(sid)) {
            delete next[sid];
            changed = true;
          }
        }
        return changed ? next : prev;
      });
    }, [sessions]);

    const toggleDirGroup = useCallback((groupKey) => {
      setCollapsedDirGroups(prev => {
        const current = Object.prototype.hasOwnProperty.call(prev, groupKey)
          ? !!prev[groupKey]
          : true;
        return {
          ...prev,
          [groupKey]: !current,
        };
      });
    }, []);

    const toggleSpawnGroup = useCallback((parentId) => {
      setCollapsedSpawnGroups(prev => {

          [parentId]: !current,

    // —— Send ————————————————————————————————————————————————————————
    // — Sub-session navigation —
    // Use a ref to access switchSession (defined later) without hook ordering issues
    // Server-side search with debounce + cancellation.
    // Aborts in-flight fetch when the user types a new query, so stale results
    // from a previous search never overwrite fresher results.
    useEffect(() => {
      if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
      if (searchAbortRef.current) { searchAbortRef.current.abort(); searchAbortRef.current = null; }
      const query = sessionFilterQuery.trim();
      if (!query || query.length < 2) {
        setServerSearchResults([]);
        setServerSearching(false);
        return;
      }
      setServerSearching(true);
      searchTimerRef.current = setTimeout(() => {
        const abort = new AbortController();
        searchAbortRef.current = abort;
        api.searchSessions(query, 20, abort.signal)
          .then(data => {
            if (abort.signal.aborted) return;
            const rows = Array.isArray(data?.sessions) ? data.sessions : [];
            const loadedIds = new Set();
            for (const [, s] of sessionsRef.current.entries()) {
              if (s && s.sessionId) loadedIds.add(s.sessionId);
            }
            setServerSearchResults(rows.filter(r => !loadedIds.has(r.session_id)));
          })
          .catch((err) => { if (!abort.signal.aborted) setServerSearchResults([]); })
          .finally(() => { if (!abort.signal.aborted) setServerSearching(false); });
      }, 300);
      return () => {
        if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
        if (searchAbortRef.current) { searchAbortRef.current.abort(); searchAbortRef.current = null; }
      };
    }, [sessionFilterQuery]);

    // Pending switch target: set by loadServerSearchResult, consumed by useEffect
    // after sessions Map has updated with the new entry.
    const pendingSearchSwitchRef = useRef(null);

    const loadServerSearchResult = useCallback((s) => {

      // Remove only this result from the server results (keep others visible)
      setServerSearchResults(prev => prev.filter(r => r.session_id !== sessionId));

      // If already loaded, just switch to it
      if (sessionsRef.current.has(historyKey)) {
        if (switchSessionRef.current) switchSessionRef.current(historyKey);
        return;
      }

      // Add session to Map and schedule switch after render
      pendingSearchSwitchRef.current = historyKey;
      const parentSessionId = (typeof s.parent_session_id === 'string' && s.parent_session_id) || null;
      const spawnAgent = (typeof s.spawn_agent === 'string' && s.spawn_agent) || null;
      const forkedFromTurn = (typeof s.forked_from_turn === 'number' && s.forked_from_turn >= 1) ? s.forked_from_turn : null;
      setSessions(prev => {
        if (prev.has(historyKey)) return prev;
        const next = new Map(prev);
        next.set(historyKey, {
          source: 'history',
          status: 'history',
          sessionId,
          cwd: s.cwd || '~',
          turnCount: s.message_count || 0,
          savedTurnCount: s.message_count || 0,
          messageCount: s.message_count || 0,
          lastUserMessage: s.last_user_message || null,
          lastUpdated: s.last_updated || null,
          name: s.name || null,
          description: s.description || null,
          knownRevision: null,
          remoteRevision: null,
          hasExternalUpdate: false,
          isNewSession: false,
          parentSessionId,
          spawnAgent,
          forkedFromTurn,
        });
        return next;
      });
    }, []);

    }, [sessions]);

    const switchSessionRef = useRef(null);
    const navigateToSession = useCallback((sessionId) => {
      if (!sessionId) return;
      for (const [key, session] of sessionsRef.current.entries()) {
        if (session && session.sessionId === sessionId) {
          // Expand the parent session in the sidebar so the child is visible
          const parentId = session.parentSessionId;
          if (parentId) {
            for (const [pKey, pSession] of sessionsRef.current.entries()) {
              if (pSession && pSession.sessionId === parentId) {

                  // collapsedSpawnGroups is a plain object {key: bool}
                  // A key with value !== false means collapsed; delete to expand

    const sendMessage = useCallback(async (content, images) => {
      const key = activeKeyRef.current;
      let activeSession = key ? sessionsRef.current.get(key) : null;
      let sessionId = activeSession?.sessionId || null;

      // Don't send to a session that hasn't been resumed into amplifierd memory
      if (sessionId && activeSession?.source === 'history') {
        setChronoItems(prev => [...prev, {
          id: makeId(), type: 'text', role: 'system',
          content: 'Session is still loading. Please wait a moment and try again.',
          streaming: false, order: orderCounterRef.current++,
        }]);
        return;
      }

      // Lazy session creation: create on first real interaction
      if (!sessionId) {
        sessionId = await connect(key);

          setChronoItems(prev => [...prev, {
            id: makeId(), type: 'text', role: 'system',

            return;
          case '/thinking':
            // Toggle visibility — implemented in Phase 6
            return;
        }
        // Server-side command via REST
        api.sendCommand(sessionId, content.trim())
          .then(result => {
            const fmt = formatCommandResult(cmd.slice(1), result);
            const item = {
              id: makeId(), type: 'text', role: 'system',
              streaming: false, order: orderCounterRef.current++,
            };
            if (fmt.html) { item.htmlContent = fmt.html; item.cssClass = fmt.cssClass || ''; }
            else { item.content = fmt.text; }
            setChronoItems(prev => [...prev, item]);
          })
          .catch(err => {
            setChronoItems(prev => [...prev, {
              id: makeId(), type: 'text', role: 'system',
              content: 'Command error: ' + (err?.message || String(err)),
              streaming: false, order: orderCounterRef.current++,
            }]);
          });
        return;
      }

      // Normal message
      setChronoItems(prev => [...prev, {
        id: makeId(), type: 'text', role: 'user',
        content, streaming: false, order: orderCounterRef.current++,
      }]);

      // Add client-side placeholder for immediate feedback
      const placeholderId = makeId();
      placeholderIdRef.current = placeholderId;
      setChronoItems(prev => [...prev, {
        id: placeholderId,
        type: 'thinking',
        content: '',
        streaming: true,
        order: orderCounterRef.current++,

      executingRef.current = true;
      const nowIso = new Date().toISOString();
      setSessions(prev => {
        const next = new Map(prev);

        console.error('[chat] executeStream failed', err);
        setChronoItems(prev => [...prev, {
          id: makeId(), type: 'text', role: 'system',
          content: 'Error: ' + (err?.message || 'Could not start execution'),
          streaming: false, order: orderCounterRef.current++,

    // Shell mode: user-initiated command execution (! trigger)

        setChronoItems(prev => [...prev, {
          id: makeId(), type: 'text', role: 'system',
          content: 'Session is still loading. Please wait a moment and try again.',
          streaming: false, order: orderCounterRef.current++,
