      return html`<${TokenUsagePill} tokens=${item.tokens} />`;
    }
    return null;
  }

  function MessageList({
    items,
    filterFn,
    sessionKey,
    showJumpControls = false,
    bottomNoticeSignal = 0,
    bottomNoticeLabel = 'New messages',
    subSessionsRef,
    subSessionRevision,
    onNavigateSession,
  }) {
    const filtered = filterFn ? items.filter(filterFn) : items;
    const sorted = [...filtered].sort((a, b) => a.order - b.order);
    const listRef = useRef(null);
    const bottomRef = useRef(null);
    const [scrollState, setScrollState] = useState({
      canTop: false,
      canBottom: false,
      hasOverflow: false,
    });
    const nearBottomRef = useRef(true);
    const initialAnchorDoneRef = useRef(false);
    const [showBottomNotice, setShowBottomNotice] = useState(false);
    const lastNoticeSignalRef = useRef(bottomNoticeSignal);

    const updateScrollState = useCallback(() => {
      const el = listRef.current;
      if (!el) return;
      const maxTop = Math.max(0, el.scrollHeight - el.clientHeight);
      const canTop = el.scrollTop > 12;
      const canBottom = maxTop - el.scrollTop > 12;
      const hasOverflow = maxTop > 8;
      nearBottomRef.current = !canBottom;
      setScrollState(prev => (
        prev.canTop === canTop
        && prev.canBottom === canBottom
        && prev.hasOverflow === hasOverflow
      ) ? prev : { canTop, canBottom, hasOverflow });
    }, []);

    useEffect(() => {
      initialAnchorDoneRef.current = false;
      nearBottomRef.current = true;
      lastNoticeSignalRef.current = bottomNoticeSignal;
      setShowBottomNotice(false);
      setScrollState({ canTop: false, canBottom: false, hasOverflow: false });
    }, [sessionKey]);

    useEffect(() => {
      if (bottomNoticeSignal === lastNoticeSignalRef.current) return;
      lastNoticeSignalRef.current = bottomNoticeSignal;
      if (nearBottomRef.current) return;
      setShowBottomNotice(true);
      updateScrollState();
    }, [bottomNoticeSignal, updateScrollState]);

    // Anchor to newest on first load per session.
    useEffect(() => {
      if (!sorted.length) return;
      const el = listRef.current;
      if (!el) return;

      const anchor = () => {
        el.scrollTop = el.scrollHeight;
        updateScrollState();
      };

      if (!initialAnchorDoneRef.current) {
        requestAnimationFrame(() => requestAnimationFrame(anchor));
        initialAnchorDoneRef.current = true;
        return;
      }

      if (nearBottomRef.current) {
        requestAnimationFrame(anchor);
      } else {
        updateScrollState();
      }
    }, [sorted.length, updateScrollState]);

    const jumpTop = useCallback(() => {
      const el = listRef.current;
      if (!el) return;
      el.scrollTo({ top: 0, behavior: 'smooth' });
    }, []);

    const jumpBottom = useCallback(() => {
      setShowBottomNotice(false);
      bottomRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, []);

    useEffect(() => {
      if (!scrollState.canBottom) {
        setShowBottomNotice(false);
      }
    }, [scrollState.canBottom]);

    return html`
      <div class="message-list-wrap">
        <div id="message-list" ref=${listRef} onScroll=${updateScrollState}>
          ${sorted.map(item => html`<${ChronoItem} key=${item.id} item=${item}
            subSessionsRef=${subSessionsRef} subSessionRevision=${subSessionRevision}
            onNavigateSession=${onNavigateSession} />`)}
          <div ref=${bottomRef}></div>
        </div>
        ${showJumpControls && scrollState.hasOverflow && html`
          <div class="jump-nav">
            <button class="jump-btn" title="Jump to top" onClick=${jumpTop} disabled=${!scrollState.canTop}>
              <${Icon} name="chevron-up" className="sm" />
            </button>
            <button class="jump-btn" title="Jump to bottom" onClick=${jumpBottom} disabled=${!scrollState.canBottom}>
              <${Icon} name="chevron-down" className="sm" />
            </button>
          </div>
        `}
        ${showBottomNotice && scrollState.canBottom && html`
          <div class="new-content-pill-wrap">
            <button class="new-content-pill" title="Jump to latest messages" onClick=${jumpBottom}>
              ${bottomNoticeLabel} ↓
            </button>
          </div>
        `}
      </div>
    `;
  }

  function ApprovalModal({ approval, onRespond }) {
    if (!approval) return null;
    // Validate: must be a number between 5 and 600 seconds
    const rawTimeout = Number(approval.timeout);
    const timeout = isFinite(rawTimeout) ? Math.max(5, Math.min(600, rawTimeout)) : 300;
    return html`
      <div class="modal-backdrop">
        <div class="modal-box">
          <div class="modal-prompt">${approval.prompt}</div>
          <div class="modal-progress">
            <div class="modal-progress-bar" style=${'animation-duration:' + timeout + 's'}></div>
          </div>
          <div class="modal-buttons">
            ${(approval.options || ['deny', 'allow']).map(opt => {
              const cls = 'modal-btn ' + (
                opt.includes('deny') ? 'deny' :
                opt.includes('always') ? 'always' : 'allow'
              );
              return html`<button class=${cls} onClick=${() => onRespond(opt)}>${opt}</button>`;
            })}
          </div>
        </div>
      </div>
    `;
  }

  function SessionOverflowMenu({ isPinned, canPin, onPin, canRename, onRename, onClose }) {
    const menuRef = useRef(null);
    useEffect(() => {
      function handleClickOutside(e) {
        if (menuRef.current && !menuRef.current.contains(e.target)) onClose();
      }
      document.addEventListener('mousedown', handleClickOutside);
      document.addEventListener('touchstart', handleClickOutside);
      return () => {
        document.removeEventListener('mousedown', handleClickOutside);
        document.removeEventListener('touchstart', handleClickOutside);
      };
    }, [onClose]);

    return html`
      <div class="session-overflow-menu" ref=${menuRef} role="menu" aria-label="Session actions">
        ${canPin && html`
          <button class="session-overflow-item" role="menuitem"
            onClick=${(e) => { e.stopPropagation(); onPin(); onClose(); }}>
            ${isPinned ? 'Unpin' : 'Pin to top'}
          </button>
        `}
        ${canRename && html`
          <button class="session-overflow-item" role="menuitem"
            onClick=${(e) => { e.stopPropagation(); onRename(); onClose(); }}>
            Rename
          </button>
        `}
      </div>
    `;
  }

  function SessionCard({ session, isActive, onClick, setSessions, onTogglePin, isPinned }) {
    const [isEditing, setIsEditing] = useState(false);
    const [editValue, setEditValue] = useState('');
    const [shaking, setShaking] = useState(false);
    const [saved, setSaved] = useState(false);
    const [announcement, setAnnouncement] = useState('');
    const [menuOpen, setMenuOpen] = useState(false);
    const inputRef = useRef(null);
    const originalNameRef = useRef('');
    const statusIcon =
      session.status === 'running' ? '⟳ ' :
      session.status === 'connecting' ? '◌ ' :
      session.status === 'loading_history' ? '◌ ' :
      session.status === 'history' ? '◴ ' :
      session.status === 'error' ? '✗ ' :
      '';
    const metaText = session.source === 'history'
      ? `${session.messageCount || session.turnCount || 0} msgs`
      : `turn ${session.turnCount || 0}`;
    const preview = session.lastUserMessage || null;
    const sessionName =
      session.name
      || session.bundle
      || (
        session.source !== 'history' && (session.turnCount || 0) === 0
          ? 'new session'
          : 'session'
      );

    const startEditing = useCallback((e) => {
      if (e) e.stopPropagation();
      originalNameRef.current = session.name || '';
      setEditValue(session.name || '');
      setIsEditing(true);
      setAnnouncement('Editing session name');
    }, [session.name]);

    const cancelEditing = useCallback(() => {
      setIsEditing(false);
      setEditValue('');
      setAnnouncement('Rename cancelled');
    }, []);

    const saveEdit = useCallback(async () => {
      const trimmed = editValue.trim();
      if (!trimmed) {
        setShaking(true);
        setTimeout(() => setShaking(false), 300);
        return;
      }
      if (trimmed === originalNameRef.current) {
        cancelEditing();
        return;
      }
      // Optimistic update
      setSessions(prev => {
        const next = new Map(prev);
        for (const [key, s] of next) {
          if (s.sessionId === session.sessionId) {
            next.set(key, { ...s, name: trimmed });
            break;
          }
        }
        return next;
      });
      setIsEditing(false);
      setSaved(true);
      setAnnouncement('Session renamed to ' + trimmed);
      setTimeout(() => setSaved(false), 300);
      try {
        const resp = await fetch(`${API_BASE}/sessions/${session.sessionId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: trimmed }),
        });
        if (!resp.ok) throw new Error('PATCH failed');
      } catch (err) {
        // Rollback on error
        setSessions(prev => {
          const next = new Map(prev);
          for (const [key, s] of next) {
            if (s.sessionId === session.sessionId) {
              next.set(key, { ...s, name: originalNameRef.current });
              break;
            }
          }
          return next;
        });
      }
    }, [editValue, session.sessionId, setSessions, cancelEditing]);

    const handleKeyDown = useCallback((e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        saveEdit();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        cancelEditing();
      } else if (e.key === 'Tab') {
        e.preventDefault();
        saveEdit();
      }
    }, [saveEdit, cancelEditing]);

    const handleCardKeyDown = useCallback((e) => {
      if (e.key === 'F2' && !isEditing) {
        e.preventDefault();
        startEditing(e);
      }
    }, [isEditing, startEditing]);



    useEffect(() => {
      if (isEditing && inputRef.current) {
        inputRef.current.focus();
        inputRef.current.select();
      }
    }, [isEditing]);

    return html`
      <div class=${'session-card' + (isActive ? ' active' : '') + (isEditing ? ' session-name-editing' : '') + (saved ? ' session-name-saved' : '')} data-session-id=${session.sessionId} onClick=${isEditing ? null : onClick} onKeyDown=${handleCardKeyDown} tabindex="0">
        <div class="session-card-name-row">
          <div class=${'session-card-name' + (!session.name ? ' auto-named' : '') + (shaking ? ' session-name-shake' : '')}>
            ${statusIcon}
            ${isEditing
              ? html`<input
                  ref=${inputRef}
                  class="session-name-input"
                  value=${editValue}
                  onInput=${(e) => setEditValue(e.target.value)}
                  onKeyDown=${handleKeyDown}
                  onClick=${(e) => e.stopPropagation()}
                  aria-describedby="session-rename-hint"
                />
                <span id="session-rename-hint" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Press Enter to save, Escape to cancel</span>`
              : html`${sessionName}${session.pendingApproval ? html`<${Icon} name="bell" className="sm" />` : ''}`
            }
          </div>
          ${isEditing && html`<span class="session-edit-actions">
                <button onClick=${(e) => { e.stopPropagation(); saveEdit(); }} title="Save">✓</button>
                <button onClick=${(e) => { e.stopPropagation(); cancelEditing(); }} title="Cancel">✕</button>
              </span>`
          }
        </div>
        ${(() => {
          const hasSession = !!session.sessionId;
          if (!hasSession) return null;
          return html`
            <div class=${'session-card-actions' + (menuOpen ? ' menu-open' : '')}>
              <button class="session-card-action-btn" title="More actions" aria-label="Session actions"
                aria-haspopup="menu"
                onClick=${(e) => { e.stopPropagation(); setMenuOpen(!menuOpen); }}
              ><${Icon} name="more-vertical" /></button>
              ${menuOpen && html`
                <${SessionOverflowMenu}
                  isPinned=${isPinned}
                  canPin=${hasSession}
                  onPin=${() => onTogglePin(session.sessionId, isPinned)}
                  canRename=${hasSession}
                  onRename=${(e) => startEditing(e)}
                  onClose=${() => setMenuOpen(false)}
                />
              `}
            </div>
          `;
        })()}
        <div class="session-card-cwd session-card-cwd-row" title=${session.cwd || '~'}>
          <${Icon} name="folder" className="sm" />
          <span class="session-card-line-text">${session.cwd || '~'}</span>
        </div>
        <div class="session-card-meta">
          <span>${metaText}</span>
          ${session.hasExternalUpdate
            ? html`<span class="session-stale-badge ${session.isNewSession ? 'new-session' : ''}">${session.isNewSession ? 'New' : 'Updated'}</span>`
            : null}
        </div>
        ${preview ? html`<div class="session-card-cwd" title=${session.lastUserMessage || ''}>${preview}</div>` : null}
        <div aria-live="polite" class="sr-only">${announcement}</div>
      </div>
    `;
  }

  function InputArea({ onSend, onStop, executing, viewMode, setViewMode, activeKey }) {
    const textareaRef = useRef(null);
    const fileInputRef = useRef(null);
    const [pendingImages, setPendingImages] = useState([]);
    const [slashOpen, setSlashOpen] = useState(false);
    const [slashFilter, setSlashFilter] = useState('');
    const [slashActiveIndex, setSlashActiveIndex] = useState(0);

    useEffect(() => {
      const ta = textareaRef.current;
      if (!ta || ta.disabled) return;
      const rafId = window.requestAnimationFrame(() => {
        try {
          ta.focus();
        } catch {}
      });
      return () => window.cancelAnimationFrame(rafId);
    }, [activeKey]);

    const autoResize = useCallback(() => {
      const ta = textareaRef.current;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    }, []);

    const addImages = useCallback((files) => {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
          setPendingImages(prev => [...prev, e.target.result]);
        };
        reader.readAsDataURL(file);
      });
    }, []);

    const handlePaste = useCallback((e) => {
      const items = e.clipboardData?.items || [];
      const hasImage = Array.from(items).some(i => i.type.startsWith('image/'));
      if (!hasImage) return;
      e.preventDefault();
      const files = Array.from(items)
        .filter(i => i.type.startsWith('image/'))
        .map(i => i.getAsFile());
      addImages(files);
    }, [addImages]);

    const doSend = useCallback(() => {
      if (executing) return;  // Guard against double-send
      const ta = textareaRef.current;
      if (!ta) return;
      const content = ta.value.trim();
      if (!content && pendingImages.length === 0) return;

      // Strip data URL prefix from images
      const images = pendingImages.map(d => d.split(',')[1]);
      onSend(content, images);
      ta.value = '';
      ta.style.height = 'auto';
      setPendingImages([]);
      setSlashOpen(false);
    }, [onSend, pendingImages, executing]);

    const applySlashCommand = useCallback((cmdName) => {
      const ta = textareaRef.current;
      if (!ta) return;
      ta.value = cmdName + ' ';
      ta.focus();
      autoResize();
      setSlashOpen(false);
      setSlashActiveIndex(0);
    }, [autoResize]);

    const filteredCmds = SLASH_COMMANDS.filter(c =>
      c.name.slice(1).startsWith(slashFilter)
    );
    const slashMenuOpen = slashOpen && filteredCmds.length > 0;
    const activeSlashIndex = Math.max(0, Math.min(slashActiveIndex, filteredCmds.length - 1));
    const slashPopupId = 'slash-command-popup';
    const activeSlashOptionId = slashMenuOpen
      ? ('slash-command-option-' + activeSlashIndex)
      : null;

    useEffect(() => {
      if (!slashMenuOpen) return;
      setSlashActiveIndex(i => Math.max(0, Math.min(i, filteredCmds.length - 1)));
    }, [slashMenuOpen, filteredCmds.length]);

    const handleKeyDown = useCallback((e) => {
      if (slashMenuOpen) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setSlashActiveIndex(i => (i + 1) % filteredCmds.length);
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          setSlashActiveIndex(i => (i - 1 + filteredCmds.length) % filteredCmds.length);
          return;
        }
        if ((e.key === 'Enter' && !e.shiftKey) || e.key === 'Tab') {
          e.preventDefault();
          const cmd = filteredCmds[activeSlashIndex];
          if (cmd) applySlashCommand(cmd.name);
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          setSlashOpen(false);
          setSlashActiveIndex(0);
          return;
        }
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSend();
      }
      if (e.key === 'Escape') {
        setSlashOpen(false);
        setSlashActiveIndex(0);
      }
    }, [doSend, slashMenuOpen, filteredCmds, activeSlashIndex, applySlashCommand]);

    const handleInput = useCallback((e) => {
      autoResize();
      const val = e.target.value;
      if (val.startsWith('/')) {
        setSlashOpen(true);
        setSlashFilter(val.slice(1).toLowerCase());
        setSlashActiveIndex(0);
      } else {
        setSlashOpen(false);
        setSlashActiveIndex(0);
      }
    }, [autoResize]);

    return html`
      <div id="input-area">
        ${pendingImages.length > 0 && html`
          <div class="image-previews">
            ${pendingImages.map((src, i) => html`
              <div class="image-thumb">
                <img src=${src} alt="attachment" />
                <button class="image-remove" onClick=${() => setPendingImages(p => p.filter((_, j) => j !== i))}>×</button>
              </div>
            `)}
          </div>
        `}
        ${slashMenuOpen && html`
          <div
            class="slash-popup"
            id=${slashPopupId}
            role="listbox"
            aria-label="Slash commands"
          >
            ${filteredCmds.map((cmd, idx) => html`
              <div
                id=${'slash-command-option-' + idx}
                class=${'slash-cmd' + (idx === activeSlashIndex ? ' active' : '')}
                role="option"
                aria-selected=${idx === activeSlashIndex ? 'true' : 'false'}
                onMouseEnter=${() => setSlashActiveIndex(idx)}
                onMouseDown=${e => e.preventDefault()}
                onClick=${() => applySlashCommand(cmd.name)}
              >
                <span class="slash-cmd-name">${cmd.name}</span>
                <span class="slash-cmd-desc">${cmd.desc}</span>
              </div>
            `)}
          </div>
        `}
        <div class="input-row">
          <textarea
            id="message-input"
            ref=${textareaRef}
            placeholder=${executing ? "Processing…" : "Message… (/ for commands)"}
            rows="1"
            disabled=${executing}
            style=${{ opacity: executing ? 0.6 : 1 }}
            aria-label="Message input"
            aria-autocomplete="list"
            aria-expanded=${slashMenuOpen ? 'true' : 'false'}
            aria-controls=${slashMenuOpen ? slashPopupId : null}
            aria-activedescendant=${slashMenuOpen ? activeSlashOptionId : null}
            onInput=${handleInput}
            onKeyDown=${handleKeyDown}
            onPaste=${handlePaste}
            onDragOver=${e => e.preventDefault()}
            onDrop=${e => { e.preventDefault(); addImages(e.dataTransfer.files); }}
          ></textarea>
          <button class="input-btn attach-btn" title="Attach image" onClick=${() => fileInputRef.current?.click()}>
            <${Icon} name="paperclip" />
          </button>
          <input ref=${fileInputRef} type="file" accept="image/*" multiple style="display:none" onChange=${e => addImages(e.target.files)} />
          ${executing
            ? html`<button class="input-btn stop-btn" onClick=${onStop}>■ Stop</button>`
            : html`<button class="input-btn send-btn" onClick=${doSend}>Send</button>`
          }
        </div>
      </div>
    `;
  }

  // —— ChatApp root ——————————————————————————————————————————————————————
  function ChatApp() {
    // Connection (SSE replaces WebSocket)
    const [sseStatus, setSseStatus] = useState('disconnected');
    const sseRef = useRef(null); // active SSE manager for the current session

    // Sessions: Map<wsKey, SessionState>
    const [sessions, setSessions] = useState(new Map());
    const [activeKey, setActiveKey] = useState(null);
    const sessionCounterRef = useRef(0);

    // Current session state
    const [chronoItems, setChronoItems] = useState([]);
    const [executing, setExecuting] = useState(false);
    const [pendingApproval, setPendingApproval] = useState(null);
    const [sessionId, setSessionId] = useState(null);
    const [cwd, setCwd] = useState('~');
    const [defaultCwd, setDefaultCwd] = useState('~');
    const [turnCount, setTurnCount] = useState(0);
    const [diskUpdateNoticeSignal, setDiskUpdateNoticeSignal] = useState(0);

    // UI state
    const [viewMode, setViewMode] = useState('chat');
    const [showSessions, setShowSessions] = useState(true);
    const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
    const [syncingHistory, setSyncingHistory] = useState(false);
    const [historyListLoading, setHistoryListLoading] = useState(true);
    const [pendingHistorySyncCount, setPendingHistorySyncCount] = useState(0);
    const [hasMoreHistory, setHasMoreHistory] = useState(false);
    const [historyOffset, setHistoryOffset] = useState(0);
    const [loadingMoreHistory, setLoadingMoreHistory] = useState(false);
    const HISTORY_PAGE_SIZE = 100;
    const [sessionSortMode, setSessionSortMode] = useState('recent');
    const [sessionFilterQuery, setSessionFilterQuery] = useState('');
    const [showSessionFilter, setShowSessionFilter] = useState(false);
    const [collapsedDirGroups, setCollapsedDirGroups] = useState({});
    const [collapsedSpawnGroups, setCollapsedSpawnGroups] = useState({});
    const [pinnedSessionIds, setPinnedSessionIds] = useState(new Set());
    const [sessionPanelWidth, setSessionPanelWidth] = useState(300);
    const [activityPanelWidth, setActivityPanelWidth] = useState(460);
    const [draggingPane, setDraggingPane] = useState(null);
    const [theme, setTheme] = useState(() => {
      try {
        const saved = localStorage.getItem('chat-theme');
        if (saved === 'light' || saved === 'dark') return saved;
        if (
          typeof window !== 'undefined'
          && window.matchMedia
          && window.matchMedia('(prefers-color-scheme: light)').matches
        ) {
          return 'light';
        }
      } catch {}
      return 'dark';
    });

    // Refs (no re-renders)
    const orderCounterRef = useRef(0);
    const blockMapRef = useRef({});
    const cycleRef = useRef(0);
    const localIndexRef = useRef(0);
    const toolMapRef = useRef({});
    const childToToolRef = useRef({});
    const childAgentRef = useRef({});
    const sessionParentByIdRef = useRef({});
    const activeKeyRef = useRef(null);
    const sessionsRef = useRef(new Map());
    const chronoItemsRef = useRef([]);
    const turnCountRef = useRef(0);
    // Default CWD — amplifierd doesn't inject __AMPLIFIER_WORKSPACE_ROOT
    const defaultCwdRef = useRef('~');
    const draftCwdSyncKeyRef = useRef(null);
    const pendingEventsRef = useRef(new Map());
    const historyResumeTokenRef = useRef(0);
    const dragStateRef = useRef(null);
    // E2: Synthetic streaming — track which blocks received real deltas
    const seenDeltasRef = useRef(new Set());
    const syntheticAnimRef = useRef(new Map());
    // Accumulates token usage across LLM calls within a single turn
    const turnTokensRef = useRef(null);
    const placeholderIdRef = useRef(null);
    const historySyncInFlightRef = useRef(false);
    const transcriptFetchAbortRef = useRef(null);
    const diskRefreshInFlightRef = useRef(new Set());
    const autoDiskRefreshAtRef = useRef({});

    // — Sub-session rendering —
    const subSessionsRef = useRef(new Map());
    const subBlockMapRef = useRef(new Map());
    const subNextIndexRef = useRef(new Map());
    const [subSessionRevision, setSubSessionRevision] = useState(0);
    const subSessionRafRef = useRef(null);

    function resetSubSessionState() {
      subSessionsRef.current = new Map();
      subBlockMapRef.current = new Map();
      subNextIndexRef.current = new Map();
      if (subSessionRafRef.current) { cancelAnimationFrame(subSessionRafRef.current); subSessionRafRef.current = null; }
    }

    useEffect(() => {
      activeKeyRef.current = activeKey;
    }, [activeKey]);

    useEffect(() => {
      chronoItemsRef.current = chronoItems;
    }, [chronoItems]);

    useEffect(() => {
      sessionsRef.current = sessions;
    }, [sessions]);

    useEffect(() => {
      turnCountRef.current = turnCount;
    }, [turnCount]);

    useEffect(() => {
      defaultCwdRef.current = defaultCwd;
    }, [defaultCwd]);

    // amplifierd doesn't have a distro-settings endpoint; default CWD is '~'

    useEffect(() => {
      return () => {
        if (transcriptFetchAbortRef.current) {
          try { transcriptFetchAbortRef.current.abort(); } catch {}
          transcriptFetchAbortRef.current = null;
        }
      };
    }, []);

    useEffect(() => {
      document.body.setAttribute('data-theme', theme);
      try {
        localStorage.setItem('chat-theme', theme);
      } catch {}
    }, [theme]);

    useEffect(() => {
      const onMouseMove = (e) => {
        const drag = dragStateRef.current;
        if (!drag) return;
        const dx = e.clientX - drag.startX;
        if (drag.pane === 'sessions') {
          const min = 180;
          const max = Math.max(260, Math.min(560, window.innerWidth * 0.6));
          const next = Math.max(min, Math.min(max, drag.startWidth + dx));
          setSessionPanelWidth(next);
          return;
        }
        if (drag.pane === 'activity') {
          const min = 280;
          const max = Math.max(360, Math.min(900, window.innerWidth - 320));
          const next = Math.max(min, Math.min(max, drag.startWidth - dx));
          setActivityPanelWidth(next);
        }
      };

      const onMouseUp = () => {
        if (!dragStateRef.current) return;
        dragStateRef.current = null;
        setDraggingPane(null);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      };

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      return () => {
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      };
    }, []);

    useEffect(() => {
      if (!activeKey) return;
      const active = sessions.get(activeKey);
      if (!active) return;
      const isDraft =
        active.source !== 'history'
        && (active.turnCount || 0) === 0;
      if (!isDraft) {
        if (draftCwdSyncKeyRef.current === activeKey) {
          draftCwdSyncKeyRef.current = null;
        }
        return;
      }
      if (draftCwdSyncKeyRef.current === activeKey) return;
      const nextCwd = active.cwd || cwd || '~';
      draftCwdSyncKeyRef.current = activeKey;
      defaultCwdRef.current = nextCwd;
      setDefaultCwd(nextCwd);
    }, [activeKey, sessions, cwd]);

    useEffect(() => {
      if (!mobileSidebarOpen) return;
      const onKeyDown = (e) => {
        if (e.key === 'Escape') {
          setMobileSidebarOpen(false);
        }
      };
      window.addEventListener('keydown', onKeyDown);
      return () => {
        window.removeEventListener('keydown', onKeyDown);
      };
    }, [mobileSidebarOpen]);

    // —— Index mapping ————————————————————————————————————————————
    function getLocalIndex(serverIndex) {
      const key = `${cycleRef.current}-${serverIndex}`;
      if (!(key in blockMapRef.current)) {
        blockMapRef.current[key] = localIndexRef.current++;
      }
      return blockMapRef.current[key];
    }

    function getRequestedCwd() {
      return (defaultCwdRef.current || '').trim() || '~';
    }

    function nextOrder(items) {
      if (!Array.isArray(items) || items.length === 0) return 0;
      let maxOrder = -1;
      for (const item of items) {
        const order = Number(item?.order);
        if (Number.isFinite(order) && order > maxOrder) {
          maxOrder = order;
        }
      }
      return maxOrder + 1;
    }

    const applySessionForkLineage = useCallback((msg) => {
      const childId = normalizeSessionParentId(msg && msg.child_id);
      const parentId = normalizeSessionParentId(msg && msg.parent_id);
      const childAgent = typeof msg?.agent === 'string' && msg.agent ? msg.agent : null;

      if (childId && childAgent) {
        childAgentRef.current[childId] = childAgent;
      }
      if (childId && parentId) {
        sessionParentByIdRef.current[childId] = parentId;
      }
      if (!childId) return;

      setSessions(prev => {
        let changed = false;
        const next = new Map(prev);
        for (const [key, session] of next.entries()) {
          if (!session || session.sessionId !== childId) continue;
          const nextParent = parentId || session.parentSessionId || null;
          const nextAgent = childAgent || session.spawnAgent || null;
          if (nextParent === session.parentSessionId && nextAgent === session.spawnAgent) {
            continue;
          }
          next.set(key, {
            ...session,
            parentSessionId: nextParent,
            spawnAgent: nextAgent,
          });
          changed = true;
        }
        return changed ? next : prev;
      });
    }, []);

    // — Sub-session helpers —
    function bumpSubSessionRevision() {
      if (subSessionRafRef.current) return;
      subSessionRafRef.current = requestAnimationFrame(() => {
        subSessionRafRef.current = null;
        setSubSessionRevision(r => r + 1);
      });
    }

    function createSubSession(parentToolCallId, sessionId, agent) {
      subSessionsRef.current.set(parentToolCallId, {
        sessionId,
        parentToolCallId,
        agent: agent || null,
        status: 'running',
        content: [],
        toolCalls: [],
        orderCounter: 0,
      });
      subBlockMapRef.current.set(parentToolCallId, new Map());
      subNextIndexRef.current.set(parentToolCallId, 0);
    }

    function resolveSubSessionKey(msg) {
      if (msg.parent_tool_call_id && subSessionsRef.current.has(msg.parent_tool_call_id)) {
        return msg.parent_tool_call_id;
      }
      if (msg.child_session_id) {
        const mapped = childToToolRef.current[msg.child_session_id];
        if (mapped && subSessionsRef.current.has(mapped)) return mapped;
      }
      return null;
    }

    function addSubSessionContent(parentToolCallId, item) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      item.order = sub.orderCounter++;
      sub.content.push(item);
      bumpSubSessionRevision();
    }

    function updateSubSessionContent(parentToolCallId, updateFn) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      updateFn(sub);
      bumpSubSessionRevision();
    }

    function addSubSessionToolCall(parentToolCallId, item) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      item.order = sub.orderCounter++;
      sub.toolCalls.push(item);
      bumpSubSessionRevision();
    }

    function updateSubSessionToolCall(parentToolCallId, toolCallId, updateFn) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      const tc = sub.toolCalls.find(t => t.toolCallId === toolCallId);
      if (tc) updateFn(tc);
      bumpSubSessionRevision();
    }

    function endSubSession(parentToolCallId, status) {
      const sub = subSessionsRef.current.get(parentToolCallId);
      if (!sub) return;
      sub.status = status;
      subBlockMapRef.current.delete(parentToolCallId);
      subNextIndexRef.current.delete(parentToolCallId);
      bumpSubSessionRevision();
    }

    // —— WebSocket event handler ————————————————————————————————————
    const handleWsMessage = useCallback((msg, sourceKey = null) => {
      const ownerKey = sourceKey || activeKeyRef.current;
      const isActiveStream = ownerKey === activeKeyRef.current;
      if (!ownerKey) return;

      // user_message: broadcast from another client's prompt submission.
      // Handled before the active/background split so it works for both.
      // The originating browser already added the message optimistically
      // in sendMessage(), so skip if the latest user item matches.
      if (msg.type === 'user_message') {
        const umContent = msg.content || '';
        setChronoItems(prev => {
          const lastUser = [...prev].reverse().find(i => i.role === 'user' && i.type === 'text');
          if (lastUser && lastUser.content === umContent) return prev;
          return [...prev, {
            id: makeId(), type: 'text', role: 'user',
            content: umContent, streaming: false,
            order: orderCounterRef.current++,
          }];
        });
        return;
      }

      if (!isActiveStream) {
        // Keep session list metadata live even when this session is in
        // background, and queue renderable events for later replay.
        if (msg.type === 'session_created') {
          const nowIso = new Date().toISOString();
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const parentSessionId = normalizeSessionParentId(
              sessionParentByIdRef.current[msg.session_id] || s.parentSessionId
            );
            const spawnAgent = childAgentRef.current[msg.session_id] || s.spawnAgent || null;
            next.set(ownerKey, {
              ...s,
              sessionId: msg.session_id,
              cwd: msg.cwd || '~',
              serverCwd: msg.cwd || s.serverCwd || null,
              bundle: msg.bundle,
              source: 'live',
              status: 'idle',
              lastUpdated: s.lastUpdated || nowIso,
              hasExternalUpdate: false,
              isNewSession: false,
              parentSessionId,
              spawnAgent,
            });
            return next;
          });
          return;
        }

        if (msg.type === 'prompt_complete') {
          const nowIso = new Date().toISOString();
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const nextTurn = (s.turnCount || 0) + 1;
            next.set(ownerKey, {
              ...s,
              turnCount: nextTurn,
              savedTurnCount: nextTurn,
              status: 'idle',
              pendingApproval: false,
              lastUpdated: nowIso,
            });
            return next;
          });
          return;
        }

        if (msg.type === 'execution_cancelled') {
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, status: 'idle' });
            return next;
          });
          return;
        }

        if (msg.type === 'approval_request') {
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, pendingApproval: true });
            return next;
          });
          return;
        }

        if (msg.type === 'execution_error') {
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, {
              ...s,
              status: s.source === 'history' ? 'history' : 'error',
            });
            return next;
          });
        }

        if (msg.type === 'session_renamed') {
          setSessions(prev => {
            const next = new Map(prev);
            for (const [key, s] of next) {
              if (s.sessionId === msg.session_id) {
                next.set(key, { ...s, name: msg.name });
                break;
              }
            }
            return next;
          });
          return;
        }

        if (msg.type === 'session_fork') {
          applySessionForkLineage(msg);
        }

        if (msg.type !== 'auth_ok' && msg.type !== 'pong' && msg.type !== 'prompt_complete' && msg.type !== 'heartbeat') {
          const queued = pendingEventsRef.current.get(ownerKey) || [];
          queued.push(msg);
          pendingEventsRef.current.set(ownerKey, queued);
        }
        return;
      }

      switch (msg.type) {
        case 'auth_ok':
          break;

        case 'session_created': {
          const nowIso = new Date().toISOString();
          if (isActiveStream) {
            setSessionId(msg.session_id);
            setCwd(msg.cwd || '~');
          }
          if (!ownerKey) break;
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            const parentSessionId = normalizeSessionParentId(
              sessionParentByIdRef.current[msg.session_id] || s.parentSessionId
            );
            const spawnAgent = childAgentRef.current[msg.session_id] || s.spawnAgent || null;
            next.set(ownerKey, {
              ...s,
              sessionId: msg.session_id,
              cwd: msg.cwd || '~',
              // Track the server's canonical CWD (may differ from what we
              // sent if the server expanded ~ or resolved symlinks).
              serverCwd: msg.cwd || s.serverCwd || null,
              bundle: msg.bundle,
              source: 'live',
              status: 'idle',
              turnCount: s.turnCount || 0,
              lastUpdated: s.lastUpdated || nowIso,
              hasExternalUpdate: false,
              isNewSession: false,
              parentSessionId,
              spawnAgent,
            });
            return next;
          });
          break;
        }

        case 'execution_start':
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, status: 'running' });
            return next;
          });
          break;

        case 'execution_end':
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, {
              ...s,
              status: s.source === 'history' ? 'history' : 'idle',
            });
            return next;
          });
          break;

        case 'content_start': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              if (msg.block_type === 'text') {
                const itemId = makeId();
                const subIdx = subNextIndexRef.current.get(subKey) ?? 0;
                subNextIndexRef.current.set(subKey, subIdx + 1);
                const blockMap = subBlockMapRef.current.get(subKey);
                if (blockMap) blockMap.set('id-' + subIdx, itemId);
                addSubSessionContent(subKey, {
                  id: itemId, type: 'text', content: '', streaming: true, role: 'assistant',
                });
              } else if (msg.block_type === 'thinking') {
                const itemId = makeId();
                const subIdx = subNextIndexRef.current.get(subKey) ?? 0;
                subNextIndexRef.current.set(subKey, subIdx + 1);
                const blockMap = subBlockMapRef.current.get(subKey);
                if (blockMap) blockMap.set('thinking-id-' + subIdx, itemId);
                addSubSessionContent(subKey, {
                  id: itemId, type: 'thinking', content: '', streaming: true,
                });
              }
              break;
            }
          }
          // Remove client-side placeholder if present
          const placeholderId = placeholderIdRef.current;
          if (placeholderId) {
            setChronoItems(prev => prev.filter(item => item.id !== placeholderId));
            placeholderIdRef.current = null;
          }

          if (msg.block_type === 'text') {
            const itemId = makeId();
            const localIdx = getLocalIndex(msg.index);
            blockMapRef.current['id-' + localIdx] = itemId;
            setChronoItems(prev => [...prev, {
              id: itemId, type: 'text', content: '', streaming: true,
              order: orderCounterRef.current++, role: 'assistant',
            }]);
          } else if (msg.block_type === 'thinking') {
            const itemId = makeId();
            const localIdx = getLocalIndex(msg.index);
            blockMapRef.current['thinking-id-' + localIdx] = itemId;
            setChronoItems(prev => [...prev, {
              id: itemId, type: 'thinking', content: '', streaming: true,
              order: orderCounterRef.current++,
            }]);
          }
          break;
        }

        case 'content_delta': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              const delta = typeof msg.delta === 'string' ? msg.delta : '';
              if (!delta) break;
              const blockMap = subBlockMapRef.current.get(subKey);
              const subIdx = msg.index ?? 0;
              const textItemId = blockMap ? blockMap.get('id-' + subIdx) : null;
              if (textItemId) {
                const el = document.getElementById(textItemId);
                if (el) {
                  el.textContent += delta;
                } else {
                  updateSubSessionContent(subKey, sub => {
                    const item = sub.content.find(c => c.id === textItemId);
                    if (item) item.content += delta;
                  });
                }
              }
              break;
            }
          }
          const delta = typeof msg.delta === 'string' ? msg.delta : '';
          if (!delta) break;
          const localIdx = getLocalIndex(msg.index);
          // E2: mark this block as having received real streaming deltas
          seenDeltasRef.current.add(localIdx);
          const textItemId = blockMapRef.current['id-' + localIdx];
          const thinkingItemId = blockMapRef.current['thinking-id-' + localIdx];

          if (textItemId) {
            const el = document.getElementById(textItemId);
            if (el) {
              el.textContent += delta;
            } else {
              setChronoItems(prev => prev.map(item =>
                item.id === textItemId
                  ? { ...item, content: item.content + delta }
                  : item
              ));
            }
          }

          if (thinkingItemId) {
            setChronoItems(prev => prev.map(item =>
              item.id === thinkingItemId
                ? { ...item, content: item.content + delta }
                : item
            ));
          }
          break;
        }

        case 'content_end': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              const blockMap = subBlockMapRef.current.get(subKey);
              const subIdx = msg.index ?? 0;
              const textItemId = blockMap ? blockMap.get('id-' + subIdx) : null;
              const thinkItemId = blockMap ? blockMap.get('thinking-id-' + subIdx) : null;
              const payloadText = typeof msg.text === 'string' ? msg.text : '';
              if (textItemId) {
                const domEl = document.getElementById(textItemId);
                const domText = domEl ? domEl.textContent : '';
                const finalText = payloadText || domText;
                const parsedHtml = sanitizeHtml(marked.parse(finalText));
                updateSubSessionContent(subKey, sub => {
                  const item = sub.content.find(c => c.id === textItemId);
                  if (item) {
                    item.streaming = false;
                    item.content = finalText;
                    item.htmlContent = parsedHtml;
                  }
                });
              } else if (thinkItemId) {
                updateSubSessionContent(subKey, sub => {
                  const item = sub.content.find(c => c.id === thinkItemId);
                  if (item) {
                    item.streaming = false;
                    item.content = payloadText || item.content || '';
                  }
                });
              }
              break;
            }
          }
          const localIdx = getLocalIndex(msg.index);
          const payloadText = typeof msg.text === 'string' ? msg.text : '';
          const textItemId = blockMapRef.current['id-' + localIdx];
          const thinkingItemId = blockMapRef.current['thinking-id-' + localIdx];
          const domEl = textItemId ? document.getElementById(textItemId) : null;
          const domText = domEl?.textContent || '';

          // E2: Synthetic streaming — if a text block received its full text
          // via content_end but had zero prior content_delta events, the
          // provider doesn't stream.  Animate the text with rAF so the
          // response appears progressively instead of flashing in all at once.
          if (payloadText && textItemId && !seenDeltasRef.current.has(localIdx)) {
            // Cancel any stale animation for this block
            const staleRaf = syntheticAnimRef.current.get(localIdx);
            if (staleRaf) cancelAnimationFrame(staleRaf);

            const fullText = payloadText;
            // Adaptive chunk size: target ~3 s total animation duration
            const TARGET_MS = 3000;
            const chunkSize = Math.max(8, Math.min(200, Math.ceil(fullText.length / (TARGET_MS / 16))));
            let pos = 0;

            const tick = () => {
              const tickEl = document.getElementById(textItemId);
              if (!tickEl || pos >= fullText.length) {
                // Animation complete: finalize with parsed markdown
                syntheticAnimRef.current.delete(localIdx);
                const parsedHtml = sanitizeHtml(marked.parse(fullText));
                setChronoItems(prev => prev.map(item =>
                  item.id === textItemId
                    ? { ...item, streaming: false, content: fullText, htmlContent: parsedHtml }
                    : item
                ));
                return;
              }
              // Direct DOM write (same approach as real content_delta)
              tickEl.textContent += fullText.slice(pos, pos + chunkSize);
              pos += chunkSize;
              syntheticAnimRef.current.set(localIdx, requestAnimationFrame(tick));
            };

            syntheticAnimRef.current.set(localIdx, requestAnimationFrame(tick));
            seenDeltasRef.current.delete(localIdx);
            break; // skip normal finalization path
          }

          setChronoItems(prev => prev.map(item => {
            if (item.id === textItemId) {
              const finalText = payloadText || domText || item.content || '';
              const parsedHtml = sanitizeHtml(marked.parse(finalText));
              return {
                ...item,
                streaming: false,
                content: finalText,
                htmlContent: parsedHtml,
              };
            }
            if (item.id === thinkingItemId) {
              const finalThinking = payloadText || item.content || '';
              return {
                ...item,
                streaming: false,
                content: finalThinking,
              };
            }
            return item;
          }));
          break;
        }

        case 'thinking_delta': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              updateSubSessionContent(subKey, sub => {
                const item = sub.content.slice().reverse().find(c => c.type === 'thinking' && c.streaming);
                if (item) item.content += msg.delta;
              });
              break;
            }
          }
          // Use state update so content accumulates even when collapsed
          setChronoItems(prev => prev.map(item =>
            item.type === 'thinking' && item.streaming
              ? { ...item, content: item.content + msg.delta }
              : item
          ));
          break;
        }

        case 'thinking_final': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              updateSubSessionContent(subKey, sub => {
                const item = sub.content.slice().reverse().find(c => c.type === 'thinking' && c.streaming);
                if (item) {
                  item.content = msg.content;
                  item.streaming = false;
                }
              });
              break;
            }
          }
          setChronoItems(prev => prev.map(item =>
            item.type === 'thinking' && item.streaming
              ? { ...item, content: msg.content, streaming: false }
              : item
          ));
          break;
        }

        case 'token_usage': {
          // Accumulate across multiple LLM calls in the same turn (tool loops)
          const prev = turnTokensRef.current || {};
          turnTokensRef.current = {
            input_tokens:       (prev.input_tokens  || 0) + (msg.input_tokens  || 0),
            output_tokens:      (prev.output_tokens || 0) + (msg.output_tokens || 0),
            total_tokens:       (prev.total_tokens  || 0) + (msg.total_tokens  || 0),
            cache_read_tokens:  (prev.cache_read_tokens  || 0) + (msg.cache_read_tokens  || 0),
            cache_write_tokens: (prev.cache_write_tokens || 0) + (msg.cache_write_tokens || 0),
            model:    msg.model    || prev.model,
            provider: msg.provider || prev.provider,
          };
          break;
        }

        case 'tool_call': {
          // Sub-session routing
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              const itemId = makeId();
              // Register in toolMapRef so deeper session_forks can resolve
              toolMapRef.current[msg.tool_call_id] = itemId;
              addSubSessionToolCall(subKey, {
                id: itemId,
                type: 'tool_call',
                toolName: msg.tool_name,
                toolCallId: msg.tool_call_id,
                arguments: msg.arguments || {},
                toolStatus: 'running',
                origin: 'sub-agent',
                subAgentName: null,
              });
              break;
            }
          }
          // Remove client-side placeholder if tool call comes before content
          const placeholderId = placeholderIdRef.current;
          if (placeholderId) {
            setChronoItems(prev => prev.filter(item => item.id !== placeholderId));
            placeholderIdRef.current = null;
          }

          const itemId = makeId();
          const originSessionId = typeof msg.session_id === 'string' ? msg.session_id : null;
          const originParentId = typeof msg.parent_id === 'string' ? msg.parent_id : null;
          const subAgentName = originSessionId ? childAgentRef.current[originSessionId] : null;
          const isSubAgentTool = !!originParentId || !!(originSessionId && childToToolRef.current[originSessionId]);
          toolMapRef.current[msg.tool_call_id] = itemId;
          setChronoItems(prev => [...prev, {
            id: itemId, type: 'tool_call',
            toolName: msg.tool_name, toolCallId: msg.tool_call_id,
            arguments: msg.arguments || {},
            toolStatus: 'running',
            origin: isSubAgentTool ? 'sub-agent' : 'main',
            subAgentName: typeof subAgentName === 'string' && subAgentName ? subAgentName : null,
            originSessionId,
            originParentId,
            order: orderCounterRef.current++,
          }]);
          setExecuting(true);
          break;
        }

        case 'tool_result': {
          // Check if this result completes a sub-session (parent delegate/task finishing)
          if (subSessionsRef.current.has(msg.tool_call_id)) {
            endSubSession(msg.tool_call_id, msg.success ? 'complete' : 'error');
            // Still update the tool call item status in main chronoItems
            const itemId = toolMapRef.current[msg.tool_call_id];
            cycleRef.current++;
            setChronoItems(prev => prev.map(item =>
              item.id === itemId
                ? { ...item, toolStatus: msg.success ? 'complete' : 'error', result: msg.output, resultError: msg.error }
                : item
            ));
            break;
          }
          // Check if this is a tool result for a tool INSIDE a sub-session
          {
            const subKey = resolveSubSessionKey(msg);
            if (subKey && (msg.nesting_depth ?? 0) > 0) {
              updateSubSessionToolCall(subKey, msg.tool_call_id, tc => {
                tc.toolStatus = msg.success ? 'complete' : 'error';
                tc.result = msg.output;
                tc.resultError = msg.error;
              });
              break;
            }
          }
          const itemId = toolMapRef.current[msg.tool_call_id];
          cycleRef.current++;
          setChronoItems(prev => prev.map(item =>
            item.id === itemId
              ? { ...item, toolStatus: msg.success ? 'complete' : 'error', result: msg.output, resultError: msg.error }
              : item
          ));
          break;
        }

        case 'session_fork': {
          const childId = typeof msg.child_id === 'string' ? msg.child_id : null;
          applySessionForkLineage(msg);

          let parentToolCallId = msg.parent_tool_call_id || null;
          let parentItemId = parentToolCallId ? toolMapRef.current[parentToolCallId] : null;

          if (!parentItemId) {
            // FIFO fallback: oldest pending delegate/task without a sub-session
            const currentItems = chronoItemsRef.current;
            for (let i = 0; i < currentItems.length; i++) {
              const ci = currentItems[i];
              if (ci.type === 'tool_call'
                  && (ci.toolName === 'delegate' || ci.toolName === 'task')
                  && (ci.toolStatus === 'pending' || ci.toolStatus === 'running')
                  && !ci.subSessionId) {
                parentToolCallId = ci.toolCallId;
                parentItemId = ci.id;
                break;
              }
            }
          }

          if (!parentToolCallId || !parentItemId) break;

          if (childId) childToToolRef.current[childId] = parentToolCallId;

          createSubSession(parentToolCallId, childId, msg.agent);

          setChronoItems(prev => prev.map(item =>
            item.id === parentItemId
              ? { ...item, subSessionId: childId }
              : item
          ));
          break;
        }

        case 'display_message': {
          setChronoItems(prev => [...prev, {
            id: makeId(), type: 'text', role: 'system',
            content: `[${msg.level}] ${msg.message}`,
            streaming: false, order: orderCounterRef.current++,
          }]);
          break;
        }

        case 'approval_request':
          if (isActiveStream) {
            setPendingApproval(msg);
          }
          setSessions(prev => {
            const next = new Map(prev);
            if (ownerKey && next.has(ownerKey)) {
              const s = next.get(ownerKey);
              next.set(ownerKey, { ...s, pendingApproval: true });
            }
            return next;
          });
          break;

        case 'prompt_complete':
          {
            const nowIso = new Date().toISOString();
            let nextTurn = null;
            setSessions(prev => {
              const next = new Map(prev);
              const s = next.get(ownerKey) || {};
              nextTurn = (s.turnCount || 0) + 1;
              next.set(ownerKey, {
                ...s,
                turnCount: nextTurn,
                savedTurnCount: nextTurn,
                status: 'idle',
                pendingApproval: false,
                lastUpdated: nowIso,
              });
              return next;
            });
            setExecuting(false);
            setTurnCount(nextTurn ?? (turnCountRef.current + 1));
          }
          // Flush accumulated token usage as a chrono item
          if (turnTokensRef.current && (turnTokensRef.current.total_tokens || 0) > 0) {
            const snapTokens = turnTokensRef.current;
            setChronoItems(prev => [...prev, {
              id: makeId(),
              type: 'token_usage',
              order: orderCounterRef.current++,
              tokens: snapTokens,
            }]);
            turnTokensRef.current = null;
          }
          blockMapRef.current = {};
          cycleRef.current = 0;
          localIndexRef.current = 0;
          // E2: cancel any in-flight synthetic animations
          for (const rafId of syntheticAnimRef.current.values()) cancelAnimationFrame(rafId);
          syntheticAnimRef.current.clear();
          seenDeltasRef.current.clear();
          break;

        case 'execution_cancelled':
          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, { ...s, status: 'idle' });
            return next;
          });
          setExecuting(false);
          break;

        case 'execution_error': {
          // Remove client-side placeholder if error occurs immediately
          const placeholderId = placeholderIdRef.current;
          if (placeholderId) {
            setChronoItems(prev => prev.filter(item => item.id !== placeholderId));
            placeholderIdRef.current = null;
          }

          setSessions(prev => {
            const next = new Map(prev);
            const s = next.get(ownerKey) || {};
            next.set(ownerKey, {
              ...s,
              status: s.source === 'history' ? 'history' : 'error',
            });
            return next;
          });
          setExecuting(false);
          setChronoItems(prev => [...prev, {
            id: makeId(), type: 'text', role: 'system',
            content: 'Warning: ' + (msg.error || 'Unknown error'),
            streaming: false, order: orderCounterRef.current++,
          }]);
          break;
        }

        // NOTE: 'command_result' handler removed — commands now use
        // REST (POST /chat/command) and are not pushed over SSE.
        // 'command_result' is not in SSE_EVENT_TYPE_MAP so this branch
        // was unreachable. Results are handled by the REST response path.


        case 'cancel_acknowledged':
          // Server received the cancel request; awaiting full stop
          // Show brief indicator that cancel is in progress
          setChronoItems(prev => [...prev, {
            id: makeId(), type: 'text', role: 'system',
            content: 'Cancellation requested…',
            streaming: false, order: orderCounterRef.current++,
          }]);
          break;

        case 'session_renamed':
          setSessions(prev => {
            const next = new Map(prev);
            for (const [key, s] of next) {
              if (s.sessionId === msg.session_id) {
                next.set(key, { ...s, name: msg.name });
                break;
              }
            }
            return next;
          });
          break;

        case 'pong':
          break;

        default:
          break;
      }
    }, [applySessionForkLineage]);

    // —— REST + SSE connection ———————————————————————————————————————
    const connect = useCallback(async (sessionKey) => {
      setSseStatus('connecting');
      const requestedCwd = getRequestedCwd();
      try {
        const result = await api.createSession({ bundleName: null, workingDir: requestedCwd });
        const sessionId = result.session_id;
        if (!sessionId) throw new Error('No session_id in createSession response');

        handleWsMessage({
          type: 'session_created',
          session_id: sessionId,
          cwd: result.working_dir || requestedCwd,
          bundle: result.bundle_name || null,
        }, sessionKey);

        const sse = createSSEManager(sessionId, {
          onMessage: (msg) => {
            try { handleWsMessage(msg, sessionKey); } catch (err) {
              console.error('[SSE] handler error', err);
            }
          },
          onOpen: () => {
            if (activeKeyRef.current === sessionKey) setSseStatus('connected');
          },
          onError: () => {
            if (activeKeyRef.current === sessionKey) setSseStatus('disconnected');
          },
        });

        if (activeKeyRef.current === sessionKey) {
          sseRef.current = sse;
          setSseStatus('connected');
        }
        const requestedCwd2 = getRequestedCwd();
        setSessions(prev => {
          const next = new Map(prev);
          const s = next.get(sessionKey) || {};
          next.set(sessionKey, { ...s, sse, cwd: s.cwd || requestedCwd2, serverCwd: requestedCwd2 });
          return next;
        });
        return sessionId;
      } catch (err) {
        console.error('[chat] failed to create session', err);
        if (activeKeyRef.current === sessionKey) setSseStatus('disconnected');
        return null;
      }
    }, [handleWsMessage]);

    const syncSessionHistory = useCallback((options = {}) => {
      const silent = !!options.silent;
      if (historySyncInFlightRef.current) return;
      historySyncInFlightRef.current = true;
      if (!silent) setSyncingHistory(true);

      api.listSessionHistory(HISTORY_PAGE_SIZE)
        .then(data => {
          const rows = Array.isArray(data?.sessions) ? data.sessions : [];
          setHasMoreHistory(!!data?.has_more);
          setHistoryOffset(rows.length);
          if (!rows.length) {
            setPendingHistorySyncCount(0);
            return;
          }

          setSessions(prev => {
            const next = new Map(prev);
            const sessionKeyById = new Map();
            for (const [key, session] of next.entries()) {
              if (session && session.sessionId) {
                sessionKeyById.set(session.sessionId, key);
              }
            }

            let changed = false;
            for (const s of rows) {
              if (!s || !s.session_id) continue;
              const messageCount = Number(s.message_count) || 0;
              if (messageCount <= 0 && !s.last_user_message) continue;

              const sessionId = s.session_id;
              const revision = typeof s.revision === 'string' ? s.revision : null;
              const parentSessionId = normalizeSessionParentId(
                s.parent_session_id || sessionParentByIdRef.current[sessionId]
              );
              const spawnAgent = (
                (typeof s.spawn_agent === 'string' && s.spawn_agent)
                || childAgentRef.current[sessionId]
                || null
              );
              if (parentSessionId) {
                sessionParentByIdRef.current[sessionId] = parentSessionId;
              }
              if (spawnAgent) {
                childAgentRef.current[sessionId] = spawnAgent;
              }
              const existingKey = sessionKeyById.get(sessionId);

              if (!existingKey) {
                const historyKey = 'history-' + sessionId;
                if (next.has(historyKey)) continue;
                // New session never seen by this client.
                // Only badge on explicit user-initiated sync (!silent) — not on
                // initial page load or background refresh, which would flag every
                // historical session as "New" after a server restart.
                const hasContent = messageCount > 0;
                const badgeNew = !silent && hasContent;
                next.set(historyKey, {
                  source: 'history',
                  status: 'history',
                  sessionId,
                  cwd: s.cwd || '~',
                  turnCount: messageCount,
                  savedTurnCount: messageCount,
                  messageCount,
                  lastUserMessage: s.last_user_message || null,
                  lastUpdated: s.last_updated || null,
                  name: s.name || null,
                  description: s.description || null,
                  knownRevision: badgeNew ? null : revision,
                  remoteRevision: revision,
                  hasExternalUpdate: badgeNew,
                  isNewSession: badgeNew,
                  parentSessionId,
                  spawnAgent,
                  name: s.name || null,
                  description: s.description || null,
                });
                sessionKeyById.set(sessionId, historyKey);
                changed = true;
                continue;
              }

              const cur = next.get(existingKey) || {};
              const remoteRevision = revision ?? cur.remoteRevision ?? null;
              // For live sessions (active WS), keep knownRevision in sync with
              // disk so the "Updated" badge doesn't flicker — WS delivers content.
              const isLive = cur.source === 'live';
              const knownRevision = (cur.knownRevision == null || isLive) ? remoteRevision : cur.knownRevision;
              const hasExternalUpdate = !!cur.hasExternalUpdate
                || (
                  knownRevision != null
                  && remoteRevision != null
                  && knownRevision !== remoteRevision
                );

              const treatAsHistory = cur.source === 'history' || !cur.sse;
              const nextSource = treatAsHistory ? 'history' : cur.source;
              const nextStatus = treatAsHistory
                ? ((cur.status && cur.status !== 'history') ? cur.status : 'history')
                : cur.status;
              const nextTurnCount = (
                treatAsHistory && (cur.status === 'history' || cur.source === 'history')
              )
                ? (messageCount || cur.turnCount || 0)
                : cur.turnCount;
              const nextSavedTurnCount = (
                treatAsHistory && (cur.status === 'history' || cur.source === 'history')
              )
                ? (messageCount || cur.savedTurnCount || cur.turnCount || 0)
                : cur.savedTurnCount;
              const nextMessageCount = messageCount || cur.messageCount || cur.turnCount || 0;
              const nextCwd = s.cwd || cur.cwd || '~';
              const nextLastUserMessage = s.last_user_message || cur.lastUserMessage || null;
              const nextLastUpdated = s.last_updated || cur.lastUpdated || null;
              const nextParentSessionId = parentSessionId || cur.parentSessionId || null;
              const nextSpawnAgent = spawnAgent || cur.spawnAgent || null;
              const nextName = s.name || cur.name || null;
              const nextDescription = s.description || cur.description || null;

              const rowChanged =
                nextCwd !== cur.cwd
                || nextMessageCount !== cur.messageCount
                || nextLastUserMessage !== cur.lastUserMessage
                || nextLastUpdated !== cur.lastUpdated
                || remoteRevision !== cur.remoteRevision
                || knownRevision !== cur.knownRevision
                || hasExternalUpdate !== !!cur.hasExternalUpdate
                || nextSource !== cur.source
                || nextStatus !== cur.status
                || nextTurnCount !== cur.turnCount
                || nextSavedTurnCount !== cur.savedTurnCount
                || nextParentSessionId !== cur.parentSessionId
                || nextSpawnAgent !== cur.spawnAgent
                || nextName !== cur.name
                || nextDescription !== cur.description;

              if (!rowChanged) continue;

              next.set(existingKey, {
                ...cur,
                source: nextSource,
                status: nextStatus,
                cwd: nextCwd,
                turnCount: nextTurnCount,
                savedTurnCount: nextSavedTurnCount,
                messageCount: nextMessageCount,
                lastUserMessage: nextLastUserMessage,
                lastUpdated: nextLastUpdated,
                knownRevision,
                remoteRevision,
                hasExternalUpdate,
                parentSessionId: nextParentSessionId,
                spawnAgent: nextSpawnAgent,
                name: nextName,
                description: nextDescription,
              });
              changed = true;
            }

            return changed ? next : prev;
          });
          setPendingHistorySyncCount(0);
          // Load pin state from server
          fetchPinnedSessions().then(pinSet => setPinnedSessionIds(pinSet));
        })
        .catch(err => {
          console.warn('[chat] failed to load session history', err);
        })
        .finally(() => {
          historySyncInFlightRef.current = false;
          setHistoryListLoading(false);
          if (!silent) setSyncingHistory(false);
        });
    }, []);

    const refreshHistory = useCallback(() => {
      // Consolidated poll: replaces both discoverNewHistorySessions (30s)
      // and pollSessionRevisions (7s).  A silent history sync detects new
      // sessions, name/description changes, and revision updates in one call.
      syncSessionHistory({ silent: true });
    }, [syncSessionHistory]);

    const loadMoreHistory = useCallback(() => {
      if (loadingMoreHistory || !hasMoreHistory) return;
      setLoadingMoreHistory(true);

      const nextOffset = historyOffset;
      api.listSessionHistory(HISTORY_PAGE_SIZE, nextOffset)
        .then(data => {
          const rows = Array.isArray(data?.sessions) ? data.sessions : [];
          setHasMoreHistory(!!data?.has_more);
          setHistoryOffset(nextOffset + rows.length);

          if (!rows.length) return;

          setSessions(prev => {
            const next = new Map(prev);
            const sessionKeyById = new Map();
            for (const [key, session] of next.entries()) {
              if (session && session.sessionId) {
                sessionKeyById.set(session.sessionId, key);
              }
            }

            let changed = false;
            for (const s of rows) {
              if (!s || !s.session_id) continue;
              const messageCount = Number(s.message_count) || 0;
              if (messageCount <= 0 && !s.last_user_message) continue;

              const sessionId = s.session_id;
              if (sessionKeyById.has(sessionId)) continue; // already loaded

              const revision = typeof s.revision === 'string' ? s.revision : null;
              const parentSessionId = normalizeSessionParentId(s.parent_session_id);
              const spawnAgent = (typeof s.spawn_agent === 'string' && s.spawn_agent) || null;
              if (parentSessionId) sessionParentByIdRef.current[sessionId] = parentSessionId;
              if (spawnAgent) childAgentRef.current[sessionId] = spawnAgent;

              const historyKey = 'history-' + sessionId;
              if (next.has(historyKey)) continue;
              next.set(historyKey, {
                source: 'history',
                status: 'history',
                sessionId,
                cwd: s.cwd || '~',
                turnCount: messageCount,
                savedTurnCount: messageCount,
                messageCount,
                lastUserMessage: s.last_user_message || null,
                lastUpdated: s.last_updated || null,
                name: s.name || null,
                description: s.description || null,
                knownRevision: revision,
                remoteRevision: revision,
                hasExternalUpdate: false,
                isNewSession: false,
                parentSessionId,
                spawnAgent,
              });
              sessionKeyById.set(sessionId, historyKey);
              changed = true;
            }

            return changed ? next : prev;
          });
        })
        .catch(err => {
          console.warn('[chat] failed to load more history', err);
        })
        .finally(() => {
          setLoadingMoreHistory(false);
        });
    }, [historyOffset, hasMoreHistory, loadingMoreHistory]);

    const handleTogglePin = useCallback(async (sessionId, currentlyPinned) => {
      if (currentlyPinned) {
        const card = document.querySelector('[data-session-id="' + sessionId + '"]');
        if (card) card.classList.add('session-card-unpinning');
        setTimeout(async () => {
          await apiUnpinSession(sessionId);
          setPinnedSessionIds(prev => {
            const next = new Set(prev);
            next.delete(sessionId);
            return next;
          });
          requestAnimationFrame(() => {
            const el = document.querySelector('[data-session-id="' + sessionId + '"]');
            if (el) {
              el.classList.add('session-card-just-unpinned');
              setTimeout(() => el.classList.remove('session-card-just-unpinned'), 400);
            }
          });
        }, 150);
      } else {
        await apiPinSession(sessionId);
        setPinnedSessionIds(prev => new Set(prev).add(sessionId));
        requestAnimationFrame(() => {
          const el = document.querySelector('[data-session-id="' + sessionId + '"]');
          if (el) {
            el.classList.add('session-card-just-pinned');
            setTimeout(() => el.classList.remove('session-card-just-pinned'), 250);
          }
        });
      }
    }, []);

    useEffect(() => {
      const key = 'session-' + (++sessionCounterRef.current);
      const initialCwd = getRequestedCwd();
      const nowIso = new Date().toISOString();
      activeKeyRef.current = key;
      setActiveKey(key);
      setSessions(new Map([[key, {
        status: 'idle',
        turnCount: 0,
        cwd: initialCwd,
        lastUpdated: nowIso,
      }]]));
      syncSessionHistory({ silent: true });
    }, [syncSessionHistory]);

    useEffect(() => {
      const onFocus = () => refreshHistory();
      const onVisibility = () => {
        if (document.visibilityState === 'visible') {
          // SSE reconnects automatically; just refresh session list
          refreshHistory();
        }
      };
      const intervalId = window.setInterval(() => {
        refreshHistory();
      }, 10000);

      window.addEventListener('focus', onFocus);
      document.addEventListener('visibilitychange', onVisibility);
      return () => {
        window.clearInterval(intervalId);
        window.removeEventListener('focus', onFocus);
        document.removeEventListener('visibilitychange', onVisibility);
      };
    }, [refreshHistory]);

    useEffect(() => {
      if (sessionSortMode !== 'directory') return;
      const groupKeys = new Set();
      const allEntries = Array.from(sessions.entries());
      const tree = buildSessionTree(allEntries);
      for (const [, session] of tree.roots) {
        groupKeys.add(normalizeCwd(session && session.cwd));
      }
      setCollapsedDirGroups(prev => {
        const next = { ...prev };
        let changed = false;
        for (const key of groupKeys) {
          if (!(key in next)) {
            next[key] = true;
            changed = true;
          }
        }
        for (const key of Object.keys(next)) {
          if (!groupKeys.has(key)) {
            delete next[key];
            changed = true;
          }
        }
        return changed ? next : prev;
      });
    }, [sessionSortMode, sessions]);

    useEffect(() => {
      const allEntries = Array.from(sessions.entries());
      const tree = buildSessionTree(allEntries);
      const parentIds = new Set();
      for (const [key, session] of tree.roots) {
        const children = tree.childrenByParentKey.get(key) || [];
        if (!children.length) continue;
        const sid = session && session.sessionId ? session.sessionId : key;
        parentIds.add(sid);
      }
      for (const children of tree.childrenByParentKey.values()) {
        for (const [key, session] of children) {
          const grandchildren = tree.childrenByParentKey.get(key) || [];
          if (!grandchildren.length) continue;
          const sid = session && session.sessionId ? session.sessionId : key;
          parentIds.add(sid);
        }
      }
      setCollapsedSpawnGroups(prev => {
        const next = { ...prev };
        let changed = false;
        for (const sid of parentIds) {
          if (!(sid in next)) {
            next[sid] = true;
            changed = true;
          }
        }
        for (const sid of Object.keys(next)) {
          if (!parentIds.has(sid)) {
            delete next[sid];
            changed = true;
          }
        }
        return changed ? next : prev;
      });
    }, [sessions]);

    const toggleDirGroup = useCallback((groupKey) => {
      setCollapsedDirGroups(prev => {
        const current = Object.prototype.hasOwnProperty.call(prev, groupKey)
          ? !!prev[groupKey]
          : true;
        return {
          ...prev,
          [groupKey]: !current,
        };
      });
    }, []);

    const toggleSpawnGroup = useCallback((parentId) => {
      setCollapsedSpawnGroups(prev => {
        const current = Object.prototype.hasOwnProperty.call(prev, parentId)
          ? !!prev[parentId]
          : true;
        return {
          ...prev,
          [parentId]: !current,
        };
      });
    }, []);

    // —— Send ————————————————————————————————————————————————————————
    // — Sub-session navigation —
    const navigateToSession = useCallback((sessionId) => {
      if (!sessionId) return;
      for (const [key, session] of sessionsRef.current.entries()) {
        if (session && session.sessionId === sessionId) {
          setActiveKey(key);
          return;
        }
      }
    }, []);

    const sendMessage = useCallback(async (content, images) => {
      const key = activeKeyRef.current;
      let activeSession = key ? sessionsRef.current.get(key) : null;
      let sessionId = activeSession?.sessionId || null;

      // Lazy session creation: create on first real interaction
      if (!sessionId) {
        sessionId = await connect(key);
        if (!sessionId) {
          setChronoItems(prev => [...prev, {
