      // Lazy session creation (same as sendMessage)
      if (!sessionId) {
        sessionId = await connect(key);
        if (!sessionId) {
          setChronoItems(prev => [...prev, {
            id: makeId(), type: 'text', role: 'system',
            content: 'Error: Could not create session.',
            streaming: false, order: orderCounterRef.current++,
          }]);
          return;
        }
        activeSession = sessionsRef.current.get(activeKeyRef.current);
      }

      // CWD resolution: session metadata -> server-reported -> CWD picker value
      // Avoid '~' from history sessions with missing metadata — prefer the
      // user's configured default CWD from the picker in that case.
      let cwd = activeSession?.cwd;
      if (!cwd || cwd === '~') cwd = activeSession?.serverCwd;
      if (!cwd || cwd === '~') cwd = getRequestedCwd();

      try {
        const resp = await api.shellStream(sessionId, command, cwd);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let currentItem = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = null;
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7).trim();
            } else if (line.startsWith('data: ') && eventType) {
              try {
                const data = JSON.parse(line.slice(6));
                if (eventType === 'tool:pre') {
                  currentItem = {
                    id: 'shell_' + Date.now(),
                    type: 'tool_call',
                    toolName: data.name,
                    toolCallId: data.tool_call_id,
                    arguments: data.arguments,
                    toolStatus: 'running',
                    result: '',
                    userInitiated: true,
                    streaming: true,
                    order: orderCounterRef.current++,
                  };
                  setChronoItems(prev => [...prev, currentItem]);
                } else if (eventType === 'tool:output' && currentItem) {
                  currentItem = { ...currentItem, result: currentItem.result + data.partial_output };
                  setChronoItems(prev =>
                    prev.map(it => it.toolCallId === currentItem.toolCallId ? currentItem : it)
                  );
                } else if (eventType === 'tool:post' && currentItem) {
                  currentItem = {
                    ...currentItem,
                    result: data.result,
                    toolStatus: data.error ? 'error' : 'complete',
                    resultError: data.error ? data.result : null,
                    streaming: false,
                  };
                  setChronoItems(prev =>
                    prev.map(it => it.toolCallId === currentItem.toolCallId ? currentItem : it)
                  );
                }
              } catch (parseErr) {
                console.warn('[shell] failed to parse SSE data:', parseErr);
              }
              eventType = null;
            }
          }
        }
      } catch (err) {
        console.error('[shell] execution error:', err);
        setChronoItems(prev => [...prev, {
          id: makeId(), type: 'text', role: 'system',
          content: 'Shell error: ' + (err?.message || 'Command execution failed'),
          streaming: false, order: orderCounterRef.current++,
        }]);
      }
    }, []);

    const stopExecution = useCallback(() => {
      const key = activeKeyRef.current;
      const activeSession = key ? sessionsRef.current.get(key) : null;
      const sessionId = activeSession?.sessionId || null;
      if (sessionId) {
        api.cancelExecution(sessionId, false).catch(err => {
          console.error('[chat] cancelExecution failed', err);
        });
      }
      // Pause queue drain — items remain visible, user must Resume
      cancelCountdown();
      if (getQueue(key).length > 0) {
        setQueueDrainStateFn('paused', key);
      }
    }, []);

    const respondToApproval = useCallback((choice) => {
      const key = activeKeyRef.current;
      const activeSession = key ? sessionsRef.current.get(key) : null;
      const sessionId = activeSession?.sessionId || null;
      if (pendingApproval && sessionId) {
        api.respondToApproval(sessionId, pendingApproval.id, choice).catch(err => {
          console.error('[chat] respondToApproval failed', err);
        });
      }
      setPendingApproval(null);
      setSessions(prev => {
        const next = new Map(prev);
        const key = activeKeyRef.current;
        if (key && next.has(key)) {
          const s = next.get(key);
          next.set(key, { ...s, pendingApproval: false });
        }
        return next;
      });
    }, [pendingApproval]);

    const newSession = useCallback(() => {
      const requestedCwd = getRequestedCwd();
      const nowIso = new Date().toISOString();
      if (transcriptFetchAbortRef.current) {
        try { transcriptFetchAbortRef.current.abort(); } catch {}
        transcriptFetchAbortRef.current = null;
      }
      const prevKey = activeKeyRef.current;
      if (prevKey) {
        setSessions(prev => {
          const next = new Map(prev);
          const cur = next.get(prevKey) || {};
          next.set(prevKey, {
            ...cur,
            savedItems: chronoItemsRef.current,
            savedTurnCount: turnCountRef.current,
          });
          return next;
        });
      }

      const key = 'session-' + (++sessionCounterRef.current);
      activeKeyRef.current = key;
      setActiveKey(key);
      setChronoItems([]);
      orderCounterRef.current = 0;
      setTurnCount(0);
      setHoveredTurnId(null);
      setActiveTurnId(null);
      setSelectedTurnId(null);
      setSelectedSegmentId(null);
      // Cancel any countdown and clear queue from the previous session
      cancelCountdown();
      activeDelegatesRef.current = 0;
      if (prevKey) clearSessionQueue(prevKey);
      setExecuting(false);
      setPendingApproval(null);
      placeholderIdRef.current = null;
      setSessionId(null);
      setCwd(requestedCwd);
      setSseStatus('idle');
      setSessions(prev => {
        const next = new Map(prev);
        next.set(key, {
          status: 'idle',
          turnCount: 0,
          cwd: requestedCwd,
          lastUpdated: nowIso,
        });
        return next;
      });
      blockMapRef.current = {};
      resetSubSessionState();
      cycleRef.current = 0;
      localIndexRef.current = 0;
      toolMapRef.current = {};
      // E2: finalize any in-flight synthetic animations with proper content
      finalizeSyntheticAnimations();
      seenDeltasRef.current.clear();

    }, []);

    const resumeHistorySession = useCallback((key) => {
      // Cancel any active countdown on the current session before we do
      // anything else. Call-site contract: callers (e.g. switchSession) may
      // already call cancelCountdown before delegating here, but doing it
      // again is safe (idempotent) and guards against direct callers that
      // don't go through switchSession.
      cancelCountdown(activeKeyRef.current);

      // Fall back to sessionsRef when React state hasn't batched yet
      // (same race condition as switchSession — see comment there).
      const target = sessions.get(key) || sessionsRef.current.get(key);
      if (!target || !target.sessionId) return;

      if (transcriptFetchAbortRef.current) {
        try { transcriptFetchAbortRef.current.abort(); } catch {}
      }
      const transcriptAbort = new AbortController();
      transcriptFetchAbortRef.current = transcriptAbort;

      const resumeToken = ++historyResumeTokenRef.current;

      const currentKey = activeKeyRef.current;
      if (currentKey && currentKey !== key) {
        setSessions(prev => {
          const next = new Map(prev);
          const cur = next.get(currentKey) || {};
          next.set(currentKey, {
            ...cur,
            savedItems: chronoItemsRef.current,
            savedTurnCount: turnCountRef.current,
          });
          return next;
        });
      }

      activeKeyRef.current = key;
      setActiveKey(key);
      setMobileSidebarOpen(false);
      setExecuting(false);
      setPendingApproval(null);
      setHoveredTurnId(null);
      setActiveTurnId(null);
      setSelectedTurnId(null);
      setSelectedSegmentId(null);
      setSessionId(target.sessionId);
      setCwd(target.cwd || '~');
      const cachedItems = target.savedItems || [];
      setChronoItems(cachedItems);
      orderCounterRef.current = nextOrder(cachedItems);
      setTurnCount(target.savedTurnCount || target.turnCount || 0);
      setSseStatus('connecting');
      setSessions(prev => {
        const next = new Map(prev);
        const cur = next.get(key) || {};
        next.set(key, { ...cur, status: 'loading_history', source: 'history' });
        return next;
      });
      blockMapRef.current = {};
      resetSubSessionState();
      cycleRef.current = 0;
      localIndexRef.current = 0;
      toolMapRef.current = {};
      // E2: finalize any in-flight synthetic animations with proper content
      finalizeSyntheticAnimations();
      seenDeltasRef.current.clear();

      // Fetch transcript via amplifierd REST API
      api.getTranscript(target.sessionId)
        .then(async (data) => {
          if (transcriptAbort.signal.aborted) return;
          const transcript = Array.isArray(data?.transcript) ? data.transcript : [];
          let items = transcriptToChronoItems(transcript);
          await reconstructSubSessionsFromTranscript(items, subSessionsRef);
          setSubSessionRevision(r => r + 1);

          // D-04: Rebuild child→parent session mapping from transcript tool_call items.
          // After a page reload sessionParentByIdRef is empty; without this the
          // global SSE can't route delegate events to the parent session.
          // NOTE: This only runs for the session being resumed. For deep nesting
          // (grandchild→child→parent), intermediate lineage relies on
          // syncSessionHistory's server-side parent_session_id pre-population
          // (see syncSessionHistory). A full fix would fetch transcripts for all
          // visible running sessions on mount, but that's an N+1 API call concern.
          for (const item of items) {
            if (item.type === 'tool_call' && item.subSessionId) {
              sessionParentByIdRef.current[item.subSessionId] = target.sessionId;
            }
          }

          const messageCount = countTranscriptMessages(transcript);
          const restoredTurns = messageCount || target.savedTurnCount || target.turnCount || 0;
          const revision = typeof data?.revision === 'string'
            ? data.revision
            : (target.remoteRevision || target.knownRevision || null);
          const lastUserMessage = extractLastUserMessage(transcript) || target.lastUserMessage || null;
          setSessions(prev => {
            const next = new Map(prev);
            const cur = next.get(key) || {};
            next.set(key, {
              ...cur,
              savedItems: items,
              savedTurnCount: restoredTurns,
              turnCount: restoredTurns,
              messageCount: messageCount || restoredTurns,
              lastUserMessage,
              lastUpdated: data?.last_updated || cur.lastUpdated || null,
              knownRevision: revision,
              remoteRevision: revision,
              hasExternalUpdate: false,
              isNewSession: false,
              status: 'connecting',
              source: 'history',
            });
            return next;
          });

          if (
            activeKeyRef.current !== key
            || historyResumeTokenRef.current !== resumeToken
          ) {
            return;
          }

          setChronoItems(items);
          orderCounterRef.current = nextOrder(items);
          setTurnCount(restoredTurns);

          // Resume the session in amplifierd so it's live in memory
          let resumeOk = false;
          let resumeReason = '';
          try {
            await api.resumeSession(target.sessionId);
            resumeOk = true;
          } catch (err) {
            console.error('[chat] session resume failed', target.sessionId, err);
            resumeReason = err?.message || String(err);
          }

          if (
            activeKeyRef.current !== key
            || historyResumeTokenRef.current !== resumeToken
          ) {
            return;
          }

          if (resumeOk) {
            if (activeKeyRef.current === key) {
              setSseStatus('connected');
            }
            setSessions(prev => {
              const next = new Map(prev);
              const cur = next.get(key) || {};
              next.set(key, { ...cur, source: 'live', status: 'idle' });
              return next;
            });
          } else {
            // Resume failed — leave as read-only history
            setSessions(prev => {
              const next = new Map(prev);
              const cur = next.get(key) || {};
              next.set(key, { ...cur, status: 'history', source: 'history' });
              return next;
            });
            setChronoItems(prev => [...prev, {
              id: makeId(), type: 'text', role: 'system',
              content: `Could not resume this session. You can view the history but cannot send new messages.\n\n${resumeReason}`,
              streaming: false, order: orderCounterRef.current++,
            }]);
            setSseStatus('disconnected');
            return;
          }
        })
        .catch(err => {
          if (transcriptAbort.signal.aborted || err?.name === 'AbortError') {
            return;
          }
          console.error('[chat] failed to resume history session', err);
          if (
            activeKeyRef.current === key
            && historyResumeTokenRef.current === resumeToken
          ) {
            setSseStatus('disconnected');
            setChronoItems([{
              id: makeId(),
              type: 'text',
              role: 'system',
              content: 'Warning: Could not resume this session. Try another recent session.',
              streaming: false,
              order: orderCounterRef.current++,
            }]);
          }
          setSessions(prev => {
            const next = new Map(prev);
            const cur = next.get(key) || {};
            next.set(key, { ...cur, status: 'history', source: 'history' });
            return next;
          });
        })
        .finally(() => {
          if (transcriptFetchAbortRef.current === transcriptAbort) {
            transcriptFetchAbortRef.current = null;
          }
        });
    }, [sessions, handleWsMessage]);

    const refreshSessionFromDisk = useCallback((key, options = {}) => {
      const target = sessionsRef.current.get(key);
      if (!target || !target.sessionId) return;
      if (target.status === 'loading_history') return;
      if (diskRefreshInFlightRef.current.has(key)) return;

      diskRefreshInFlightRef.current.add(key);
      const notifyBottom = !!options.notifyBottom;
      const activeOnly = !!options.activeOnly;
      if (activeOnly && activeKeyRef.current !== key) {
        diskRefreshInFlightRef.current.delete(key);
        return;
      }
      const previousCount = Number(
        target.messageCount || target.savedTurnCount || target.turnCount || 0
      );

      api.getTranscript(target.sessionId)
        .then(async (data) => {
          const transcript = Array.isArray(data?.transcript) ? data.transcript : [];
          let items = transcriptToChronoItems(transcript);
          await reconstructSubSessionsFromTranscript(items, subSessionsRef);
          setSubSessionRevision(r => r + 1);
          const messageCount = countTranscriptMessages(transcript);
          const nextTurns = messageCount || target.savedTurnCount || target.turnCount || 0;
          const nextCount = Number(messageCount || nextTurns || 0);
          const revision = typeof data?.revision === 'string'
            ? data.revision
            : (target.remoteRevision || target.knownRevision || null);
          const lastUserMessage = extractLastUserMessage(transcript) || target.lastUserMessage || null;
          if (activeOnly && activeKeyRef.current !== key) return;

          setSessions(prev => {
            const next = new Map(prev);
            const cur = next.get(key) || {};
            next.set(key, {
              ...cur,
              savedItems: items,
              savedTurnCount: nextTurns,
              turnCount: nextTurns,
              messageCount: messageCount || nextTurns,
              lastUserMessage,
              lastUpdated: data?.last_updated || cur.lastUpdated || null,
              knownRevision: revision,
              remoteRevision: revision,
              hasExternalUpdate: false,
              isNewSession: false,
            });
            return next;
          });

          if (activeKeyRef.current !== key) return;
          const hasNewMessages = nextCount > previousCount;
          setChronoItems(items);
          orderCounterRef.current = nextOrder(items);
          setTurnCount(nextTurns);
          setExecuting(false);
          setPendingApproval(null);
          // After a successful refresh, clear any stuck streaming states
          // that might have been persisted.
          setChronoItems(prev => {
            if (!prev.some(i => i.streaming)) return prev;
            return prev.map(i => i.streaming ? { ...i, streaming: false } : i);
          });
          if (notifyBottom && hasNewMessages) {
            setDiskUpdateNoticeSignal(v => v + 1);
          }
        })
        .catch(err => {
          console.warn('[chat] failed to refresh session from disk', err);
          if (activeKeyRef.current !== key) return;
          setChronoItems(prev => [...prev, {
            id: makeId(),
            type: 'text',
            role: 'system',
            content: 'Warning: Could not refresh this session from disk.',
            streaming: false,
            order: orderCounterRef.current++,
          }]);
        })
        .finally(() => {
          diskRefreshInFlightRef.current.delete(key);
        });
    }, []);

    const switchSession = useCallback((key) => {
      clearWatchdogTimer();
      const currentKey = activeKeyRef.current;
      if (key === currentKey) return;

      if (transcriptFetchAbortRef.current) {
        try { transcriptFetchAbortRef.current.abort(); } catch {}
        transcriptFetchAbortRef.current = null;
      }

      // Fall back to sessionsRef (mutable ref) when React state hasn't
      // batched yet — handleForkAtTurn writes to the ref synchronously
      // before calling switchSession, but setSessions is async.
      const target = sessions.get(key) || sessionsRef.current.get(key) || {};

      // Cancel any active countdown when switching away (must happen before any early return)
      cancelCountdown(currentKey);
      activeDelegatesRef.current = 0;

      if (target.source === 'history') {
        resumeHistorySession(key);
        return;
      }

      // Save current session's messages
      if (currentKey) {
        setSessions(prev => {
          const next = new Map(prev);
          const cur = next.get(currentKey) || {};
          next.set(currentKey, {
            ...cur,
            savedItems: chronoItemsRef.current,
            savedTurnCount: turnCountRef.current,
            savedPlaceholderId: placeholderIdRef.current,
            savedBlockMap: { ...blockMapRef.current },
            savedToolMap: { ...toolMapRef.current },
          });
          return next;
        });
      }

      // Load target session
      const targetItems = target.savedItems || [];
      setChronoItems(targetItems);
      orderCounterRef.current = nextOrder(targetItems);
      setTurnCount(target.savedTurnCount || 0);
      setExecuting(target.status === 'running');
      executingRef.current = (target.status === 'running');
      // If the target session had an active countdown, restart it
      if (target.status !== 'running') {
        tryDrainQueue();
      }
      setPendingApproval(null);
      // Don't null placeholderIdRef here — let the replay's content_start
      // handler use it to remove the stale placeholder. Nulled after replay.
      setSessionId(target.sessionId || null);
      setCwd(target.cwd || '~');
      activeKeyRef.current = key;
      setActiveKey(key);
      setMobileSidebarOpen(false);
      setHoveredTurnId(null);
      setActiveTurnId(null);
      setSelectedTurnId(null);
      setSelectedSegmentId(null);
      // Restore blockMapRef so queued content_delta/content_end events can
      // find their target items during replay.
      blockMapRef.current = target.savedBlockMap || {};
      toolMapRef.current = target.savedToolMap || {};
      resetSubSessionState();
      cycleRef.current = 0;
      localIndexRef.current = 0;
      // E2: finalize any in-flight synthetic animations with proper content
      finalizeSyntheticAnimations();
      seenDeltasRef.current.clear();

      // E2: Re-synchronize seenDeltasRef with restored items. When the user
      // switches away mid-stream, content_delta events are processed live
      // (not queued), so seenDeltasRef accumulates their indices. The .clear()
      // above wipes that state. Without this re-population, a replayed
      // content_end event would see an empty seenDeltasRef and incorrectly
      // trigger a synthetic typing animation for content that was already
      // streamed. We pre-populate for any text block whose item already has
      // content, so content_end takes the normal finalization path instead.
      for (const [bKey, bItemId] of Object.entries(blockMapRef.current)) {
        if (!bKey.startsWith('id-')) continue;
        const bIdx = parseInt(bKey.slice(3), 10);
        const bItem = targetItems.find(i => i.id === bItemId);
        if (bItem && bItem.content) seenDeltasRef.current.add(bIdx);
      }

      // Strip the thinking placeholder that was saved when we switched away.
      // The replay will re-create thinking items from actual content_block:start events.
      const savedPlaceholder = target.savedPlaceholderId || null;
      if (savedPlaceholder) {
        setChronoItems(prev => prev.filter(item => item.id !== savedPlaceholder));
      }

      const queued = pendingEventsRef.current.get(key);
      if (queued && queued.length > 0) {
        pendingEventsRef.current.delete(key);
        for (const queuedMsg of queued) {
          handleWsMessage({ ...queuedMsg, _replay: true }, key);
        }
      }

      // Null the placeholder ref now that replay is done
      placeholderIdRef.current = null;

      // Post-replay reconciliation: prompt_complete is excluded from
      // pendingEventsRef, so replayed tool_call events can re-set executing
      // state with nothing to clear it.  Read the authoritative session status
      // from sessionsRef (updated by the background prompt_complete handler)
      // and force-release if the session actually finished while backgrounded.
      const freshTarget = sessionsRef.current.get(key) || {};
      if (freshTarget.status !== 'running') {
        setExecuting(false);
        executingRef.current = false;
        // Clear any stuck streaming cursors left by incomplete events
        setChronoItems(prev => {
          const hasStuck = prev.some(i => i.streaming);
          return hasStuck ? prev.map(i => i.streaming ? { ...i, streaming: false } : i) : prev;
        });
        tryDrainQueue();
      }
    }, [sessions, handleWsMessage, resumeHistorySession]);
    switchSessionRef.current = switchSession;

    // NOTE: pollSessionRevisions removed — consolidated into the 10s
    // history re-poll (refreshHistory).  The history endpoint now returns
    // name, description, revision, and last_updated which covers the same
    // data that the revisions endpoint provided.

    useEffect(() => {
      if (!activeKey) return;
      const active = sessions.get(activeKey);
      if (!active || !active.sessionId || !active.hasExternalUpdate) return;
      if (executing || active.status === 'running' || active.status === 'loading_history') return;
      // Live sessions get all content via WebSocket — skip disk refresh.
      if (active.source === 'live') return;

      const now = Date.now();
      const lastAt = Number(autoDiskRefreshAtRef.current[activeKey] || 0);
      if (now - lastAt < 4000) return;
      autoDiskRefreshAtRef.current[activeKey] = now;

      refreshSessionFromDisk(activeKey, { notifyBottom: true, activeOnly: true });
    }, [activeKey, sessions, executing, refreshSessionFromDisk]);

    const applyDraftCwd = useCallback((rawCwd) => {
      const normalized = (rawCwd || '').trim() || '~';
      defaultCwdRef.current = normalized;
      setDefaultCwd(normalized);

      // For draft sessions, also update the displayed cwd and session data
      // so the metadata view stays consistent if the draft editor hides.
      // Server-side reconciliation is deferred to sendMessage() to avoid
      // session churn from repeated edits.
      const key = activeKeyRef.current;
      if (!key) return;
      const session = sessionsRef.current.get(key);
      if (!session) return;
      const isDraft = session.source !== 'history' && (session.turnCount || 0) === 0;
      if (!isDraft) return;
      if (normalized === (session.cwd || '~')) return;

      setCwd(normalized);
      setSessions(prev => {
        const next = new Map(prev);
        const s = next.get(key);
        if (s) next.set(key, { ...s, cwd: normalized });
        return next;
      });
    }, []);

    const startPaneResize = useCallback((pane, e) => {
      if (typeof window !== 'undefined' && window.innerWidth <= 768) return;
      e.preventDefault();
      const startWidth = pane === 'sessions' ? sessionPanelWidth : activityPanelWidth;
      dragStateRef.current = {
        pane,
        startX: e.clientX,
        startWidth,
      };
      setDraggingPane(pane);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }, [sessionPanelWidth, activityPanelWidth]);

    const collapseActivity = useCallback(() => {
      setShowActivity(false);
      activityAutoCollapsedRef.current = false;
    }, []);

    const expandActivity = useCallback(() => {
      const vw = window.innerWidth;
      const sessSpace = showSessions ? sessionPanelWidth + 6 : 0;
      const budget = vw - sessSpace - 6 - MIN_CHAT_WIDTH;
      if (budget < 280 && showSessions) {
        setShowSessions(false);
      }
      setShowActivity(true);
      activityAutoCollapsedRef.current = false;
    }, [showSessions, sessionPanelWidth]);

    // —— Render ——————————————————————————————————————————————————————
    const sessionEntries = Array.from(sessions.entries());
    const filteredSessionEntries = sessionEntries.filter(([key, session]) =>
      sessionMatchesFilter(key, session, sessionFilterQuery)
    );
    const sessionTree = buildSessionTree(filteredSessionEntries, pinnedSessionIds);
    const rootSessionEntries = sessionTree.roots;
    const nonPinnedRootEntries = rootSessionEntries.filter(([, s]) =>
      !s || !s.sessionId || !pinnedSessionIds.has(s.sessionId)
    );
    const sessionKeyBySessionId = new Map(
      sessionEntries
        .filter(([, session]) => session && session.sessionId)
        .map(([key, session]) => [session.sessionId, key])
    );

    const renderSessionTreeEntry = (entry, depth = 0, lineage = new Set()) => {
      const [key, session] = entry;
      const cycleDetected = lineage.has(key);
      const children = cycleDetected
        ? []
        : (sessionTree.childrenByParentKey.get(key) || []);
      const hasChildren = children.length > 0;
      const collapseKey = (session && session.sessionId) || key;
      const collapsed = hasChildren
        ? (collapsedSpawnGroups[collapseKey] !== false)
        : false;
      const nextLineage = new Set(lineage);
      nextLineage.add(key);
      return html`
        <div class="session-tree-node" key=${'tree-' + key}>
          <div
            class="session-tree-row"
            style=${depth > 0 ? { marginLeft: (Math.min(depth, 8) * 12) + 'px' } : null}
          >
            ${hasChildren
              ? html`
                  <button
                    class="session-tree-toggle"
                    title=${collapsed ? 'Show spawned sessions' : 'Hide spawned sessions'}
                    onClick=${e => {
                      e.stopPropagation();
                      toggleSpawnGroup(collapseKey);
                    }}
                  >
                    <${Icon} name=${collapsed ? 'chevron-right' : 'chevron-down'} className="sm" />
                  </button>
                `
              : html`<span class="session-tree-spacer"></span>`
            }
            <div class="session-tree-card-wrap">
              <${SessionCard}
                key=${key}
                session=${session}
                isActive=${key === activeKey}
                onClick=${() => switchSession(key)}
                setSessions=${setSessions}
                onTogglePin=${handleTogglePin}
                isPinned=${!!(session && session.sessionId && pinnedSessionIds.has(session.sessionId))}
                queueCount=${(msgQueueRef.current.get(key) || []).length}
              />
            </div>
          </div>
          ${hasChildren && !collapsed && html`
            <div class="session-tree-children">
              ${children.map(child => renderSessionTreeEntry(child, depth + 1, nextLineage))}
            </div>
          `}
        </div>
      `;
    };

    const directoryGroups = (() => {
      const groupsByDir = new Map();
      for (const entry of nonPinnedRootEntries) {
        const [, session] = entry;
        const cwd = normalizeCwd(session && session.cwd);
        let group = groupsByDir.get(cwd);
        if (!group) {
          group = { key: cwd, cwd, items: [], latestTs: 0 };
          groupsByDir.set(cwd, group);
        }
        group.items.push(entry);
        const ts = sessionUpdatedTs(session);
        if (ts > group.latestTs) group.latestTs = ts;
      }

      const groups = Array.from(groupsByDir.values());
      for (const group of groups) {
        group.items.sort(compareSessionEntriesByRecent);
      }
      groups.sort((a, b) => {
        if (b.latestTs !== a.latestTs) return b.latestTs - a.latestTs;
        return a.cwd.localeCompare(b.cwd);
      });
      return groups;
    })();

    const activityGroups = (() => {
      const active = [], recent = [], older = [];
      const oneDayAgo = Date.now() - 86400000;
      for (const entry of nonPinnedRootEntries) {
        const [, session] = entry;
        if (session && session.source !== 'history') {
          active.push(entry);
        } else {
          const ts = sessionUpdatedTs(session);
          if (ts > oneDayAgo) recent.push(entry);
          else older.push(entry);
        }
      }
      return [
        { key: 'active', label: 'Active', items: active },
        { key: 'recent-activity', label: 'Recent (24h)', items: recent },
        { key: 'older-activity', label: 'Older', items: older },
      ].filter(g => g.items.length > 0);
    })();

    const ageGroups = (() => {
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const weekStart = todayStart - (now.getDay() * 86400000);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      const today = [], thisWeek = [], thisMonth = [], olderAge = [];
      for (const entry of nonPinnedRootEntries) {
        const [, session] = entry;
        const ts = sessionUpdatedTs(session);
        if (ts >= todayStart) today.push(entry);
        else if (ts >= weekStart) thisWeek.push(entry);
        else if (ts >= monthStart) thisMonth.push(entry);
        else olderAge.push(entry);
      }
      return [
        { key: 'today', label: 'Today', items: today },
        { key: 'this-week', label: 'This Week', items: thisWeek },
        { key: 'this-month', label: 'This Month', items: thisMonth },
        { key: 'older-age', label: 'Older', items: olderAge },
      ].filter(g => g.items.length > 0);
    })();

    // Compute flat visual order of root session keys for keyboard navigation (Ctrl+[/])
    {
      const pinnedKeys = rootSessionEntries
        .filter(([, s]) => s && s.sessionId && pinnedSessionIds.has(s.sessionId))
        .map(([key]) => key);
      const pinnedSet = new Set(pinnedKeys);
      let groupKeys;
      if (sessionGroupMode === 'project') {
        groupKeys = directoryGroups.flatMap(g => g.items.map(([key]) => key));
      } else if (sessionGroupMode === 'activity') {
        groupKeys = activityGroups.flatMap(g => g.items.map(([key]) => key));
      } else if (sessionGroupMode === 'age') {
        groupKeys = ageGroups.flatMap(g => g.items.map(([key]) => key));
      } else {
        groupKeys = rootSessionEntries.map(([key]) => key);
      }
      visibleSessionKeysRef.current = [...pinnedKeys, ...groupKeys.filter(k => !pinnedSet.has(k))];
    }
    const hasSessionFilter = !!sessionFilterQuery.trim();
    const hasSessionResults = filteredSessionEntries.length > 0;
    const isSessionFilterOpen = showSessionFilter || hasSessionFilter;
    const showSyncButton = syncingHistory || pendingHistorySyncCount > 0;
    const activeSession = activeKey ? sessions.get(activeKey) : null;
    const activeSessionId = (activeSession && activeSession.sessionId) || sessionId || null;
    const activeParentSessionId = normalizeSessionParentId(
      activeSession && activeSession.parentSessionId
    );
    const activeParentKey = activeParentSessionId
      ? (sessionKeyBySessionId.get(activeParentSessionId) || null)
      : null;
    const showDraftCwdEditor =
      !!activeSession
      && activeSession.source !== 'history'
      && (activeSession.turnCount || 0) === 0
      && !executing;
    const closeMobileSidebar = useCallback(() => {
      setMobileSidebarOpen(false);
    }, []);

    // Turn correlation
    const { turnMap, itemTurnMap, segmentMap } = useMemo(() => deriveTurns(chronoItems), [chronoItems]);
    const { turnCounts: turnActivityCounts, segmentCounts: segmentActivityCounts } =
      useMemo(() => computeActivityCounts(chronoItems, itemTurnMap, segmentMap), [chronoItems, itemTurnMap, segmentMap]);
    const [hoveredTurnId, setHoveredTurnId] = useState(null);
    const [activeTurnId, setActiveTurnId] = useState(null);
    const [selectedTurnId, setSelectedTurnId] = useState(null);
    const [selectedSegmentId, setSelectedSegmentId] = useState(null);

    // Toggle turn/segment selection (click/tap).
    // User message click → turn-level. Assistant message click → segment-level.
    // Welcome state: populate input when user clicks a prompt card
    const handleSelectPrompt = useCallback((text) => {
      const textarea = document.getElementById('message-input');
      if (!textarea) return;
      const nativeSetter = Object.getOwnPropertyDescriptor(
        HTMLTextAreaElement.prototype, 'value'
      ).set;
      nativeSetter.call(textarea, text);
      textarea.dispatchEvent(new Event('input', { bubbles: true }));
      textarea.focus();
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }, []);

    // Fork-from-message handler — forks immediately, no preview step
    const handleForkAtTurn = useCallback(async (turnNumber, itemId) => {
      const sid = sessionIdRef.current;
      if (!sid || !turnNumber) return;
      // Get CWD from daemon (authoritative) rather than local state.
      let currentCwd = '~';
      try {
        const parentInfo = await api.getSession(sid);
        if (parentInfo && parentInfo.working_dir) currentCwd = parentInfo.working_dir;
      } catch {}
      if (currentCwd === '~') {
        const activeEntry = sessionsRef.current.get(activeKeyRef.current);
        currentCwd = (activeEntry && activeEntry.cwd !== '~' && activeEntry.cwd) || cwd || '~';
      }

      try {
        const result = await api.forkSession(sid, turnNumber, currentCwd);
        let resumeOk = false;
        let resumedCwd = currentCwd;
        try {
          const resumeResult = await api.resumeSession(result.session_id);
          resumeOk = true;
          if (resumeResult && resumeResult.working_dir) {
            resumedCwd = resumeResult.working_dir;
          }
        } catch (err) {
          console.warn('[chat] fork: resume failed, session will be history-only', err);
        }

        // Mark the original message as forked
        forkIndicatorsRef.current.set(itemId, {
          childSessionId: result.session_id,
          turn: turnNumber,
        });
        setForkIndicatorsRevision(r => r + 1);

        // Add forked session to sidebar as a history entry so
        // resumeHistorySession loads the transcript (avoids blank screen).
        const newKey = 'history-' + result.session_id;
        const forkEntry = {
          sessionId: result.session_id,
          parentSessionId: result.parent_id,
          forkedFromTurn: result.forked_from_turn || turnNumber,
          source: 'history',
          status: 'history',
          cwd: resumedCwd,
          turnCount: result.message_count || turnNumber,
          messageCount: result.message_count || 0,
          lastUserMessage: null,
          lastUpdated: new Date().toISOString(),
          isNewSession: false,
        };
        // Write to the mutable ref FIRST so switchSession can read it
        // immediately (setSessions is async/batched by React).
        sessionsRef.current.set(newKey, forkEntry);
        setSessions(prev => {
          const next = new Map(prev);
          next.set(newKey, forkEntry);
          return next;
        });
        sessionParentByIdRef.current[result.session_id] = sid;

        setForkState(null);
        // switchSession detects source='history' and calls
        // resumeHistorySession to load transcript + resume with daemon.
        switchSessionRef.current && switchSessionRef.current(newKey);
      } catch (err) {
        console.error('[chat] fork failed', err);
        setForkState({ itemId, turnNumber, step: 'error', error: err?.message || String(err), onCancel: () => setForkState(null) });
      }
    }, [cwd]);

    const handleNavigateToForkedSession = useCallback((childSessionId) => {
      if (!childSessionId) return;
      for (const [key, s] of sessionsRef.current.entries()) {
        if (s.sessionId === childSessionId) {
          switchSessionRef.current && switchSessionRef.current(key);
          return;
        }
      }
      const newKey = 'fork-' + childSessionId;
      setSessions(prev => {
        if (prev.has(newKey)) return prev;
        const next = new Map(prev);
        next.set(newKey, {
          sessionId: childSessionId,
          source: 'history',
          status: 'history',
          cwd: cwd,
          isNewSession: false,
        });
        return next;
      });
      setTimeout(() => {
        switchSessionRef.current && switchSessionRef.current(newKey);
      }, 50);
    }, [cwd]);

    const forkIndicators = useMemo(() => {
      void forkIndicatorsRevision;
      return new Map(forkIndicatorsRef.current);
    }, [forkIndicatorsRevision]);

    const handleTurnSelect = useCallback((turnId, segId) => {
      if (segId) {
        // Segment-level: toggle segment within turn
        setSelectedSegmentId(prev => prev === segId ? null : segId);
        setSelectedTurnId(turnId);
      } else {
        // Turn-level: toggle whole turn, clear segment
        setSelectedTurnId(prev => prev === turnId ? null : turnId);
        setSelectedSegmentId(null);
      }
    }, []);

    // Scroll the activity panel to a turn's separator
    const scrollActivityToTurn = useCallback((turnId) => {
      if (!activityScrollRef.current) return;
      const el = activityScrollRef.current.querySelector('.turn-separator[data-turn-id="' + turnId + '"]');
      if (el) {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        el.scrollIntoView({ behavior: prefersReducedMotion ? 'instant' : 'smooth', block: 'start' });
      }
    }, []);

    // Scroll the activity panel to a segment's waypoint (assistant message rendered in activity panel)
    const scrollActivityToSegment = useCallback((segId) => {
      if (!activityScrollRef.current) return;
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      // Must scope to activity panel — the same item ID exists in both panels
      // (main panel has the text block, activity panel has the waypoint)
      const segEl = activityScrollRef.current.querySelector('.activity-waypoint[id="' + segId + '"]');
      if (segEl) {
        segEl.scrollIntoView({ behavior: prefersReducedMotion ? 'instant' : 'smooth', block: 'center' });
        return;
      }
      // Fallback: find the first highlighted item in this segment's turn
      const turnId = itemTurnMap.get(segId);
      if (turnId) {
        const sep = activityScrollRef.current.querySelector('.turn-separator[data-turn-id="' + turnId + '"]');
        if (sep) sep.scrollIntoView({ behavior: prefersReducedMotion ? 'instant' : 'smooth', block: 'start' });
      }
    }, [itemTurnMap]);

    // Scroll the main panel to a turn's user message
    const scrollMainToTurn = useCallback((turnId) => {
      const turn = turnMap.get(turnId);
      if (!turn) return;
      const el = document.getElementById(turn.userItem.id);
      if (el) {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        el.scrollIntoView({ behavior: prefersReducedMotion ? 'instant' : 'smooth', block: 'center' });
      }
    }, [turnMap]);

    // ── Command Palette: register actions & wire shortcuts ──
    const cmdCtxRef = useRef({});
    cmdCtxRef.current = {
      executing, activeKey, sessionId, sessions,
      labsState, showSessions, showActivity: showActivity,
      viewMode, theme, pinnedSessionIds,
    };

    useEffect(() => {
      actionRegistry.registerAll({
        'open-palette': {
          label: 'Command Palette', shortcut: 'Mod+k', category: 'General',
          icon: _icons.search, order: 0, hidden: true,
          handler: () => setCmdPaletteOpen(true),
        },
        'show-shortcuts': {
          label: 'Show All Shortcuts', shortcut: 'Mod+Shift+/', category: 'General',
          icon: _icons.keyboard, order: 1,
          when: () => window.innerWidth > 768,
          handler: () => { setCmdPaletteOpen(false); setCheatSheetOpen(true); },
        },
        'new-session': {
          label: 'New Session', shortcut: 'App+n', category: 'Navigation',
          icon: _icons.plus, order: 10,
          handler: () => { newSession(); showToast('New session created'); },
        },
        'search-sessions': {
          label: 'Search Sessions', shortcut: 'App+f', category: 'Navigation',
          icon: _icons.search, order: 12,
          handler: () => {
            setShowSessions(true);
            requestAnimationFrame(() => {
              const el = document.getElementById('session-search-input');
              if (el) el.focus();
            });
          },
        },
        'prev-session': {
          label: 'Previous Session', shortcut: 'App+[', category: 'Navigation',
          icon: _icons.sidebar, order: 13,
          handler: () => {
            const keys = visibleSessionKeysRef.current;
            const currentIdx = keys.indexOf(activeKeyRef.current);
            if (currentIdx > 0) {
              const targetKey = keys[currentIdx - 1];
              switchSessionRef.current && switchSessionRef.current(targetKey);
              // Wait for Preact to re-render with new .active class, then scroll
              setTimeout(() => {
                const card = document.querySelector('.session-card.active');
                if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
              }, 50);
            }
          },
        },
        'next-session': {
          label: 'Next Session', shortcut: 'App+]', category: 'Navigation',
          icon: _icons.sidebar, order: 14,
          handler: () => {
            const keys = visibleSessionKeysRef.current;
            const currentIdx = keys.indexOf(activeKeyRef.current);
            if (currentIdx >= 0 && currentIdx < keys.length - 1) {
              const targetKey = keys[currentIdx + 1];
              switchSessionRef.current && switchSessionRef.current(targetKey);
              setTimeout(() => {
                const card = document.querySelector('.session-card.active');
                if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
              }, 50);
            }
          },
        },
        'cycle-group-mode': {
          label: 'Cycle Session Grouping', category: 'Navigation',
          icon: _icons.sort, order: 15,
          handler: () => setSessionGroupMode(m => {
            const modes = ['none', 'project', 'activity', 'age'];
            return modes[(modes.indexOf(m) + 1) % modes.length];
          }),
        },
        'stop-execution': {
          label: 'Stop Execution', shortcut: 'Mod+.', category: 'Chat',
          icon: _icons.stop, order: 20,
          when: (ctx) => ctx.executing,
          handler: () => stopExecution(),
        },
        'focus-input': {
          label: 'Focus Chat Input', shortcut: 'Mod+/', category: 'Chat',
          icon: _icons.focus, order: 21,
          handler: () => {
            const el = document.querySelector('.msg-input');
            if (el) el.focus();
          },
        },
        'copy-last-response': {
          label: 'Copy Last Response', category: 'Chat',
          icon: _icons.copy, order: 22,
          handler: () => {
            const msgs = chronoItemsRef.current.filter(i => i.type === 'text' && i.role === 'assistant');
            if (msgs.length > 0) {
              const last = msgs[msgs.length - 1];
              navigator.clipboard.writeText(last.content || '').then(() => showToast('Copied to clipboard'));
            }

        'toggle-split': {
          label: 'Toggle Split View', shortcut: 'Mod+Shift+e', category: 'View',
          icon: _icons.split, order: 30,
          handler: () => { setViewMode(m => m === 'workspace' ? 'chat' : 'workspace'); },
        },
        'toggle-sessions': {
          label: 'Toggle Sessions Panel', shortcut: 'Mod+Shift+s', category: 'View',
          icon: _icons.sidebar, order: 31,

        'toggle-activity': {

        'pin-session': {

              handleTogglePin(sessionIdRef.current, isPinned)

          when: (ctx) => !!ctx.sessionId,
          handler: () => sendMessage('/tools'),

        },
        'cmd-agents': {
          label: 'List Agents', category: 'Commands',
          icon: _icons.terminal, order: 72,
          when: (ctx) => !!ctx.sessionId,
          handler: () => sendMessage('/agents'),
          keywords: ['agents', 'available'],
        },
        'cmd-config': {
          label: 'Show Config', category: 'Commands',
          icon: _icons.info, order: 73,
          when: (ctx) => !!ctx.sessionId,
          handler: () => sendMessage('/config'),
          keywords: ['config', 'configuration', 'settings'],
        },
        'cmd-modes': {
          label: 'List Modes', category: 'Commands',
          icon: _icons.terminal, order: 74,
          when: (ctx) => !!ctx.sessionId,
          handler: () => sendMessage('/modes'),
          keywords: ['modes', 'mode'],
        },
        'cmd-clear': {
          label: 'Clear Context', category: 'Commands',
          icon: _icons.terminal, order: 75,
          when: (ctx) => !!ctx.sessionId,
          handler: () => sendMessage('/clear'),
          keywords: ['clear', 'reset', 'context'],

          icon: _icons.info, order: 76,
          handler: () => sendMessage('/help'),
          keywords: ['help', 'commands'],
        },

      // Show toasts on action execution (except palette/cheatsheet actions)
      return actionRegistry.onEvent((evt) => {
        // toast is shown inline for specific actions above
      });
    }, []);

    useShortcutListener(actionRegistry, cmdCtxRef, cmdPaletteOpen || cheatSheetOpen);

    const mainFilter = viewMode === 'workspace' ? (i => i.type === 'text') : null;
    const activityFilter = viewMode === 'workspace' ? (i => i.type !== 'text' || (i.type === 'text' && i.role === 'assistant')) : null;

    return html`
      <div id="header">
        <button
          class="hamburger"
          title="Sessions"
          aria-label=${mobileSidebarOpen ? 'Close sessions panel' : 'Open sessions panel'}
          aria-controls="session-panel"
          aria-expanded=${mobileSidebarOpen ? 'true' : 'false'}
          onClick=${() => setMobileSidebarOpen(o => !o)}
        >☰</button>
        <${StatusDot} status=${sseStatus} />
        <span class="app-name">Amplifier</span>
        <span class="header-spacer"></span>
        <button
          class=${'btn header-icon-btn split-toggle' + (viewMode === 'workspace' ? ' active' : '')}
          title=${viewMode === 'workspace' ? 'Single column' : 'Split view'}
          aria-label=${viewMode === 'workspace' ? 'Switch to single column view' : 'Switch to split view'}
          onClick=${() => setViewMode(m => m === 'workspace' ? 'chat' : 'workspace')}
        >
          ${viewMode === 'workspace'
            ? html`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="1.5"/></svg>`
            : html`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="1.5"/><line x1="9" y1="2" x2="9" y2="14"/></svg>`
          }
        </button>
        <button class=${'btn header-icon-btn cmd-palette-trigger' + (fmtShortcut('Mod+k') ? ' has-hint' : '')} title=${'Actions (' + fmtShortcut('Mod+k') + ')'} onClick=${() => setCmdPaletteOpen(true)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="cmd-palette-trigger-hint">${fmtShortcut('Mod+k')}</span>
        </button>
        <span ref=${feedbackSlotRef}></span>
      </div>

      <div id="app-body">
        ${mobileSidebarOpen && showSessions && html`
          <button
            class="mobile-sidebar-backdrop"

        `}
        ${!showSessions && html`
          <button

            aria-label="Expand sessions panel"
            title="Expand sessions panel"
            onClick=${() => setShowSessions(true)}
          >

        <div

        >
          <div class="session-panel-header">
            <div class="session-panel-header-top">
              <div class="session-panel-title-wrap">
                <span>Sessions</span>
              </div>

                <button class="session-new-btn" onClick=${newSession}>+ New</button>
                <button
                  class="session-collapse-btn"
                  aria-label="Collapse sessions panel"
                  title="Collapse sessions panel"
                  onClick=${() => setShowSessions(false)}
                >
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="10,4 6,8 10,12"/></svg>
                </button>
                <button
                  class="mobile-session-close"
                  aria-label="Close sessions panel"
                  onPointerDown=${closeMobileSidebar}
                  onClick=${closeMobileSidebar}
                >x</button>
              </div>
            </div>
            <div class="session-panel-header-actions">
              <div class="session-integrated-search">
                <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input
                  id="session-search-input"
                  value=${sessionFilterQuery}
                  placeholder="Search sessions..."
                  spellcheck="false"
                  onInput=${e => setSessionFilterQuery(e.target.value)}
                />
                <select
                  class=${'session-group-pill' + (sessionGroupMode !== 'none' ? ' active-group' : '')}
                  value=${sessionGroupMode}
                  onChange=${e => setSessionGroupMode(e.target.value)}
                  title="Group sessions by"
                >
                  <option value="none">Recent</option>
                  <option value="project">Project</option>
                  <option value="activity">Activity</option>
                  <option value="age">Age</option>
                </select>
              </div>
              ${showSyncButton && html`
                <button
                  class=${'session-control-btn' + (pendingHistorySyncCount > 0 ? ' active' : '')}
                  title=${pendingHistorySyncCount > 0
                    ? ('Sync ' + pendingHistorySyncCount + ' new sessions from disk')
                    : 'Sync sessions from disk'}
                  onClick=${() => syncSessionHistory({ silent: false })}
                  disabled=${syncingHistory}
                >
                  <${Icon} name="refresh" className=${syncingHistory ? 'sm status-running' : 'sm'} />
                </button>
              `}
            </div>
            ${hasSessionFilter && html`
              <div class="session-search-hint">
                ${hasSessionResults
                  ? (filteredSessionEntries.length + ' match' + (filteredSessionEntries.length === 1 ? '' : 'es'))
                  : 'No matches'}
              </div>
            `}
          </div>
          <div class="session-list">
            ${historyListLoading && html`
              <div class="session-list-loading">
                <span class="history-loading-dot"></span>
                <span>Loading past sessions…</span>
              </div>
            `}
            ${!historyListLoading && !hasSessionResults && html`
              <div class="session-list-loading">
                <span>${hasSessionFilter ? 'No sessions match this filter.' : 'No sessions yet.'}</span>
              </div>
            `}
            ${(() => {
              const pinnedEntries = rootSessionEntries.filter(([key, s]) =>
                s && s.sessionId && pinnedSessionIds.has(s.sessionId)
              );
              const unpinnedEntries = rootSessionEntries.filter(([key, s]) =>
                !s || !s.sessionId || !pinnedSessionIds.has(s.sessionId)
              );

              const renderGenericGroups = (groups) => html`
                ${groups.map(group => {
                  const collapsed = collapsedDirGroups[group.key] !== false;
                  return html`
                    <div class="session-dir-group" key=${'group-' + group.key}>
                      <button
                        class="session-dir-header"
                        onClick=${() => toggleDirGroup(group.key)}
                        title=${group.cwd || group.label}
                      >
                        <${Icon} name=${collapsed ? 'chevron-right' : 'chevron-down'} className="sm" />
                        <span class="session-dir-title">${group.label || group.cwd}</span>
                        <span class="session-dir-count">${group.items.length}</span>
                      </button>
                      ${!collapsed && html`
                        <div class="session-dir-items">
                          ${group.items.map(entry => renderSessionTreeEntry(entry))}
                        </div>
                      `}
                    </div>
                  `;
                })}
              `;

              // Project groups: show basename as label, full path in tooltip
              const projectGroups = directoryGroups.map(g => ({
                ...g,
                label: g.cwd === '~' ? '~' : g.cwd.split('/').filter(Boolean).pop() || g.cwd,
              }));

              return html`
                ${pinnedEntries.length > 0 && html`
                  <button class="session-section-header" onClick=${() => setPinnedCollapsed(c => !c)}>
                    <${Icon} name=${pinnedCollapsed ? 'chevron-right' : 'chevron-down'} className="sm" />
                    Pinned <span class="count">${pinnedEntries.length}</span>
                  </button>
                  ${!pinnedCollapsed && pinnedEntries.map(entry => renderSessionTreeEntry(entry))}
                `}
                ${sessionGroupMode === 'project'
                  ? renderGenericGroups(projectGroups)
                  : sessionGroupMode === 'activity'
                  ? renderGenericGroups(activityGroups)
                  : sessionGroupMode === 'age'
                  ? renderGenericGroups(ageGroups)
                  : html`
                      ${pinnedEntries.length > 0 && unpinnedEntries.length > 0 && html`
                        <div class="session-section-header">Recent</div>
                      `}
                      ${unpinnedEntries.map(entry => renderSessionTreeEntry(entry))}
                    `
                }
                ${serverSearchResults.length > 0 && html`
                  <div class="session-section-header">More on disk</div>
                  ${serverSearchResults.map(s => html`
                    <div
                      class="session-card"
                      key=${'search-' + s.session_id}
                      onClick=${() => loadServerSearchResult(s)}
                      style="cursor: pointer;"
                    >
                      <div class="session-card-name-row">
                        <div class="session-card-name auto-named">${s.name || 'session'}</div>
                      </div>
                      <div class="session-card-cwd session-card-cwd-row" title=${s.cwd || '~'}>
                        <${Icon} name="folder" className="sm" />
                        <span class="session-card-line-text">${s.cwd || '~'}</span>
                      </div>
                      <div class="session-card-meta">
                        <span>${s.message_count || 0} msgs</span>
                      </div>
                    </div>
                  `)}
                `}
                ${serverSearching && html`
                  <div class="session-list-loading"><span>Searching disk...</span></div>
                `}
                ${hasMoreHistory && html`
                  <button
                    class="session-load-more"
                    onClick=${loadMoreHistory}
                    disabled=${loadingMoreHistory}
                  >
                    ${loadingMoreHistory ? 'Loading...' : 'Load more sessions'}
                  </button>
                `}
              `;
            })()}
          </div>
          <div class="session-actions">
                ${showDraftCwdEditor
                  ? html`
                      <div class="new-session-cwd-label">New Session CWD</div>
                      <input
                        class="new-session-cwd-input"
                        value=${defaultCwd}
                        placeholder="~/project/path"
                        spellcheck="false"
                        onInput=${e => {
                          defaultCwdRef.current = e.target.value;
                          setDefaultCwd(e.target.value);
                          // Keep displayed cwd in sync so the metadata view
                          // shows the edited value if the draft editor hides
                          // (e.g. when executing becomes true on send).
                          setCwd(e.target.value);
                        }}
                        onBlur=${e => applyDraftCwd(e.target.value)}
                      />
                    `
                  : html`
                  <div class="new-session-cwd-label">Session Metadata</div>
                  <div class="active-cwd-display">
                    ${activeSession
                      ? html`
                          <div class="session-meta-block">
                            <div class="session-meta-row" title=${cwd || '~'}>
                              <${Icon} name="folder" className="sm" />
                              <span class="session-meta-key">cwd</span>
                              <span class="session-meta-value">${cwd || '~'}</span>
                            </div>
                            <div class="session-meta-row" title=${activeSessionId || 'pending'}>
                              <${Icon} name="lock" className="sm" />
                              <span class="session-meta-key">sid</span>
                              <span class="session-meta-value">${activeSessionId || 'pending'}</span>
                            </div>
                            ${activeParentSessionId && html`
                              <button
                                class=${'session-meta-row session-meta-link' + (activeParentKey ? '' : ' pending')}
                                title=${activeParentKey
                                  ? ('Jump to parent session ' + activeParentSessionId)
                                  : ('Parent session ' + activeParentSessionId + ' is not loaded yet')}
                                onClick=${() => {
                                  if (activeParentKey) {
                                    switchSession(activeParentKey);
                                  } else {
                                    syncSessionHistory({ silent: false });
                                  }
                                }}
                              >
                                <${Icon} name="chevron-up" className="sm" />
                                <span class="session-meta-key">${activeSession && activeSession.forkedFromTurn ? 'forked from' : 'parent'}</span>
                                <span class="session-meta-value session-meta-value-link">${activeParentSessionId}</span>
                              </button>
                            `}
                            <div class="session-meta-row">
                              <span class="session-meta-key">turn</span>
                              <span class="session-meta-value">${turnCount}</span>
                            </div>
                          </div>
                        `
                      : 'No active session'}
                  </div>
                `
            }
          </div>
        </div>
        ${showSessions && html`
          <div
            class=${'pane-resizer' + (draggingPane === 'sessions' ? ' active' : '')}
            onMouseDown=${e => startPaneResize('sessions', e)}
          ></div>
        `}

        <div id="chat-main" class=${viewMode === 'workspace' ? 'workspace-mode' : ''}>
          <div class="main-pane">
            ${activeSession && activeSession.status === 'loading_history' && html`
              <div class="history-loading-banner">
                <span class="history-loading-dot"></span>
                <span>Loading session history…</span>
              </div>
            `}
            <${MessageList}
              items=${chronoItems}
              filterFn=${mainFilter}
              sessionKey=${(activeKey || 'none') + (viewMode === 'workspace' ? ':main-workspace' : ':main-chat')}
              showJumpControls=${true}
              bottomNoticeSignal=${diskUpdateNoticeSignal}
              bottomNoticeLabel="New messages"
              subSessionsRef=${subSessionsRef}
              subSessionRevision=${subSessionRevision}
              onNavigateSession=${navigateToSession}
              onSelectPrompt=${handleSelectPrompt}
              turnMap=${turnMap}
              itemTurnMap=${itemTurnMap}
              hoveredTurnId=${viewMode === 'workspace' ? hoveredTurnId : undefined}
              setHoveredTurnId=${viewMode === 'workspace' ? setHoveredTurnId : undefined}
              selectedTurnId=${viewMode === 'workspace' ? selectedTurnId : undefined}
              selectedSegmentId=${viewMode === 'workspace' ? selectedSegmentId : undefined}
              segmentMap=${viewMode === 'workspace' ? segmentMap : undefined}
              onTurnSelect=${viewMode === 'workspace' ? (turnId, segId) => {
                handleTurnSelect(turnId, segId);
                if (segId) {
                  scrollActivityToSegment(segId);
                } else {
                  scrollActivityToTurn(turnId);
                }
              } : undefined}
              turnActivityCounts=${viewMode === 'workspace' ? turnActivityCounts : undefined}
              segmentActivityCounts=${viewMode === 'workspace' ? segmentActivityCounts : undefined}
              labsVoice=${labsState.voice}
              onFork=${handleForkAtTurn}
              forkState=${forkState}
              forkIndicators=${forkIndicators}
              onNavigateToForkedSession=${handleNavigateToForkedSession}
            />
            <${QueuePanel}
              queue=${getQueue()}
              drainState=${getQueueDrainState()}
              countdownSecs=${countdownRemaining}
              onRemove=${(msgId) => {
                const q = getQueue();
                const isFirst = q.length > 0 && q[0].id === msgId;
                if (isFirst && getQueueDrainState() === 'countdown') {
                  cancelCountdown();
                  removeFromQueue(msgId);
                  tryDrainQueue();
                } else {
                  removeFromQueue(msgId);
                }
              }}
              onResume=${resumeQueue}
            />
            <${InputArea}
              onSend=${sendMessage}
              onStop=${stopExecution}
              onQueueMessage=${pushToQueue}
              onShellExecute=${handleShellExecute}
              executing=${executing}
              labsShell=${labsState.shell}
              shouldQueue=${executing || getQueueDrainState() === 'countdown' || (getQueueDrainState() === 'paused' && getQueue().length > 0)}
              viewMode=${viewMode}
              setViewMode=${setViewMode}
              activeKey=${activeKey}
              labsVoice=${labsState.voice}
            />
          </div>
          ${viewMode === 'workspace' && !showActivity && html`
            <button
              class="activity-expand-btn"
              onClick=${expandActivity}
              aria-label="Expand activity panel"
              title="Expand activity panel"
            >
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9,3 4,7 9,11"/></svg>
            </button>
          `}
          ${viewMode === 'workspace' && html`
            ${showActivity && html`
              <div
                class=${'pane-resizer' + (draggingPane === 'activity' ? ' active' : '')}
                onMouseDown=${e => startPaneResize('activity', e)}
              ></div>
            `}
            <div
              class=${'activity-panel' + (!showActivity ? ' collapsed' : '') + (draggingPane === 'activity' ? ' no-transition' : '')}
              style=${showActivity ? { width: activityPanelWidth + 'px' } : {}}
            >
              <div class="activity-panel-header">
                <button
                  class="activity-collapse-btn"
                  onClick=${collapseActivity}
                  aria-label="Collapse activity panel"
                  title="Collapse activity panel"
                >
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="5,3 10,7 5,11"/></svg>
                </button>
                <span>Activity</span>
              </div>
              <${ActivityBreadcrumb}
                turnMap=${turnMap}
                scrollTurnId=${activeTurnId}
                onNavigateToMessage=${(turnId) => {
                  handleTurnSelect(turnId);
                  scrollMainToTurn(turnId);
                }}
              />
              <div class="activity-scroll" ref=${activityScrollRef}>
                ${chronoItems.filter(activityFilter || (() => true)).length === 0
                  ? html`<${ActivityEmptyState} executing=${executing} />`
                  : html`<${MessageList}
                    items=${chronoItems}
                    filterFn=${activityFilter}
                    sessionKey=${(activeKey || 'none') + ':activity'}
                    showJumpControls=${true}
                    subSessionsRef=${subSessionsRef}
                    subSessionRevision=${subSessionRevision}
                    onNavigateSession=${navigateToSession}
                    turnMap=${turnMap}
                    itemTurnMap=${itemTurnMap}
                    hoveredTurnId=${hoveredTurnId}
                    setHoveredTurnId=${setHoveredTurnId}
                    selectedTurnId=${selectedTurnId}
                    selectedSegmentId=${selectedSegmentId}
                    segmentMap=${segmentMap}
                    onTurnSelect=${(turnId, segId) => {
                      handleTurnSelect(turnId, segId);
                    }}
                    isActivityPanel=${true}
                    onTurnSeparatorClick=${(turnId) => {
                      scrollMainToTurn(turnId);
                    }}
                    onScrollTurnChange=${setActiveTurnId}
                    labsVoice=${labsState.voice}
                  />`
                }
              </div>
            </div>
          `}
        </div>
      </div>

      <${ApprovalModal} approval=${pendingApproval} onRespond=${respondToApproval} />
      <${ExperimentalFeaturesDrawer}
        open=${labsOpen}
        onClose=${() => setLabsOpen(false)}
        labsState=${labsState}
        onToggleFeature=${toggleLabsFeature}
      />
      <${CommandPalette}
        open=${cmdPaletteOpen}
        onClose=${() => setCmdPaletteOpen(false)}
        registry=${actionRegistry}
        appCtx=${cmdCtxRef.current}
      />
      <${CheatSheet}
        open=${cheatSheetOpen}
        onClose=${() => setCheatSheetOpen(false)}
        registry=${actionRegistry}
        appCtx=${cmdCtxRef.current}
      />
      <${ToastContainer} />
    `;
  }

  render(h(ChatApp, null), document.body);
</script>
</body>
</html>
