    .user-message .msg-actions { align-self: flex-start; }
    .user-message .msg-actions button { min-width: 32px; min-height: 32px; padding: 8px; color: currentColor; opacity: 0.5; }
    .user-message .msg-actions button:hover { opacity: 1; background: rgba(255,255,255,0.15); color: currentColor; }
    .user-message .msg-actions button:active { opacity: 1; background: rgba(255,255,255,0.25); }
    .fork-preview-wrap { margin: 8px 0; padding: 10px 14px; background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 8px; font-size: 13px; line-height: 1.5; max-width: 420px; align-self: flex-end; }
    .fork-preview-wrap .fork-preview-title { font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .fork-preview-wrap .fork-preview-stats { color: var(--text-muted); margin-bottom: 8px; }
    .fork-preview-wrap .fork-preview-stats .keep { color: var(--accent-green); }
    .fork-preview-wrap .fork-preview-stats .cut { color: var(--text-muted); }
    .fork-preview-wrap .fork-preview-actions { display: flex; gap: 8px; }
    .fork-preview-wrap .fork-preview-actions button { padding: 4px 14px; border-radius: 6px; border: 1px solid var(--border-primary); background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; font-size: 13px; transition: background 0.15s ease; }
    .fork-preview-wrap .fork-preview-actions button.fork-confirm { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
    .fork-preview-wrap .fork-preview-actions button.fork-confirm:hover { opacity: 0.9; }
    .fork-preview-wrap .fork-preview-actions button.fork-cancel:hover { background: var(--border-primary); }
    .fork-preview-wrap .fork-preview-actions button:disabled { opacity: 0.5; cursor: default; }
    .fork-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent-blue); margin-top: 4px; cursor: pointer; opacity: 0.8; transition: opacity 0.15s ease; }
    .fork-indicator:hover { opacity: 1; text-decoration: underline; }

    /* ── Command Palette ──────────────────────────────────── */
    .cmd-palette-backdrop {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: min(20vh, 160px);
      animation: cmdFadeIn 0.12s ease-out;
    }
    body[data-theme="light"] .cmd-palette-backdrop { background: rgba(0, 0, 0, 0.25); }

    @keyframes cmdFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cmdScaleIn { from { opacity: 0; transform: scale(0.96) translateY(-8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes cmdSlideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cmdFadeOut { from { opacity: 1; } to { opacity: 0; } }

    .cmd-palette {
      width: min(520px, calc(100vw - 32px));
      max-height: min(440px, 60vh);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: cmdScaleIn 0.15s ease-out;
    }
    body[data-theme="light"] .cmd-palette { box-shadow: 0 16px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06); }
    .cmd-palette-backdrop.closing { animation: cmdFadeOut 0.1s ease-in forwards; }
    .cmd-palette-backdrop.closing .cmd-palette { animation: none; opacity: 0; transform: scale(0.98); transition: all 0.1s ease-in; }

    .cmd-palette-input-wrap {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .cmd-palette-input-wrap svg { flex-shrink: 0; color: var(--text-muted); }
    .cmd-palette-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 15px; font-family: inherit;
      color: var(--text-primary);
      caret-color: var(--accent-blue);
    }
    .cmd-palette-input::placeholder { color: var(--text-muted); }
    .cmd-palette-input-badge {
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 7px;
      font-family: inherit; white-space: nowrap;
    }

    .cmd-palette-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 6px;
      scroll-behavior: smooth;
    }
    .cmd-palette-list::-webkit-scrollbar { width: 4px; }
    .cmd-palette-list::-webkit-scrollbar-track { background: transparent; }
    .cmd-palette-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    body[data-theme="light"] .cmd-palette-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }

    .cmd-palette-group-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 10px 10px 4px;
      user-select: none;
    }

    .cmd-palette-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.08s ease;
      user-select: none;
    }
    .cmd-palette-item:hover { background: var(--bg-tertiary); }
    .cmd-palette-item.selected {
      background: rgba(59, 130, 246, 0.12);
      color: var(--text-primary);
      outline: 1px solid rgba(59, 130, 246, 0.25);
      outline-offset: -1px;
    }
    body[data-theme="light"] .cmd-palette-item.selected {
      background: rgba(37, 99, 235, 0.08);
      outline-color: rgba(37, 99, 235, 0.2);
    }
    .cmd-palette-item.selected .cmd-palette-item-shortcut { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); border-color: rgba(59, 130, 246, 0.2); }
    .cmd-palette-item.selected .cmd-palette-item-icon { color: var(--accent-blue); }

    .cmd-palette-item-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
    }
    .cmd-palette-item-label { flex: 1; font-size: 13.5px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cmd-palette-item-shortcut {
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 1px 6px;
      font-family: inherit; white-space: nowrap;
      flex-shrink: 0;
    }
    .cmd-palette-empty {
      padding: 24px 16px; text-align: center;
      color: var(--text-muted); font-size: 13px;
    }
    .cmd-palette-footer {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
    }
    .cmd-palette-footer kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 4px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px; font-size: 11px;
      font-family: inherit; color: var(--text-secondary);
    }
    .cmd-palette-footer-item { display: flex; align-items: center; gap: 4px; }

    /* ── Cheat Sheet ──────────────────────────────────────── */
    .cheatsheet-backdrop {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      animation: cmdFadeIn 0.12s ease-out;
    }
    body[data-theme="light"] .cheatsheet-backdrop { background: rgba(0, 0, 0, 0.3); }

    .cheatsheet {
      width: min(640px, calc(100vw - 32px));
      max-height: min(520px, 70vh);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      overflow: hidden; display: flex; flex-direction: column;
      animation: cmdScaleIn 0.15s ease-out;
    }
    .cheatsheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .cheatsheet-header h2 { font-size: 15px; font-weight: 600; margin: 0; }
    .cheatsheet-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px;
      border-radius: 6px; transition: color 0.1s;
    }
    .cheatsheet-close:hover { color: var(--text-primary); }
    .cheatsheet-body {
      flex: 1; overflow-y: auto; padding: 16px 20px 20px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; align-content: start;
    }
    .cheatsheet-group h3 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
      margin: 0 0 8px;
    }
    .cheatsheet-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; font-size: 13px; color: var(--text-secondary);
    }
    .cheatsheet-row kbd {
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 7px;
      font-family: inherit;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 10001; display: flex; flex-direction: column-reverse;
      gap: 8px; align-items: center; pointer-events: none;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(8px); } }
    .toast-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px; color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: toastIn 0.2s ease-out;
      pointer-events: auto;
      white-space: nowrap;
    }
    body[data-theme="light"] .toast-item { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .toast-item.exiting { animation: toastOut 0.15s ease-in forwards; }

    .cmd-palette-trigger {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 28px; padding: 0;
    }
    .cmd-palette-trigger.has-hint { width: auto; padding: 0 8px; gap: 4px; }
    .cmd-palette-trigger-hint { font-size: 11px; opacity: 0.6; }

    @media (max-width: 768px) {
      .cmd-palette-trigger { min-width: 36px; min-height: 36px; padding: 6px; }
      .cmd-palette-trigger-hint { display: none; }
      .cmd-palette-backdrop {
        padding-top: 0; padding-left: 0; padding-right: 0;
        align-items: flex-end;
      }
      .cmd-palette {
        width: 100%; max-height: 80vh; max-height: 80dvh;
        border-radius: 14px 14px 0 0;
        animation: cmdSlideUp 0.2s ease-out;
      }
      .cmd-palette-backdrop.closing .cmd-palette { transform: translateY(100%); transition: transform 0.15s ease-in; }
      .cmd-palette-input-wrap { padding: 16px; }
      .cmd-palette-input { font-size: 16px; } /* prevent iOS zoom */
      .cmd-palette-item { padding: 12px 12px; gap: 12px; min-height: 44px; } /* 44px touch targets */
      .cmd-palette-item-shortcut { display: none; } /* hide keyboard hints on mobile */
      .cmd-palette-footer { display: none; } /* hide keyboard nav hints on mobile */
      .cmd-palette-input-badge { display: none; } /* hide ESC badge */
      .cmd-palette-group-label { padding: 12px 12px 6px; }
      .cheatsheet-backdrop { display: none; } /* cheat sheet irrelevant on mobile */
      .toast-container { bottom: max(24px, env(safe-area-inset-bottom, 24px)); }
    }
  </style>
</head>
<body>
<script src="./vendor.js"></script>
<script src="./feedback-widget.js"></script>
<script>
  const { h, render } = window.preact;
  const { useState, useRef, useEffect, useLayoutEffect, useCallback, useMemo } = window.preactHooks;
  const { html } = window;
  const { marked } = window;

  // === API Client (replaces WebSocket) ===
  const API_BASE = window.location.origin;

  const api = {
    async createSession({ bundleName, workingDir }) {
      const resp = await fetch(`${API_BASE}/sessions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bundle_name: bundleName, working_dir: workingDir }),
      });
      return resp.json();
    },
    async listSessions() {
      const resp = await fetch(`${API_BASE}/sessions`);
      return resp.json();
    },
    async getSession(sessionId) {
      const resp = await fetch(`${API_BASE}/sessions/${sessionId}`);
      return resp.json();
    },
    async executeStream(sessionId, prompt, images) {
      const body = { prompt };
      if (images && images.length > 0) body.images = images;
      const resp = await fetch(`${API_BASE}/sessions/${sessionId}/execute/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.detail?.detail || err?.detail || `Execute failed: HTTP ${resp.status}`);
      }
      return resp.json();
    },
    async shellStream(sessionId, command, cwd) {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/${sessionId}/shell`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command, cwd }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.detail || `Shell execution failed: HTTP ${resp.status}`);
      }
      return resp;
    },
    async cancelExecution(sessionId, immediate = false) {
      return fetch(`${API_BASE}/sessions/${sessionId}/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ immediate }),
      });
    },
    async getTranscript(sessionId) {
      const resp = await fetch(`${API_BASE}/sessions/${sessionId}/transcript`);
      if (!resp.ok) throw new Error(`Transcript fetch failed: HTTP ${resp.status}`);
      return resp.json();
    },
    async sendCommand(sessionId, command) {
      const resp = await fetch(`${API_BASE}/chat/command`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, command }),
      });
      return resp.json();
    },
    async respondToApproval(sessionId, requestId, choice) {
      return fetch(`${API_BASE}/sessions/${sessionId}/approvals/${requestId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice }),
      });
    },
    async listPins() {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/pins`);
      return resp.json();
    },
    async pinSession(sessionId) {
      return fetch(`${API_BASE}/chat/api/sessions/${sessionId}/pin`, { method: 'POST' });
    },
    async unpinSession(sessionId) {
      return fetch(`${API_BASE}/chat/api/sessions/${sessionId}/pin`, { method: 'DELETE' });
    },
    async listSessionHistory(limit = 200, offset = 0) {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/history?limit=${limit}&offset=${offset}`);
      return resp.json();
    },
    async searchSessions(query, limit = 20, signal) {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/search?q=${encodeURIComponent(query)}&limit=${limit}`, signal ? { signal } : undefined);
      return resp.json();
    },
    async getSessionRevisions(payload) {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/revisions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return resp.json();
    },
    async resumeSession(sessionId) {
      const MAX_RETRIES = 5;
      const RETRY_DELAY = 2000; // ms
      for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
        const resp = await fetch(`${API_BASE}/sessions/${sessionId}/resume`, {
          method: 'POST',
        });
        // 503 = bundles still loading — retry with backoff
        if (resp.status === 503 && attempt < MAX_RETRIES) {
          console.warn(`[chat] resume 503, retrying in ${RETRY_DELAY}ms (${attempt + 1}/${MAX_RETRIES})`);
          await new Promise(r => setTimeout(r, RETRY_DELAY));
          continue;
        }
        if (!resp.ok) {
          const body = await resp.text().catch(() => '');
          throw new Error(`Resume failed: HTTP ${resp.status} — ${body}`);
        }
        return resp.json();
      }
    },
    async forkPreview(sessionId, turn) {
      const resp = await fetch(`${API_BASE}/chat/api/sessions/${sessionId}/fork-preview?turn=${turn}`);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.detail || `Fork preview failed: HTTP ${resp.status}`);
      }
      return resp.json();
    },
    async forkSession(sessionId, turn, cwd) {
      const body = { turn };
      if (cwd) body.cwd = cwd;
      const resp = await fetch(`${API_BASE}/chat/api/sessions/${sessionId}/fork`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.detail || `Fork failed: HTTP ${resp.status}`);
      }
      return resp.json();
    },
  };

  // === SSE Manager (replaces WebSocket streaming) ===
  const SSE_EVENT_TYPE_MAP = {
    'content_block:start':   'content_start',
    'content_block:delta':   'content_delta',
    'content_block:end':     'content_end',
    'thinking:start':        'content_start',
    'thinking:delta':        'thinking_delta',
    'thinking:end':          'thinking_final',
    'tool:pre':              'tool_call',
    'tool:post':             'tool_result',
    'tool:error':            'tool_result',
    'delegate:agent_spawned':'session_fork',
    'execution:start':       'execution_start',
    'execution:end':         'execution_end',
    'orchestrator:complete': 'prompt_complete',
    'cancel:requested':      'cancel_acknowledged',
    'cancel:completed':      'execution_cancelled',
    'approval_request':      'approval_request',
    'llm:response':          'token_usage',
    'display_message':       'display_message',
  };

  /**
   * Normalize raw kernel event data to the shape the UI handlers expect.
   * The kernel uses field names like block_index, tool_input, usage.input_tokens,
   * while the UI expects index, arguments, input_tokens at the top level.
   */
  function normalizeKernelPayload(eventName, payload) {
    const p = { ...payload };
    switch (eventName) {
      case 'content_block:start':
      case 'content_block:delta':
      case 'content_block:end': {
        // block_index → index (check nested block too)
        if (p.index == null) {
          let idx = p.block_index;
          if (idx == null && p.block) {
            idx = p.block.block_index ?? p.block.index;
          }
          p.index = idx ?? 0;
        }
        // delta: Anthropic dict format → plain string
        if (eventName === 'content_block:delta' && typeof p.delta === 'object' && p.delta !== null) {
          p.delta = p.delta.text || p.delta.thinking || '';
        }
        // content_block:end — extract text from nested block
        if (eventName === 'content_block:end' && typeof p.text !== 'string') {
          const blk = p.block;
          if (blk && typeof blk === 'object') {
            p.text = blk.text || blk.thinking || blk.content || '';
          } else {
            p.text = p.content || '';
          }
        }
        break;
      }
      case 'delegate:agent_spawned':
        // Gap 1: Delegate module emits sub_session_id; frontend expects child_id.
        if (p.child_id == null && p.sub_session_id != null) p.child_id = p.sub_session_id;
        if (p.parent_tool_call_id == null && p.tool_call_id != null) p.parent_tool_call_id = p.tool_call_id;
        // Gap 2: Delegate module emits parent_session_id; frontend expects parent_id.
        if (p.parent_id == null && p.parent_session_id != null) p.parent_id = p.parent_session_id;
        break;
      case 'tool:pre':
        if (p.arguments == null && p.tool_input != null) {
          p.arguments = p.tool_input;
        }
        // E4: Surface lineage fields so tool_call handler can detect sub-agent origin
        if (p.session_id == null && payload.session_id != null) p.session_id = payload.session_id;
        if (p.parent_id == null && payload.parent_id != null) p.parent_id = payload.parent_id;
        break;
      case 'tool:post': {
        const result = p.result;
        if (result && typeof result === 'object') {
          const out = result.output;
          p.output = out == null ? null
            : typeof out === 'string' ? out
            : JSON.stringify(out);
          p.error = result.error || null;
          p.success = !result.error;
        }
        // E4: Surface lineage fields
        if (p.session_id == null && payload.session_id != null) p.session_id = payload.session_id;
        if (p.parent_id == null && payload.parent_id != null) p.parent_id = payload.parent_id;
        break;
      }
      case 'tool:error':
        if (p.success == null) p.success = false;
        if (p.error == null) p.error = p.message || 'Unknown error';
        // E4: Surface lineage fields
        if (p.session_id == null && payload.session_id != null) p.session_id = payload.session_id;
        if (p.parent_id == null && payload.parent_id != null) p.parent_id = payload.parent_id;
        break;
      case 'llm:response': {
        const usage = p.usage || {};
        p.input_tokens = usage.input_tokens || 0;
        p.output_tokens = usage.output_tokens || 0;
        p.total_tokens = usage.total_tokens || (p.input_tokens + p.output_tokens);
        p.cache_read_tokens = usage.cache_read_tokens || 0;
        p.cache_write_tokens = usage.cache_write_tokens || 0;
        if (!p.model) p.model = usage.model;
        break;
      }
      case 'approval_request':
        if (p.id == null && p.request_id != null) p.id = p.request_id;
        break;
      default:
        // D-GAP-01: warn on unmapped kernel event names so future schema changes are observable
        if (eventName) console.warn('[normalizeKernelPayload] unmapped event:', eventName);
        break;
    }
    // Preserve sub-session routing fields from kernel events
    if (payload.child_session_id && !p.child_session_id) p.child_session_id = payload.child_session_id;
    if (payload.parent_tool_call_id && !p.parent_tool_call_id) p.parent_tool_call_id = payload.parent_tool_call_id;
    if (payload.nesting_depth != null && p.nesting_depth == null) p.nesting_depth = payload.nesting_depth;
    return p;
  }

  function createSSEManager(sessionId, handlers) {
    const url = sessionId
      ? `${API_BASE}/events?session=${sessionId}`
      : `${API_BASE}/events`;
    const source = new EventSource(url);
    const eventNames = Object.keys(SSE_EVENT_TYPE_MAP);
    for (const name of eventNames) {
      source.addEventListener(name, (e) => {
        try {
          const envelope = JSON.parse(e.data);
          const rawPayload = envelope.data || {};
          const payload = normalizeKernelPayload(name, rawPayload);
          const msgType = SSE_EVENT_TYPE_MAP[name] || name;
          const msg = { type: msgType, ...payload };
          if (handlers.onMessage) handlers.onMessage(msg, envelope.session_id);
        } catch (err) {
          console.error('[SSE] parse error', name, err);
        }
      });
    }
    source.onerror = () => { if (handlers.onError) handlers.onError(); };
    source.onopen = () => { if (handlers.onOpen) handlers.onOpen(); };
    return { close() { source.close(); } };
  }

  // —— Constants ——————————————————————————————————————————————————————
  const SLASH_COMMANDS = [
    { name: '/help',    desc: 'Show available commands', clientSide: true },
    { name: '/clear',   desc: 'Clear conversation',      clientSide: true },
    { name: '/workspace', desc: 'Toggle workspace mode',       clientSide: true },
    { name: '/thinking', desc: 'Toggle thinking visibility', clientSide: true },
    { name: '/status',  desc: 'Session status',          clientSide: false },
    { name: '/tools',   desc: 'List tools',              clientSide: false },
    { name: '/agents',  desc: 'List agents',             clientSide: false },
    { name: '/bundle',  desc: 'Change bundle',           clientSide: false },
    { name: '/modes',   desc: 'List modes',              clientSide: false },
    { name: '/mode',    desc: 'Set mode',                clientSide: false },
    { name: '/config',  desc: 'Show session config',     clientSide: false },
  ];

  // —— Utilities ——————————————————————————————————————————————————————

  function formatCommandResult(command, result) {
    if (result.error) return { text: result.error };

    const h = s => '<span class="config-heading">' + s + '</span>';
    const d = s => '<span class="config-dim">' + s + '</span>';
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');

    if (command === 'config' && result.type === 'config') {

      const lines = [];
      const sess = result.session || {};
      lines.push(h('Session'));
      lines.push('  orchestrator  ' + esc(sess.orchestrator || 'unknown'));
      lines.push('  context       ' + esc(sess.context || 'unknown'));

      if (result.providers && result.providers.length) {
        lines.push('');
        lines.push(h('Providers'));
        for (const p of result.providers) {
          let line = '  ' + esc(p.module);
          if (p.model) line += '  ' + d(esc(p.model));
          if (p.priority != null) line += '  ' + d('priority=' + p.priority);
          lines.push(line);
        }
      }

      if (result.tools && result.tools.length) {
        lines.push('');
        lines.push(h('Tools') + ' ' + d('(' + result.tools.length + ')'));
        for (const t of result.tools) lines.push('  ' + esc(t));
      }

      if (result.hooks && result.hooks.length) {
        lines.push('');
        lines.push(h('Hooks'));
        for (const hk of result.hooks) lines.push('  ' + esc(hk));
      }

      if (result.agents && result.agents.length) {
        lines.push('');
        lines.push(h('Agents') + ' ' + d('(' + result.agents.length + ')'));
        for (const a of result.agents) lines.push('  ' + esc(a));
      }

      return { html: '<pre>' + lines.join('\n') + '</pre>', cssClass: 'config-result' };
    }

    // /tools — table of tool names + descriptions
    if (command === 'tools' && result.type === 'tools') {
      const lines = [h('Tools') + ' ' + d('(' + (result.tools || []).length + ')')];
      for (const t of (result.tools || [])) {
        const first = (t.description || '').split('\n')[0];
        const desc = first.length > 60 ? first.slice(0, 57) + '...' : first;
        lines.push('  ' + esc(t.name).padEnd(22) + d(esc(desc)));
      }
      return { html: '<pre>' + lines.join('\n') + '</pre>', cssClass: 'config-result' };
    }

    // /agents — table of agent names + descriptions
    if (command === 'agents' && result.type === 'agents') {
      const agents = result.agents || [];
      if (!agents.length) return { text: 'No agents loaded' };
      const lines = [h('Agents') + ' ' + d('(' + agents.length + ')')];
      for (const a of agents) {
        const first = (a.description || '').split('\n')[0];
        const desc = first.length > 60 ? first.slice(0, 57) + '...' : first;
        lines.push('  ' + esc(a.name).padEnd(22) + d(esc(desc)));
      }
      return { html: '<pre>' + lines.join('\n') + '</pre>', cssClass: 'config-result' };
    }

    // /modes — grouped list of available modes
    if (command === 'modes' && result.type === 'modes') {
      const modes = result.modes || [];
      const active = result.active_mode;
      if (!modes.length) return { html: '<pre>' + h('Modes') + ' ' + d('(none available)') + '</pre>', cssClass: 'config-result' };
      const lines = [h('Modes') + (active ? ' ' + d('active: ' + active) : '')];
      // Group by source
      const groups = {};
      for (const m of modes) {
        const src = m.source || 'unknown';
        if (!groups[src]) groups[src] = [];
        groups[src].push(m);
      }
      for (const [src, items] of Object.entries(groups)) {
        lines.push('');
        lines.push('  ' + d(esc(src)));
        for (const m of items) {
          const marker = m.name === active ? ' *' : '';
          const desc = m.description ? '  ' + d(esc(m.description)) : '';
          lines.push('    ' + esc(m.name) + marker + desc);
        }
      }
      return { html: '<pre>' + lines.join('\n') + '</pre>', cssClass: 'config-result' };
    }

    // /mode — mode activation/deactivation result
    if (command === 'mode' && result.type === 'mode') {
      const active = result.active_mode;
      const prev = result.previous_mode;
      if (active) {
        const msg = prev ? 'Switched from ' + prev + ' to ' + active : 'Mode activated: ' + active;
        return { text: msg };
      }
      if (prev) return { text: 'Mode deactivated: ' + prev };
      return { text: result.message || 'No mode active' };
    }

    // /fork — fork info or fork result
    if (command === 'fork' && result.type === 'fork_info') {
      return { text: `Session has ${result.turn_count} turn${result.turn_count === 1 ? '' : 's'}.\nUsage: /fork <turn> — or click the fork icon on any message.` };
    }
    if (command === 'fork' && result.type === 'forked') {
      const lines = [
        'Forked at turn ' + result.forked_from_turn,
        'New session: ' + result.session_id,
        'Messages kept: ' + result.message_count,
      ];
      return { text: lines.join('\n') };
    }

    // Default: pretty-print JSON for other commands
    return { text: JSON.stringify(result, null, 2) };
  }

  // --- Pin API helpers ---
  async function fetchPinnedSessions() {
    try {
      const data = await api.listPins();
      return new Set(data.pinned || []);
    } catch { return new Set(); }
  }

  async function apiPinSession(sessionId) {
    try {
      await api.pinSession(sessionId);
    } catch (e) { console.error('Failed to pin session:', e); }
  }

  async function apiUnpinSession(sessionId) {
    try {
      await api.unpinSession(sessionId);
    } catch (e) { console.error('Failed to unpin session:', e); }
  }

  function makeId() {
    return Math.random().toString(36).slice(2, 10);
  }

  function getArgPreview(toolName, args) {
    const field = {
      bash: 'command',
      read_file: 'file_path', write_file: 'file_path', edit_file: 'file_path',
      grep: 'pattern', glob: 'pattern',
      web_search: 'query', web_fetch: 'url',
      delegate: 'agent', task: 'agent',
      recipes: 'operation',
    }[toolName];
    if (field && args[field]) return String(args[field]).slice(0, 60);
    const firstVal = Object.values(args || {})[0];
    return firstVal ? String(typeof firstVal === 'object' ? JSON.stringify(firstVal) : firstVal).slice(0, 60) : '';
  }

  /**
   * For delegate/task tools without sub-session data, extract the response
   * text from the JSON result envelope and return it as rendered HTML.
   * Returns null for non-delegate tools or if the response can't be extracted.
   */
  function extractDelegateResponse(item) {
    if (item.toolName !== 'delegate' && item.toolName !== 'task') return null;
    if (item.resultError) return null;
    if (!item.result || typeof item.result !== 'string') return null;
    let parsed = null;
    try { parsed = JSON.parse(item.result); } catch { return null; }
    if (!parsed || typeof parsed !== 'object') return null;
    // Handle both envelope formats:
    //   {response: "...", session_id: "...", agent: "..."}
    //   {error: null, output: {response: "...", ...}, success: true}
    const output = parsed.output && typeof parsed.output === 'object' ? parsed.output : parsed;
    const response = output.response;
    if (!response || typeof response !== 'string') return null;
    return {
      htmlContent: sanitizeHtml(marked.parse(response)),
      agent: output.agent || parsed.agent || (item.arguments && item.arguments.agent) || null,
      status: output.status || (parsed.success === false ? 'error' : 'success'),
    };
  }

  /**
   * Smart formatting for tool results. Parses JSON results from common tools
   * and returns rendered HTML instead of raw JSON dumps.
   * Returns null to fall back to raw display.
   */
  function formatToolResult(item) {
    if (item.resultError) return null;
    const raw = item.result;
    if (!raw) return null;
    let data;
    if (typeof raw === 'object') {
      data = raw;
    } else if (typeof raw === 'string') {
      try { data = JSON.parse(raw); } catch { return null; }
    } else {
      return null;
    }
    if (!data || typeof data !== 'object') return null;

    // Unwrap result envelope: {error, output, success}
    if (('error' in data || 'success' in data) && 'output' in data) {
      if (typeof data.output === 'object' && data.output !== null && !Array.isArray(data.output)) {
        // Object output (read_file, grep, glob, etc.) — unwrap to inner object
        data = data.output;
      } else {
        // String/null output (bash, etc.) — extract text directly
        let text = typeof data.output === 'string' ? data.output : '';
        if (data.error && typeof data.error === 'string') text += (text ? '\n' : '') + data.error;
        if (text) return { htmlContent: sanitizeHtml(marked.parse('```\n' + text + '\n```')) };
        return null;
      }
    }

    let md = null;

    switch (item.toolName) {
      case 'read_file': {
        const content = data.content;
        const fp = data.file_path || '';
        const linesRead = data.lines_read;
        const totalLines = data.total_lines;
        if (typeof content === 'string') {
          const lines = content.split('\n');
          const show = lines.slice(0, 60).join('\n');
          const ext = fp.split('.').pop() || '';
          md = '```' + ext + '\n' + show + '\n```';
          if (lines.length > 60) md += '\n*...showing 60 of ' + (linesRead || lines.length) + ' lines (' + (totalLines || '?') + ' total)*';
        }
        break;
      }
      case 'write_file': {
        const fp = data.file_path;
        if (fp) md = 'Wrote ' + (data.bytes_written ? '**' + data.bytes_written + '** bytes to ' : '') + '`' + fp + '`';
        break;
      }
      case 'edit_file': {
        const fp = data.file_path;
        const n = data.replacements_made;
        if (fp) md = '**' + (n || 0) + '** replacement' + (n !== 1 ? 's' : '') + ' in `' + fp + '`';
        break;
      }
      case 'apply_patch': {
        const fp = data.path || data.file_path;
        if (fp) md = '`' + (data.type || 'patch') + '` applied to `' + fp + '`';
        break;
      }
      case 'grep': {
        const count = data.matches_count ?? data.total_matches;
        if (count != null) {
          const parts = ['**' + count + '** match' + (count !== 1 ? 'es' : '') + (data.pattern ? ' for `' + data.pattern + '`' : '')];
          const results = data.results || [];
          for (const r of results.slice(0, 15)) {
            if (r.context && Array.isArray(r.context)) {
              for (const c of r.context.slice(0, 3)) {
                parts.push((c.is_match ? '> ' : '  ') + '`' + (r.file || '') + ':' + (c.line_number || '') + '` ' + (c.content || '').trim().slice(0, 100));
              }
            } else if (r.file) {
              parts.push('- `' + r.file + '`' + (r.line_number ? ':' + r.line_number : '') + (r.content ? ' ' + r.content.trim().slice(0, 80) : ''));
            }
          }
          if (results.length > 15) parts.push('*...and ' + (results.length - 15) + ' more*');
          md = parts.join('\n');
        }
        break;
      }
      case 'glob': {
        const files = data.files || [];
        const total = data.total_files ?? files.length;
        const parts = ['**' + total + '** file' + (total !== 1 ? 's' : '')];
        for (const f of files.slice(0, 20)) {
          parts.push('- `' + (typeof f === 'string' ? f : (f.path || f)) + '`');
        }
        if (files.length > 20) parts.push('*...and ' + (files.length - 20) + ' more*');
        md = parts.join('\n');
        break;
      }
      case 'python_check': {
        if (data.summary) {
          md = data.summary;
          const issues = data.issues || [];
          if (issues.length > 0) {
            md += '\n';
            for (const iss of issues.slice(0, 10)) {
              const loc = [iss.file, iss.line].filter(Boolean).join(':');
              md += '\n- `' + loc + '` **' + (iss.code || '') + '** ' + (iss.message || '');
            }
            if (issues.length > 10) md += '\n*...and ' + (issues.length - 10) + ' more*';
          }
        }
        break;
      }
      case 'todo': {
        const todos = data.todos || (item.arguments && item.arguments.todos) || [];
        if (todos.length > 0) {
          md = todos.map(function(t) {
            var icon = t.status === 'completed' ? '\u2705' : t.status === 'in_progress' ? '\u25b6' : '\u25fb';
            return icon + ' ' + (t.content || t.activeForm || '');
          }).join('\n');
        } else if (data.status) {
          md = '*' + data.status + '* (' + (data.count || 0) + ' items)';
        }
        break;
      }
      case 'web_search': {
        const results = data.results || [];
        if (results.length > 0) {
          md = results.slice(0, 8).map(function(r) {
            return '- [' + (r.title || 'Result') + '](' + (r.url || r.link || '#') + ')';
          }).join('\n');
        }
        break;
      }
      case 'web_fetch': {
        const content = data.content;
        if (typeof content === 'string') {
          md = '```\n' + content.slice(0, 1000) + '\n```';
          if (data.truncated || content.length > 1000) md += '\n*...truncated (' + (data.total_bytes || content.length) + ' bytes total)*';
        }
        break;
      }
      case 'load_skill': {
        if (data.skill_name || data.name) md = 'Loaded skill: **' + (data.skill_name || data.name) + '**';
        else if (data.skills) md = data.skills.map(function(s) { return '- **' + (typeof s === 'string' ? s : (s.name || s)) + '**'; }).join('\n');
        break;
      }
      case 'mode': {
        if (data.name || data.mode) md = 'Mode: **' + (data.name || data.mode) + '** (' + (data.operation || data.status || '') + ')';
        else if (data.modes) md = data.modes.map(function(m) { return '- **' + (typeof m === 'string' ? m : (m.name || m)) + '**'; }).join('\n');
        break;
      }
      case 'LSP': {
        if (data.hover) {
          const hc = typeof data.hover === 'string' ? data.hover : (data.hover.content || '');
          if (hc) md = '```\n' + hc + '\n```';
        } else if (data.definitions) {
          md = data.definitions.map(function(d) { return '- `' + (d.file || d.uri || '') + ':' + (d.line || '') + '`'; }).join('\n');
        } else if (data.references) {
          md = '**' + data.references.length + '** references\n' +
            data.references.slice(0, 10).map(function(r) { return '- `' + (r.file || r.uri || '') + ':' + (r.line || '') + '`'; }).join('\n');
        } else if (data.diagnostics) {
          md = '**' + data.diagnostics.length + '** diagnostic' + (data.diagnostics.length !== 1 ? 's' : '') + '\n' +
            data.diagnostics.slice(0, 10).map(function(d) { return '- `' + (d.file || '') + ':' + (d.line || '') + '` ' + (d.severity || '') + ' ' + (d.message || ''); }).join('\n');
        }
        break;
      }
    }

    if (!md) return null;
    return { htmlContent: sanitizeHtml(marked.parse(md)) };
  }

  function getToolStatusIcon(status) {
    return { pending: '⏱', running: '⟳', complete: '✓', error: '✗' }[status] || '⏱';
  }

  function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.slice(0, n) + '…' : s;
  }

  function normalizeCwd(value) {
    const raw = typeof value === 'string' ? value : '~';
    const trimmed = raw.trim();
    return trimmed || '~';
  }

  function normalizeSessionParentId(value) {
    if (typeof value !== 'string') return null;
    const trimmed = value.trim();
    return trimmed || null;
  }

  function sessionUpdatedTs(session) {
    return Date.parse((session && session.lastUpdated) || '') || 0;
  }

  function compareSessionEntriesByRecent([keyA, a], [keyB, b]) {
    const tsA = sessionUpdatedTs(a);
    const tsB = sessionUpdatedTs(b);
    if (tsB !== tsA) return tsB - tsA;
    const cwdA = normalizeCwd(a && a.cwd).toLowerCase();
    const cwdB = normalizeCwd(b && b.cwd).toLowerCase();
    if (cwdA < cwdB) return -1;
    if (cwdA > cwdB) return 1;
    return keyA.localeCompare(keyB);
  }

  function buildSessionTree(entries, pinnedIds) {
    const keyBySessionId = new Map();
    for (const [key, session] of entries) {
      const sid = session && typeof session.sessionId === 'string' ? session.sessionId : '';
      if (sid) keyBySessionId.set(sid, key);
    }

    const roots = [];
    const childrenByParentKey = new Map();
    for (const entry of entries) {
      const [key, session] = entry;
      const parentSessionId = normalizeSessionParentId(session && session.parentSessionId);
      const parentKey = parentSessionId ? keyBySessionId.get(parentSessionId) : null;
      if (!parentSessionId || parentKey === key) {
        // Genuine root session (no parent claimed), or self-referencing — add to roots.
        roots.push(entry);
        continue;
      }
      // Forked sessions are promoted to roots -- they are independent
      // continuations, not agent sub-sessions.
      if (session && session.forkedFromTurn) {
        roots.push(entry);
        continue;
      }
      if (!parentKey) {
        // Orphaned child: has parentSessionId but parent isn't loaded.
        // This can happen when the parent is beyond the pagination window,
        // was deleted from disk, or hasn't been fetched yet.  Pinned
        // orphans are promoted to roots so they remain accessible (the
        // user explicitly pinned them and must be able to unpin).
        // All other orphans are hidden until their parent is fetched.
        const sid = session && session.sessionId;
        if (sid && pinnedIds && pinnedIds.has(sid)) {
          roots.push(entry);
        } else {
          console.warn('[chat] orphaned sub-session hidden:', key, 'parent:', parentSessionId);
        }
        continue;
      }
      const existing = childrenByParentKey.get(parentKey);
      if (existing) {
        existing.push(entry);
      } else {
        childrenByParentKey.set(parentKey, [entry]);
      }
    }

    roots.sort(compareSessionEntriesByRecent);
    for (const children of childrenByParentKey.values()) {
      children.sort(compareSessionEntriesByRecent);
    }

    return { roots, childrenByParentKey };
  }

  function sessionMatchesFilter(sessionKey, session, rawQuery) {
    const query = String(rawQuery || '').trim().toLowerCase();
    if (!query) return true;

    const s = session && typeof session === 'object' ? session : {};
    const sessionId = String(s.sessionId || '').toLowerCase();

    if (query.startsWith('sid:')) {
      const needle = query.slice(4).trim();
      if (!needle) return true;
      return sessionId.includes(needle);
    }

    const haystack = [
      sessionKey,
      s.sessionId,
      s.name,
      s.cwd,
      s.bundle,
      s.lastUserMessage,
      s.source,
      s.status,
      s.turnCount,
      s.messageCount,
      s.parentSessionId,
      s.spawnAgent,
    ]
      .filter(v => v !== null && v !== undefined && v !== '')
      .map(v => String(v).toLowerCase())
      .join(' ');
    return haystack.includes(query);
  }

  // HTML sanitizer — uses DOMPurify when available (loaded via vendor.js),
  // falls back to a basic strip for dev/offline use.
  const sanitizeHtml = (() => {
    if (typeof DOMPurify !== 'undefined') {
      return (html) => DOMPurify.sanitize(html);
    }
    // Fallback: strip dangerous tags and event handlers
    console.warn('[chat] DOMPurify not loaded — using basic HTML sanitizer. Rebuild vendor.js to fix.');
    return (html) => {
      const div = document.createElement('div');
      div.innerHTML = html;
      const dangerous = div.querySelectorAll('script,iframe,object,embed,link,style,meta,base,form');
      dangerous.forEach(el => el.remove());
      const UNSAFE_ATTRS = ['src', 'href', 'action', 'formaction', 'data', 'xlink:href'];
      const UNSAFE_PROTO = /^\s*(javascript|data|vbscript):/i;
      div.querySelectorAll('*').forEach(el => {
        Array.from(el.attributes).forEach(attr => {
          if (attr.name.startsWith('on') ||
              (UNSAFE_ATTRS.includes(attr.name) && UNSAFE_PROTO.test(attr.value))) {
            el.removeAttribute(attr.name);
          }
        });
      });
      return div.innerHTML;
    };
  })();

  function transcriptToChronoItems(transcript) {
    const items = [];
    const toolCallIndexById = {};
    let order = 0;

    const toText = (value) => {
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) {
        const parts = [];
        for (const block of value) {
          if (!block || typeof block !== 'object') continue;
          if (block.type === 'text' && typeof block.text === 'string') {
            parts.push(block.text);
          } else if (block.type === 'input_text' && typeof block.text === 'string') {
            parts.push(block.text);
          } else if (typeof block.content === 'string') {
            parts.push(block.content);
          }
        }
        return parts.join('\n');
      }
      return '';
    };

    for (const msg of (Array.isArray(transcript) ? transcript : [])) {
      if (!msg || typeof msg !== 'object') continue;
      const role = msg.role;
      const content = msg.content;

      if (role === 'user') {
        const text = toText(content);
        if (!text) continue;
        items.push({
          id: makeId(),
          type: 'text',
          role: 'user',
          content: text,
          streaming: false,
          order: order++,
        });
        continue;
      }

      if (role === 'assistant') {
        if (typeof content === 'string') {
          const parsedHtml = sanitizeHtml(marked.parse(content));
          items.push({
            id: makeId(),
            type: 'text',
            role: 'assistant',
            content,
            htmlContent: parsedHtml,
            streaming: false,
            order: order++,
          });
          continue;
        }

        const blocks = Array.isArray(content) ? content : [];
        for (const block of blocks) {
          if (!block || typeof block !== 'object') continue;
          if (block.type === 'text' && typeof block.text === 'string') {
            const parsedHtml = sanitizeHtml(marked.parse(block.text));
            items.push({
              id: makeId(),
              type: 'text',
              role: 'assistant',
              content: block.text,
              htmlContent: parsedHtml,
              streaming: false,
              order: order++,
            });
            continue;
          }
          if (block.type === 'thinking' && typeof block.thinking === 'string') {
            items.push({
              id: makeId(),
              type: 'thinking',
              content: block.thinking,
              streaming: false,
              order: order++,
            });
            continue;
          }
          if ((block.type === 'tool_use' || block.type === 'tool_call') && block.name) {
            const id = block.id || block.tool_call_id;
            const originSessionId = typeof block.session_id === 'string' ? block.session_id : null;
            const originParentId = typeof block.parent_id === 'string' ? block.parent_id : null;
            const subAgentName = typeof block.agent === 'string' ? block.agent : null;
            const item = {
              id: makeId(),
              type: 'tool_call',
              toolName: block.name,
              toolCallId: id || makeId(),
              arguments: block.input || block.arguments || {},
              toolStatus: 'complete',
              result: '',
              origin: originParentId ? 'sub-agent' : 'main',
              subAgentName,
              originSessionId,
              originParentId,
              streaming: false,
              order: order++,
            };
            const idx = items.length;
            items.push(item);
            if (id) toolCallIndexById[id] = idx;
          }
        }
        continue;
      }

      if (role === 'tool') {
        // Handle string content directly (e.g., delegate/task tool results
        // where content is a JSON-encoded string like '{"response":"...","session_id":"..."}')
        if (typeof content === 'string') {
          const toolUseId = msg.tool_call_id || msg.tool_use_id;
          const idx = toolCallIndexById[toolUseId];
          if (idx !== undefined) {
            items[idx] = {
              ...items[idx],
              result: content,
              toolStatus: msg.is_error ? 'error' : 'complete',
            };
          }
          continue;
        }
        const blocks = Array.isArray(content) ? content : [content];
        for (const block of blocks) {
          if (!block || typeof block !== 'object') continue;
          const toolUseId = block.tool_use_id || block.tool_call_id;
          const idx = toolCallIndexById[toolUseId];
          if (idx === undefined) continue;
          const result = typeof block.content === 'string'
            ? block.content
            : JSON.stringify(block.content);
          items[idx] = {
            ...items[idx],
            result,
            toolStatus: block.is_error ? 'error' : 'complete',
          };
        }
      }
    }
    return items;
  }

  /**
   * Derive turn boundaries from chronoItems.
   * A new turn starts at each user message. Returns:
   * - turnMap: Map<turnId, { turnId, turnNumber, userItem, startOrder }>
   * - itemTurnMap: Map<itemId, turnId>
   * turnId is the id of the user message that opened the turn.
   */
  function deriveTurns(items) {
    const turnMap = new Map();
    const itemTurnMap = new Map();
    const segmentMap = new Map(); // itemId → segmentId (assistant message id that "concludes" this segment)
    const sorted = [...items].sort((a, b) => a.order - b.order);

    let currentTurnId = null;
    let turnNumber = 0;
    let pendingActivityIds = []; // activities waiting for a segment anchor

    for (const item of sorted) {
      if (item.type === 'text' && item.role === 'user') {
        // Flush any orphan activities from previous turn's last segment
        pendingActivityIds = [];
        turnNumber++;
        currentTurnId = item.id;
        turnMap.set(currentTurnId, {
          turnId: currentTurnId,
          turnNumber,
          userItem: item,
          startOrder: item.order,
        });
      }

      if (currentTurnId) {
        itemTurnMap.set(item.id, currentTurnId);
      }

      // Non-text items accumulate as pending segment members
      if (item.type !== 'text') {
        pendingActivityIds.push(item.id);
        continue;
      }

      // Assistant text: claims all pending activities as its segment
      if (item.type === 'text' && item.role === 'assistant' && currentTurnId) {
        const segId = item.id;
        segmentMap.set(segId, segId); // the text itself belongs to its segment
        for (const id of pendingActivityIds) {
          segmentMap.set(id, segId);
        }
        pendingActivityIds = [];
      }
    }

    // Orphan activities after last assistant text in the last turn:
    // attach to the last segment so clicking the last message shows
    // "everything from that point to turn end"
    if (pendingActivityIds.length > 0) {
      const segValues = [...segmentMap.values()];
      const lastSegId = segValues.length > 0 ? segValues[segValues.length - 1] : null;
      if (lastSegId) {
        for (const id of pendingActivityIds) {
          segmentMap.set(id, lastSegId);
        }
      }
    }

    return { turnMap, itemTurnMap, segmentMap };
  }

  /**
   * Compute activity counts per turn and per segment for passive indicators.
   * Returns turnCounts (Map<turnId, {thinking, tools}>) and
   * segmentCounts (Map<segmentId, {thinking, tools}>).
   */
  function computeActivityCounts(items, itemTurnMap, segmentMap) {
    const turnCounts = new Map();
    const segmentCounts = new Map();

    for (const item of items) {
      if (item.type === 'text' || item.type === 'token_usage') continue;

      const turnId = itemTurnMap ? itemTurnMap.get(item.id) : null;
      const segId = segmentMap ? segmentMap.get(item.id) : null;

      if (turnId) {
        if (!turnCounts.has(turnId)) turnCounts.set(turnId, { thinking: 0, tools: 0 });
        const tc = turnCounts.get(turnId);
        if (item.type === 'thinking') tc.thinking++;
        else if (item.type === 'tool_call') tc.tools++;
      }

      if (segId) {
        if (!segmentCounts.has(segId)) segmentCounts.set(segId, { thinking: 0, tools: 0 });
        const sc = segmentCounts.get(segId);
        if (item.type === 'thinking') sc.thinking++;
        else if (item.type === 'tool_call') sc.tools++;
      }
    }

    return { turnCounts, segmentCounts };
  }

  /**
   * Post-process chrono items to reconstruct sub-sessions from saved transcripts.
   * Delegation tool calls (delegate/task) with originSessionId are identified,
   * and content items belonging to child sessions are moved into SubSession entries
   * in the provided subSessionsRef map.
   */
  /**
   * Scan chrono items for delegate/task tool calls, extract child session IDs
   * from their tool results, and return a list of {parentToolCallId, childSessionId, agent}
   * entries that need child transcript fetching.
   *
   * The child session_id is embedded in the tool result's JSON-encoded content string:
   *   {"response": "...", "session_id": "child-xxx", "agent": "foundation:explorer", ...}
   */
  function findDelegationChildSessions(items) {
    const results = [];
    // Build a map of toolCallId -> tool result item for quick lookup
    const resultByToolCallId = {};
    for (const item of items) {
      if (item.type === 'tool_call' && item.result && typeof item.result === 'string') {
        resultByToolCallId[item.toolCallId] = item;
      }
    }

    for (const item of items) {
      if (item.type !== 'tool_call') continue;
      if (item.toolName !== 'delegate' && item.toolName !== 'task') continue;

      // Try to extract child session_id from the result JSON
      const resultStr = item.result;
      if (!resultStr || typeof resultStr !== 'string') continue;

      let parsed = null;
      try { parsed = JSON.parse(resultStr); } catch {}
      if (!parsed || typeof parsed !== 'object') continue;

      // session_id may be at top level or nested inside output
      const out = parsed.output && typeof parsed.output === 'object' ? parsed.output : null;
      const childSessionId = parsed.session_id || parsed.sessionId
        || (out && (out.session_id || out.sessionId));
      if (!childSessionId || typeof childSessionId !== 'string') continue;

      const agent = parsed.agent || (out && out.agent)
        || item.subAgentName
        || (item.arguments && item.arguments.agent)
        || null;

      results.push({
        parentToolCallId: item.toolCallId,
        parentItemId: item.id,
        childSessionId,
        agent,
        toolStatus: item.toolStatus,
      });
    }
    return results;
  }

  /**
   * Async: fetch child transcripts for delegate/task tool calls and populate
   * subSessionsRef with the child's content. Mutates items in place (sets subSessionId).
   * Returns a promise that resolves when all child transcripts are loaded.
   */
  async function reconstructSubSessionsFromTranscript(items, subSessionsRef) {
    const delegations = findDelegationChildSessions(items);
    if (delegations.length === 0) return items;

    // Fetch all child transcripts in parallel
    const fetches = delegations.map(async (del) => {
      try {
        const data = await api.getTranscript(del.childSessionId);
        const transcript = Array.isArray(data?.transcript) ? data.transcript : [];
        if (transcript.length === 0) return { del, childItems: null, error: null };

        const childItems = transcriptToChronoItems(transcript);
        return { del, childItems, error: null };
      } catch (err) {
        console.warn(`[transcript] Failed to fetch child session ${del.childSessionId}:`, err.message || err);
        return { del, childItems: null, error: err.message || 'Failed to load sub-session transcript' };
      }
    });

    const results = await Promise.all(fetches);

    // Mark failed fetches on parent items so the UI can show an error indicator
    for (const result of results) {
      if (result.error || !result.childItems) {
        const parentItem = items.find(i => i.id === result.del.parentItemId);
        if (parentItem) {
          parentItem.subSessionFetchFailed = true;
          parentItem.subSessionFetchError = result.error || 'Sub-session transcript is empty';
          parentItem.subSessionFetchAgent = result.del.agent;
        }
        continue;
      }
    }

    for (const result of results) {
      if (!result.childItems) continue;
      const { del, childItems } = result;

      // Build SubSession from child's chrono items
      let orderCounter = 0;
      const content = [];
      const toolCalls = [];
      for (const ci of childItems) {
        ci.order = orderCounter++;
        if (ci.type === 'tool_call') {
          toolCalls.push(ci);
        } else {
          content.push(ci);
        }
      }

      subSessionsRef.current.set(del.parentToolCallId, {
        sessionId: del.childSessionId,
        parentToolCallId: del.parentToolCallId,
        agent: del.agent,
        status: del.toolStatus === 'error' ? 'error' : 'complete',
        content,
        toolCalls,
        orderCounter,
        _rev: 1,
      });

      // Set flag on parent item for rendering
      const parentItem = items.find(i => i.id === del.parentItemId);
      if (parentItem) parentItem.subSessionId = del.childSessionId;

      // Register tool calls from child in toolMapRef so nested sub-sessions can resolve
      for (const tc of toolCalls) {
        if (tc.toolCallId) {
          // Check if this child tool call is itself a delegation with a child transcript
          // (recursive nesting from saved sessions)
          // For now, register the toolCallId for potential deeper reconstruction
        }
      }
    }

    // Recurse: check if any child sub-sessions themselves contain delegations
    // by scanning the newly added toolCalls for delegate/task results
    for (const result of results) {
      if (!result.childItems) continue;
      const { del, childItems } = result;
      const nestedDelegations = findDelegationChildSessions(childItems);
      if (nestedDelegations.length > 0) {
        // Fetch grandchild transcripts
        await reconstructSubSessionsFromTranscript(childItems, subSessionsRef);
      }
    }

    return items;
  }

  function countTranscriptMessages(transcript) {
    let count = 0;
    for (const msg of (Array.isArray(transcript) ? transcript : [])) {
      if (msg && typeof msg === 'object' && msg.role) count += 1;
    }
    return count;
  }

  function extractLastUserMessage(transcript) {
    const rows = Array.isArray(transcript) ? transcript : [];
    for (let i = rows.length - 1; i >= 0; i -= 1) {
      const msg = rows[i];
      if (!msg || typeof msg !== 'object' || msg.role !== 'user') continue;
      const content = msg.content;
      if (typeof content === 'string' && content.trim()) {
        return content.trim();
      }
      if (!Array.isArray(content)) continue;
      for (const block of content) {
        if (!block || typeof block !== 'object') continue;
        if (block.type === 'text' && typeof block.text === 'string' && block.text.trim()) {
          return block.text.trim();
        }
        if (block.type === 'input_text' && typeof block.text === 'string' && block.text.trim()) {
          return block.text.trim();
        }
      }
    }
    return null;
  }

  function pickWelcomeContent() {
    // Pick a random tagline
    const tagline = WELCOME_TAGLINES[Math.floor(Math.random() * WELCOME_TAGLINES.length)];
    // Pick 4 of 5 categories randomly, then 1 prompt from each
    const shuffled = [...WELCOME_PROMPT_POOL].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 4);
    const prompts = selected.map(bucket => ({
      cat: bucket.cat,
      text: bucket.prompts[Math.floor(Math.random() * bucket.prompts.length)],
    }));
    return { tagline, prompts };

  function WelcomeState({ onSelectPrompt }) {
    const [content, setContent] = useState(pickWelcomeContent);
    const [activeIdx, setActiveIdx] = useState(-1); // -1 = container focused, not entered
    const containerRef = useRef(null);

    const shuffle = useCallback(() => {
      setContent(pickWelcomeContent());
      setActiveIdx(-1);
    }, []);

    // All navigable items: prompt cards + shuffle button
    const totalItems = content.prompts.length + 1;

    const focusItem = useCallback((idx) => {
      const el = containerRef.current;
      if (!el) return;
      const items = el.querySelectorAll('[data-welcome-item]');
      if (items[idx]) items[idx].focus();
    }, []);

    const handleContainerKeyDown = useCallback((e) => {
      // Container level: Enter/Space to enter the group
      if (activeIdx === -1) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setActiveIdx(0);
          // Use rAF to let React re-render tabindex before focusing
          requestAnimationFrame(() => focusItem(0));
        }
        return;
      }

      // Inside the group: arrow key navigation
      let nextIdx = activeIdx;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        nextIdx = (activeIdx + 1) % totalItems;
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        nextIdx = (activeIdx - 1 + totalItems) % totalItems;
      } else if (e.key === 'Home') {
        e.preventDefault();
        nextIdx = 0;
      } else if (e.key === 'End') {
        e.preventDefault();
        nextIdx = totalItems - 1;
      } else if (e.key === 'Escape') {
        // Exit the group, return focus to the container
        e.preventDefault();
        e.stopPropagation(); // Don't trigger global Escape handler
        setActiveIdx(-1);
        if (containerRef.current) containerRef.current.focus();
        return;
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (activeIdx < content.prompts.length) {
          onSelectPrompt(content.prompts[activeIdx].text);
        } else {
          shuffle();
        }
        return;
      } else {
        return;
      }
      setActiveIdx(nextIdx);
      requestAnimationFrame(() => focusItem(nextIdx));
    }, [activeIdx, totalItems, content.prompts, onSelectPrompt, shuffle, focusItem]);

    // When a card is clicked directly (mouse), mark it active
    const handleCardClick = useCallback((text, idx) => {
      setActiveIdx(idx);
      onSelectPrompt(text);
    }, [onSelectPrompt]);

    // If focus leaves the container entirely, reset to unentered state
    const handleContainerBlur = useCallback((e) => {
      const container = containerRef.current;
      if (!container) return;
      // relatedTarget is where focus is going -- if it's outside our container, reset
      if (!container.contains(e.relatedTarget)) {
        setActiveIdx(-1);
      }
    }, []);

    return html`
      <div class="welcome-state">
        <div class="welcome-wordmark">amplifier</div>
        <div class="welcome-tagline">
          ${content.tagline[0]}<br/>${content.tagline[1]}
        </div>
        <div class="welcome-prompts-container"
          ref=${containerRef}
          tabindex="0"
          role="group"
          aria-label="Suggested prompts - press Enter to browse"
          onKeyDown=${handleContainerKeyDown}
          onBlur=${handleContainerBlur}>
          <div class="welcome-prompts" role="presentation">
            ${content.prompts.map((p, i) => html`
              <button
                class="welcome-prompt-card"
                data-welcome-item
                tabindex=${activeIdx === i ? '0' : '-1'}
                onClick=${() => handleCardClick(p.text, i)}
                aria-label=${'Prompt: ' + p.text}
              >
                <span class="welcome-prompt-cat">${p.cat}</span>
                <span class="welcome-prompt-text">${p.text}</span>
              </button>
            `)}
          </div>
          <button class="welcome-shuffle" data-welcome-item
            tabindex=${activeIdx === content.prompts.length ? '0' : '-1'}
            onClick=${shuffle}
            title="Show different suggestions" aria-label="Shuffle suggestions">\u21bb</button>
        </div>
      </div>
    `;
  }

  function SubSessionView({ parentToolCallId, subSessionsRef, revision, depth = 0, onNavigateSession }) {
    const MAX_NESTING = 4;
    const [collapsed, setCollapsed] = useState(false);
    const sub = subSessionsRef.current.get(parentToolCallId);
    if (!sub) return null;

    // Per-sub-session render gating: skip expensive DOM rebuild when a
    // foreign sub-session's event bumped the global revision but THIS
    // sub-session's data hasn't changed.  Without this, completing one
    // sub-session tears down and rebuilds dangerouslySetInnerHTML in
    // sibling sub-sessions, causing a visible blink.
    const lastRevRef = useRef(-1);
    const cachedVnodeRef = useRef(null);
    const subRev = sub._rev ?? 0;
    if (subRev === lastRevRef.current && cachedVnodeRef.current !== null && !collapsed) {
      return cachedVnodeRef.current;
    }
    lastRevRef.current = subRev;

    if (depth >= MAX_NESTING) {
      return html`<div class="sub-session-truncated">
        <span class="sub-session-agent">${sub.agent || 'sub-agent'}</span>
        <span style="color: var(--text-muted); font-size: 11px;"> (nested ${depth} levels deep)</span>
        ${onNavigateSession && sub.sessionId && html`
          <a class="sub-session-nav-link"
             onClick=${(e) => { e.stopPropagation(); onNavigateSession(sub.sessionId); }}>Open session</a>
        `}
      </div>`;
    }

    const statusIcon = getToolStatusIcon(sub.status);
    const statusClass = sub.status === 'running' ? ' status-running' : '';

    // Merge content and toolCalls, sort by .order
    const allItems = [...sub.content, ...sub.toolCalls]
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const isEmpty = allItems.length === 0 && sub.status === 'running';

    const vnode = html`
      <div class="sub-session" style=${'--nesting-depth: ' + depth}>
        <div class="sub-session-header" onClick=${() => setCollapsed(c => !c)}>
          <span class=${'sub-session-status' + statusClass}>${statusIcon}</span>
          <span class="sub-session-agent">${sub.agent || 'sub-agent'}</span>
          ${onNavigateSession && sub.sessionId && html`
            <a class="sub-session-nav-link"
               onClick=${(e) => { e.stopPropagation(); onNavigateSession(sub.sessionId); }}
               title="Open this agent session">Open session \u2192</a>
          `}
          <span class="sub-session-chevron">${collapsed ? '\u25B6' : '\u25BC'}</span>
        </div>
        ${!collapsed && html`
          <div class="sub-session-body">
            ${isEmpty && html`<span class="sub-session-waiting">Waiting for response...</span>`}
            ${allItems.map(item => {
              if (item.type === 'tool_call') {
                return html`<${NestedToolCallView}
                  item=${item}
                  subSessionsRef=${subSessionsRef}
                  revision=${revision}
                  depth=${depth + 1}
                  onNavigateSession=${onNavigateSession}
                />`;
              }
              return html`<${ChronoItem} item=${item} isActivity=${true} />`;
            })}
          </div>
        `}
      </div>
    `;
    cachedVnodeRef.current = vnode;
    return vnode;
  }

  function NestedToolCallView({ item, subSessionsRef, revision, depth, onNavigateSession }) {
