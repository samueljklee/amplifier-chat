  function TokenUsagePill({ tokens }) {
    if (!tokens) return null;
    const fmt = n => n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n || 0);
    const parts = [
      `↑ ${fmt(tokens.input_tokens)} in`,
      `↓ ${fmt(tokens.output_tokens)} out`,
    ];
    if (tokens.cache_read_tokens > 0) {
      parts.push(`${fmt(tokens.cache_read_tokens)} cached`);
    }
    return html`
      <div class="token-usage-pill">
        ${parts.map((p, i) => [
          html`<span>${p}</span>`,
          i < parts.length - 1 ? html`<span class="tok-sep">·</span>` : null,
        ])}
      </div>
    `;
  }

  // ── Voice: Message action buttons (Play TTS + Copy) ──
  // ── Message action buttons (Copy always, Play when voice labs on) ──
  function MessageActions({ text, showPlay }) {
    const [playState, setPlayState] = useState('idle'); // idle | loading | playing
    const [copied, setCopied] = useState(false);
    const audioRef = useRef(null);

    const handlePlay = useCallback(async (e) => {
      e.stopPropagation();
      if (playState === 'playing') {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
        setPlayState('idle');
        return;
      }
      setPlayState('loading');
      try {
        const resp = await fetch('/chat/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!resp.ok) throw new Error('TTS request failed');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audioRef.current = audio;
        audio._blobUrl = url;
        audio.onended = () => { setPlayState('idle'); audioRef.current = null; URL.revokeObjectURL(url); };
        audio.onerror = () => { setPlayState('idle'); audioRef.current = null; URL.revokeObjectURL(url); };
        await audio.play();
        setPlayState('playing');
        // Stop any active voice recording (mutual exclusion with mic input)
        window.dispatchEvent(new CustomEvent('amplifier-tts-playback-start'));
      } catch (err) {
        console.error('TTS error:', err);
        setPlayState('idle');
      }
    }, [text, playState]);

    const handleCopy = useCallback(async (e) => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      } catch {}
    }, [text]);

    // Cleanup audio on unmount
    useEffect(() => () => {
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    }, []);

    // Auto-pause TTS when voice recording starts (prevent audio bleed into mic)
    useEffect(() => {
      const pauseForRecording = () => {
        if (audioRef.current) {
          audioRef.current.pause();
          if (audioRef.current._blobUrl) URL.revokeObjectURL(audioRef.current._blobUrl);
          audioRef.current = null;
        }
        setPlayState('idle');
      };
      window.addEventListener('amplifier-voice-recording-start', pauseForRecording);
      return () => window.removeEventListener('amplifier-voice-recording-start', pauseForRecording);
    }, []);

    return html`
      <div class="msg-actions" onClick=${(e) => e.stopPropagation()}>
        <button onClick=${handleCopy} class=${copied ? 'copy-ok' : ''} title=${copied ? 'Copied!' : 'Copy message'} aria-label="Copy to clipboard">
          <${Icon} name=${copied ? 'check' : 'clipboard'} />
        </button>
        ${showPlay && html`
          <button onClick=${handlePlay} class=${playState === 'playing' ? 'playing' : ''} title=${playState === 'playing' ? 'Stop' : 'Play aloud'} aria-label=${playState === 'playing' ? 'Stop playback' : 'Play aloud'}>
            <${Icon} name=${playState === 'loading' ? 'loader' : playState === 'playing' ? 'square' : 'volume-2'} />
          </button>
        `}
      </div>
    `;
  }

  // Fork-from-message: inline SVG icon for the fork button
  const FORK_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"></path><path d="M12 12v3"></path></svg>';

  // Fork inline feedback — brief "Forking..." or error state
  function ForkFeedback({ forkState }) {
    if (!forkState) return null;

    if (forkState.step === 'forking') {
      return html`<div class="fork-preview-wrap">
        <div class="fork-preview-title">Forking from turn ${forkState.turnNumber}...</div>
      </div>`;
    }
    if (forkState.step === 'error') {
      return html`<div class="fork-preview-wrap">
        <div class="fork-preview-title">Fork failed</div>
        <div class="fork-preview-stats">${forkState.error}</div>
        <div class="fork-preview-actions">
          <button class="fork-cancel" onClick=${forkState.onCancel}>Dismiss</button>
        </div>
      </div>`;
    }
    return null;
  }

  function ChronoItem({ item, isActivity, isSegmentActive, onWaypointClick, subSessionsRef, subSessionRevision, onNavigateSession, labsVoice, turnNumber, onFork, forkState, forkIndicators, onNavigateToForkedSession }) {
    if (item.type === 'text') {
      // In activity panel, assistant text renders as a compact waypoint
      if (isActivity && item.role === 'assistant') {
        return html`<${ActivityWaypoint} item=${item}
          isSegmentActive=${isSegmentActive}
          onClick=${onWaypointClick} />`;
      }
      const cls = 'text-block'
        + (item.role === 'user' ? ' user-message' : '')
        + (item.role === 'system' ? ' system-message' : '')
        + (item.cssClass ? ' ' + item.cssClass : '');
      const isAssistant = item.role !== 'user' && item.role !== 'system';
      const isUser = item.role === 'user';
      const showForkBtn = isUser && !isActivity && turnNumber && onFork;
      const forkInfo = forkIndicators && forkIndicators.get(item.id);
      // Only show error feedback inline; "forking..." runs silently
      const showForkError = forkState && forkState.itemId === item.id && forkState.step === 'error';

      // Fork button rendered inside msg-actions bar (same pattern as assistant copy/TTS)
      const forkActions = showForkBtn && html`
        <div class="msg-actions" onClick=${(e) => e.stopPropagation()}>
          <button onClick=${(e) => { e.stopPropagation(); e.preventDefault(); onFork(turnNumber, item.id); }}
            title="Fork from here (turn ${turnNumber})" aria-label="Fork session from turn ${turnNumber}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"></path><path d="M12 12v3"></path></svg>
          </button>
        </div>`;

      const forkBadge = forkInfo && html`<div class="fork-indicator" onClick=${() => onNavigateToForkedSession && onNavigateToForkedSession(forkInfo.childSessionId)}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"></path><path d="M12 12v3"></path></svg>
        forked
      </div>`;

      const forkErrorPanel = showForkError && html`<${ForkFeedback} forkState=${forkState} />`;

      if (item.htmlContent) {
        return html`<div class=${cls} id=${item.id}>
          <div dangerouslySetInnerHTML=${{ __html: item.htmlContent }}></div>
          ${isAssistant && !item.streaming && html`<${MessageActions} text=${item.content || ''} showPlay=${!!labsVoice} />`}
          ${forkActions}
          ${forkBadge}
          ${forkErrorPanel}
        </div>`;
      }
      return html`<div class=${cls} id=${item.id}
        data-streaming=${item.streaming ? 'true' : 'false'}>
        ${item.content}
        ${isAssistant && !item.streaming && html`<${MessageActions} text=${item.content || ''} showPlay=${!!labsVoice} />`}
        ${forkActions}
        ${forkBadge}
        ${forkErrorPanel}
      </div>`;
    }
    if (item.type === 'thinking') {
      return html`<${ThinkingBlock} item=${item} />`;
    }
    if (item.type === 'tool_call') {
      return html`<${ToolCallCard} item=${item} isActivity=${isActivity}
        subSessionsRef=${subSessionsRef} subSessionRevision=${subSessionRevision}
        onNavigateSession=${onNavigateSession} />`;
    }
    if (item.type === 'token_usage') {
      return html`<${TokenUsagePill} tokens=${item.tokens} />`;
    }
    return null;
  }

  function MessageList({
    items,
    filterFn,
    sessionKey,
    showJumpControls = false,
    bottomNoticeSignal = 0,
    bottomNoticeLabel = 'New messages',
    subSessionsRef,
    subSessionRevision,
    onNavigateSession,
    // Welcome state
    onSelectPrompt,
    // Turn correlation props
    turnMap,
    itemTurnMap,
    hoveredTurnId,
    setHoveredTurnId,
    selectedTurnId,
    selectedSegmentId,
    segmentMap,
    onTurnSelect,
    isActivityPanel = false,
    onTurnSeparatorClick,
    onScrollTurnChange,
    // Activity indicator counts (main panel only)
    turnActivityCounts,
    segmentActivityCounts,
    labsVoice = false,
    // Fork-from-message props
    onFork,
    forkState,
    forkIndicators,
    onNavigateToForkedSession,
  }) {
    // Hover debounce: 50ms intent delay to prevent strobe during fast scanning
    const hoverTimerRef = useRef(null);
    const debouncedSetHoveredTurnId = useCallback((turnId) => {
      if (hoverTimerRef.current) clearTimeout(hoverTimerRef.current);
      if (turnId === null) {
        // Clear immediately on mouse leave
        setHoveredTurnId && setHoveredTurnId(null);
        return;
      }
      hoverTimerRef.current = setTimeout(() => {
        setHoveredTurnId && setHoveredTurnId(turnId);
      }, 50);
    }, [setHoveredTurnId]);

    const filtered = filterFn ? items.filter(filterFn) : items;
    const sorted = [...filtered].sort((a, b) => a.order - b.order);
    const listRef = useRef(null);
    const bottomRef = useRef(null);
    const [scrollState, setScrollState] = useState({
      canTop: false,
      canBottom: false,
      hasOverflow: false,
    });
    const nearBottomRef = useRef(true);
    const initialAnchorDoneRef = useRef(false);
    const [showBottomNotice, setShowBottomNotice] = useState(false);
    const lastNoticeSignalRef = useRef(bottomNoticeSignal);

    const updateScrollState = useCallback(() => {
      const el = listRef.current;
      if (!el) return;
      const maxTop = Math.max(0, el.scrollHeight - el.clientHeight);
      const canTop = el.scrollTop > 12;
      const canBottom = maxTop - el.scrollTop > 12;
      const hasOverflow = maxTop > 8;
      nearBottomRef.current = !canBottom;
      setScrollState(prev => (
        prev.canTop === canTop
        && prev.canBottom === canBottom
        && prev.hasOverflow === hasOverflow
      ) ? prev : { canTop, canBottom, hasOverflow });
    }, []);

    // Use useLayoutEffect so the scroll-to-bottom fires synchronously after
    // Preact commits the DOM but BEFORE the browser paints. Without this,
    // switching sessions briefly shows the top of the conversation (the first
    // long message) for ~32ms (two rAF frames) before the scroll anchor fires.
    useLayoutEffect(() => {
      const el = listRef.current;
      if (el) {
        // Scroll to bottom immediately — user never sees the top of the thread
        el.scrollTop = el.scrollHeight;
        // Mark anchor done so the [sorted.length] effect skips the double-rAF
        initialAnchorDoneRef.current = true;
      } else {
        // No DOM yet (initial mount) — let the [sorted.length] effect handle it
        initialAnchorDoneRef.current = false;
      }
      nearBottomRef.current = true;
      lastNoticeSignalRef.current = bottomNoticeSignal;
      setShowBottomNotice(false);
      setScrollState({ canTop: false, canBottom: false, hasOverflow: false });
    }, [sessionKey]);

    useEffect(() => {
      if (bottomNoticeSignal === lastNoticeSignalRef.current) return;
      lastNoticeSignalRef.current = bottomNoticeSignal;
      if (nearBottomRef.current) return;
      setShowBottomNotice(true);
      updateScrollState();
    }, [bottomNoticeSignal, updateScrollState]);

    // Anchor to newest on first load per session.
    useEffect(() => {
      if (!sorted.length) return;
      const el = listRef.current;
      if (!el) return;

      const anchor = () => {
        el.scrollTop = el.scrollHeight;
        updateScrollState();
      };

      if (!initialAnchorDoneRef.current) {
        requestAnimationFrame(() => requestAnimationFrame(anchor));
        initialAnchorDoneRef.current = true;
        return;
      }

      if (nearBottomRef.current) {
        requestAnimationFrame(anchor);
      } else {
        updateScrollState();
      }
    }, [sorted.length, updateScrollState]);

    const jumpTop = useCallback(() => {
      const el = listRef.current;
      if (!el) return;
      el.scrollTo({ top: 0, behavior: 'smooth' });
    }, []);

    const jumpBottom = useCallback(() => {
      setShowBottomNotice(false);
      bottomRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, []);

    useEffect(() => {
      if (!scrollState.canBottom) {
        setShowBottomNotice(false);
      }
    }, [scrollState.canBottom]);

    // Track which turn is currently at the top of the activity panel scroll
    const observerRef = useRef(null);
    useEffect(() => {
      if (!isActivityPanel || !onScrollTurnChange || !listRef.current) return;
      if (observerRef.current) observerRef.current.disconnect();

      const listEl = listRef.current;
      const updateCurrentTurn = () => {
        const separators = listEl.querySelectorAll('.turn-separator[data-turn-id]');
        let currentTurn = null;
        const listRect = listEl.getBoundingClientRect();
        for (const sep of separators) {
          const rect = sep.getBoundingClientRect();
          if (rect.top <= listRect.top + 40) {
            currentTurn = sep.getAttribute('data-turn-id');
          }
        }
        if (currentTurn) onScrollTurnChange(currentTurn);
      };

      const observer = new IntersectionObserver(() => {
        updateCurrentTurn();
      }, {
        root: listEl,
        rootMargin: '-40px 0px 0px 0px',
        threshold: 0,
      });

      // Observe turn separators after DOM settles
      const timer = setTimeout(() => {
        const seps = listEl.querySelectorAll('.turn-separator[data-turn-id]');
        seps.forEach(sep => observer.observe(sep));
        // Also set initial turn
        updateCurrentTurn();
      }, 100);

      observerRef.current = observer;
      return () => {
        clearTimeout(timer);
        observer.disconnect();
      };
    }, [isActivityPanel, onScrollTurnChange, sorted.length, sessionKey]);

    return html`
      <div class="message-list-wrap">
        <div id="message-list" ref=${listRef} onScroll=${updateScrollState}
          onClick=${(e) => {
            if (onTurnSelect && (selectedTurnId || selectedSegmentId)
                && !e.target.closest('[data-turn-id], .turn-separator')) {
              onTurnSelect(null);
            }
          }}>
          ${sorted.length === 0 && onSelectPrompt && html`
            <${WelcomeState} onSelectPrompt=${onSelectPrompt} />
          `}
          ${sorted.map((item, i) => {
            const turnId = itemTurnMap ? itemTurnMap.get(item.id) : null;
            const prevTurnId = i > 0 ? (itemTurnMap ? itemTurnMap.get(sorted[i - 1].id) : null) : null;
            const showSep = isActivityPanel && turnMap && turnId && turnId !== prevTurnId;
            const turn = showSep ? turnMap.get(turnId) : null;
            const itemSegId = segmentMap ? segmentMap.get(item.id) : null;

            // Determine highlight class with segment awareness
            let itemCls = '';
            const effectiveTurnId = selectedTurnId || hoveredTurnId;

            if (selectedSegmentId) {
              // Segment-level selection active
              if (itemSegId === selectedSegmentId) {
                itemCls = isActivityPanel ? 'turn-selected turn-selected-border' : 'turn-selected-message';
              } else if (turnId === selectedTurnId) {
                itemCls = 'segment-sibling'; // same turn, different segment
              } else if (turnId) {
                itemCls = 'turn-dimmed';
              }
            } else if (selectedTurnId) {
              // Turn-level selection
              if (turnId === selectedTurnId) {
                itemCls = isActivityPanel ? 'turn-selected turn-selected-border' : 'turn-selected-message';
              } else if (turnId) {
                itemCls = 'turn-dimmed';
              }
            } else if (hoveredTurnId) {
              // Hover preview — additive only, no dimming
              // Dimming on hover is too disruptive when casually scanning messages.
              // Only highlight the hovered turn; leave everything else at full opacity.
              if (turnId === hoveredTurnId) {
                itemCls = 'turn-highlighted';
              }
            }

            // Determine click behavior: user msg → turn-level, assistant msg → segment-level
            const isAssistantText = item.type === 'text' && item.role === 'assistant';
            const handleClick = () => {
              if (!onTurnSelect || !turnId) return;
              if (isAssistantText && itemSegId) {
                onTurnSelect(turnId, itemSegId); // segment-level
              } else {
                onTurnSelect(turnId); // turn-level
              }
            };

            return html`
              ${showSep && turn && html`<${TurnSeparator}
                key=${'sep-' + turnId}
                turn=${turn}
                isHighlighted=${!selectedTurnId && hoveredTurnId === turnId}
                isSelected=${selectedTurnId === turnId && !selectedSegmentId}
                onClick=${() => {
                  onTurnSelect && onTurnSelect(turnId);
                  onTurnSeparatorClick && onTurnSeparatorClick(turnId);
                }}
              />`}
              <div class=${itemCls || undefined}
                data-turn-id=${turnId || undefined}
                onMouseEnter=${() => turnId && debouncedSetHoveredTurnId(turnId)}
                onMouseLeave=${() => debouncedSetHoveredTurnId(null)}
                onClick=${handleClick}
                style=${(item.type === 'text' && item.role === 'user' && !isActivityPanel
                  ? 'cursor: pointer; align-self: flex-end; max-width: 75%; display: flex; flex-direction: column; align-items: flex-end;'
                  : turnId ? 'cursor: pointer;' : undefined)}>
                <${ChronoItem} key=${item.id} item=${item}
                  isActivity=${isActivityPanel}
                  isSegmentActive=${selectedSegmentId && itemSegId === selectedSegmentId}
                  onWaypointClick=${isActivityPanel && isAssistantText ? (e) => {
                    e && e.stopPropagation && e.stopPropagation();
                    // Scroll to the full message in main panel
                    const el = document.getElementById(item.id);
                    if (el) {
                      const prm = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                      el.scrollIntoView({ behavior: prm ? 'instant' : 'smooth', block: 'center' });
                    }
                    // Select the segment
                    onTurnSelect && onTurnSelect(turnId, itemSegId);
                  } : undefined}
                  subSessionsRef=${subSessionsRef} subSessionRevision=${subSessionRevision}
                  onNavigateSession=${onNavigateSession}
                  labsVoice=${labsVoice}
                  turnNumber=${turnId && turnMap ? (turnMap.get(turnId)?.turnNumber || null) : null}
                  onFork=${onFork}
                  forkState=${forkState}
                  forkIndicators=${forkIndicators}
                  onNavigateToForkedSession=${onNavigateToForkedSession} />
                ${!isActivityPanel && item.type === 'text' && (() => {
                  const isUser = item.role === 'user';
                  const counts = isUser
                    ? (turnActivityCounts && turnId ? turnActivityCounts.get(turnId) : null)
                    : (segmentActivityCounts && itemSegId ? segmentActivityCounts.get(itemSegId) : null);
                  return counts && html`<${ActivityIndicator} counts=${counts} alignRight=${isUser} />`;
                })()}
              </div>
            `;
          })}
          <div ref=${bottomRef}></div>
        </div>
        ${showJumpControls && scrollState.hasOverflow && html`
          <div class="jump-nav">
            <button class="jump-btn" title="Jump to top" onClick=${jumpTop} disabled=${!scrollState.canTop}>
              <${Icon} name="chevron-up" className="sm" />
            </button>
            <button class="jump-btn" title="Jump to bottom" onClick=${jumpBottom} disabled=${!scrollState.canBottom}>
              <${Icon} name="chevron-down" className="sm" />
            </button>
          </div>
        `}
        ${showBottomNotice && scrollState.canBottom && html`
          <div class="new-content-pill-wrap">
            <button class="new-content-pill" title="Jump to latest messages" onClick=${jumpBottom}>
              ${bottomNoticeLabel} ↓
            </button>
          </div>
        `}
      </div>
    `;
  }

  function ApprovalModal({ approval, onRespond }) {
    if (!approval) return null;
    // Validate: must be a number between 5 and 600 seconds
    const rawTimeout = Number(approval.timeout);
    const timeout = isFinite(rawTimeout) ? Math.max(5, Math.min(600, rawTimeout)) : 300;
    return html`
      <div class="modal-backdrop">

  function SessionOverflowMenu({ isPinned, canPin, onPin, canRename, onRename, onClose }) {
    const menuRef = useRef(null);
    useEffect(() => {
      function handleClickOutside(e) {
        if (menuRef.current && !menuRef.current.contains(e.target)) onClose();
      }
      document.addEventListener('mousedown', handleClickOutside);
      document.addEventListener('touchstart', handleClickOutside);
      return () => {
        document.removeEventListener('mousedown', handleClickOutside);
        document.removeEventListener('touchstart', handleClickOutside);
      };
    }, [onClose]);

    return html`
      <div class="session-overflow-menu" ref=${menuRef} role="menu" aria-label="Session actions">
        ${canPin && html`
          <button class="session-overflow-item" role="menuitem"
            onClick=${(e) => { e.stopPropagation(); onPin(); onClose(); }}>
            ${isPinned ? 'Unpin' : 'Pin to top'}
          </button>
        `}
        ${canRename && html`
          <button class="session-overflow-item" role="menuitem"
            onClick=${(e) => { e.stopPropagation(); onRename(); onClose(); }}>

        `}

  function SessionCard({ session, isActive, onClick, setSessions, onTogglePin, isPinned, queueCount }) {
    const [isEditing, setIsEditing] = useState(false);
    const [editValue, setEditValue] = useState('');
    const [shaking, setShaking] = useState(false);
    const [saved, setSaved] = useState(false);
    const [announcement, setAnnouncement] = useState('');
    const [menuOpen, setMenuOpen] = useState(false);
    const inputRef = useRef(null);
    const originalNameRef = useRef('');
    const statusDotClass =
      session.status === 'running' ? 'dot-running' :
      session.pendingApproval ? 'dot-approval' :
      session.status === 'error' ? 'dot-error' :
      (session.status === 'connecting' || session.status === 'loading_history') ? 'dot-connecting' :
      (session.status === 'idle' && session.source !== 'history' && (session.turnCount || 0) > 0) ? 'dot-idle' :
      null;
    const metaText = session.source === 'history'
      ? `${session.messageCount || session.turnCount || 0} msgs`
      : `turn ${session.turnCount || 0}`;
    const preview = session.lastUserMessage || null;
    const sessionName =
      session.name
      || session.bundle
      || (
        session.source !== 'history' && (session.turnCount || 0) === 0
          ? 'new session'
          : 'session'
      );

    const startEditing = useCallback((e) => {
      if (e) e.stopPropagation();
      originalNameRef.current = session.name || '';
      setEditValue(session.name || '');
      setIsEditing(true);
      setAnnouncement('Editing session name');
    }, [session.name]);

    const cancelEditing = useCallback(() => {
      setIsEditing(false);
      setEditValue('');
      setAnnouncement('Rename cancelled');
    }, []);

    const saveEdit = useCallback(async () => {
      const trimmed = editValue.trim();
      if (!trimmed) {
        setShaking(true);
        setTimeout(() => setShaking(false), 300);
        return;
      }
      if (trimmed === originalNameRef.current) {
        cancelEditing();
        return;
      }
      // Optimistic update
      setSessions(prev => {
        const next = new Map(prev);
        for (const [key, s] of next) {
          if (s.sessionId === session.sessionId) {
            next.set(key, { ...s, name: trimmed });
            break;
          }
        }
        return next;
      });
      setIsEditing(false);
      setSaved(true);
      setAnnouncement('Session renamed to ' + trimmed);
      setTimeout(() => setSaved(false), 300);
      try {
        const resp = await fetch(`${API_BASE}/sessions/${session.sessionId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: trimmed }),
        });
        if (!resp.ok) throw new Error('PATCH failed');
      } catch (err) {
        // Rollback on error
        setSessions(prev => {
          const next = new Map(prev);
          for (const [key, s] of next) {
            if (s.sessionId === session.sessionId) {
              next.set(key, { ...s, name: originalNameRef.current });
              break;
            }
          }
          return next;
        });
      }
    }, [editValue, session.sessionId, setSessions, cancelEditing]);

    const handleKeyDown = useCallback((e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        saveEdit();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        cancelEditing();
      } else if (e.key === 'Tab') {
        e.preventDefault();
        saveEdit();
      }
    }, [saveEdit, cancelEditing]);

    const handleCardKeyDown = useCallback((e) => {
      if (e.key === 'F2' && !isEditing) {
        e.preventDefault();
        startEditing(e);
      }
    }, [isEditing, startEditing]);



    useEffect(() => {
      if (isEditing && inputRef.current) {
        inputRef.current.focus();
        inputRef.current.select();
      }
    }, [isEditing]);

    return html`
      <div class=${'session-card' + (isActive ? ' active' : '') + (isEditing ? ' session-name-editing' : '') + (saved ? ' session-name-saved' : '')} data-session-id=${session.sessionId} onClick=${isEditing ? null : onClick} onKeyDown=${handleCardKeyDown} tabindex="0">
        <div class="session-card-name-row">
          <div class=${'session-card-name' + (!session.name ? ' auto-named' : '') + (shaking ? ' session-name-shake' : '')}>
            ${statusDotClass ? html`<span class=${'session-status-dot ' + statusDotClass} title=${
              statusDotClass === 'dot-running' ? 'Agent working' :
              statusDotClass === 'dot-approval' ? 'Needs your approval' :
              statusDotClass === 'dot-idle' ? 'Waiting for your input' :
              statusDotClass === 'dot-error' ? 'Error' :
              'Connecting'
            }></span>` : null}
            ${isEditing
              ? html`<input
                  ref=${inputRef}
                  class="session-name-input"
                  value=${editValue}
                  onInput=${(e) => setEditValue(e.target.value)}
                  onKeyDown=${handleKeyDown}
                  onClick=${(e) => e.stopPropagation()}
                  aria-describedby="session-rename-hint"
                />
                <span id="session-rename-hint" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Press Enter to save, Escape to cancel</span>`
              : html`${sessionName}${session.pendingApproval ? html`<${Icon} name="bell" className="sm" />` : ''}`
            }
          </div>
          ${isEditing && html`<span class="session-edit-actions">
                <button onClick=${(e) => { e.stopPropagation(); saveEdit(); }} title="Save">✓</button>
                <button onClick=${(e) => { e.stopPropagation(); cancelEditing(); }} title="Cancel">✕</button>
              </span>`
          }
        </div>
        ${(() => {
          const hasSession = !!session.sessionId;
          if (!hasSession) return null;
          return html`
            <div class=${'session-card-actions' + (menuOpen ? ' menu-open' : '')}>
              <button class="session-card-action-btn" title="More actions" aria-label="Session actions"
                aria-haspopup="menu"
                onClick=${(e) => { e.stopPropagation(); setMenuOpen(!menuOpen); }}
              ><${Icon} name="more-vertical" /></button>
              ${menuOpen && html`
                <${SessionOverflowMenu}
                  isPinned=${isPinned}
                  canPin=${hasSession && (!session.parentSessionId || session.forkedFromTurn || isPinned)}
                  onPin=${() => onTogglePin(session.sessionId, isPinned)}
                  canRename=${hasSession}
                  onRename=${(e) => startEditing(e)}
                  onClose=${() => setMenuOpen(false)}
                />
              `}
            </div>
          `;
        })()}
        <div class="session-card-cwd session-card-cwd-row" title=${session.cwd || '~'}>
          <${Icon} name="folder" className="sm" />
          <span class="session-card-line-text">${session.cwd || '~'}</span>
        </div>
        <div class="session-card-meta">
          <span>${metaText}</span>
          ${session.hasExternalUpdate
            ? html`<span class="session-stale-badge ${session.isNewSession ? 'new-session' : ''}">${session.isNewSession ? 'New' : 'Updated'}</span>`
            : null}
          ${queueCount > 0
            ? html`<span class="session-stale-badge queue-badge">${queueCount} queued</span>`
            : null}
        </div>
        ${preview ? html`<div class="session-card-cwd" title=${session.lastUserMessage || ''}>${preview}</div>` : null}
        <div aria-live="polite" class="sr-only">${announcement}</div>
      </div>
    `;
  }

  function QueuePanel({ queue, drainState, countdownSecs, onRemove, onResume }) {
    if (!queue || queue.length === 0) return null;
    const isPaused = drainState === 'paused';
    const isCountdown = drainState === 'countdown';

    return html`
      <div class="queue-panel" role="region" aria-label="Message queue">
        <div class="queue-panel-header">
          <span aria-live="polite" aria-atomic="true">Queued messages (${queue.length})</span>
        </div>
        <div role="list">
        ${queue.map((msg, idx) => {
          const isFirst = idx === 0;
          const showCountdown = isFirst && isCountdown && countdownSecs !== null;

            <div class=${cls} key=${msg.id} role="listitem">
              <span class="queue-item-text">

            </div>

        })}
        </div>
        ${isPaused && html`

  }

  // ── Audio Waveform Visualization ─────────────────────────────────
  function AudioWaveform({ analyserRef, barCount = 32 }) {
    const barsRef = useRef([]);
    const rafRef = useRef(null);
    const containerRef = useRef(null);
    const prevHeights = useRef(null);

    useEffect(() => {
      const draw = () => {
        const analyser = analyserRef.current;
        const bars = barsRef.current;
        if (!analyser || !bars.length) {
          rafRef.current = requestAnimationFrame(draw);
          return;
        }

        // Use frequency data for spectral visualization
        const bufLen = analyser.frequencyBinCount; // 128 with fftSize=256
        const freqData = new Uint8Array(bufLen);
        analyser.getByteFrequencyData(freqData);

        // Also sample time-domain for overall energy (drives a global boost)
        const timeData = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(timeData);
        let rms = 0;
        for (let j = 0; j < timeData.length; j++) {
          const s = (timeData[j] - 128) / 128;
          rms += s * s;
        }
        rms = Math.sqrt(rms / timeData.length);
        const boost = Math.min(rms * 12, 1); // 0..1 energy multiplier (high gain)

        const half = Math.ceil(bars.length / 2);
        // Map each half-bar to a frequency bin, skipping DC (bin 0)
        // Focus on speech range: bins 1..~40 (roughly 60Hz-3kHz at 44.1kHz)
        const usableBins = Math.min(bufLen, 48);
        const step = Math.max(1, usableBins / half);

        if (!prevHeights.current) prevHeights.current = new Float32Array(bars.length).fill(4);

        for (let i = 0; i < half; i++) {
          // Average a small band of frequency bins for this bar
          const binStart = Math.floor(1 + i * step);
          const binEnd = Math.min(Math.floor(1 + (i + 1) * step), bufLen);
          let sum = 0;
          let count = 0;
          for (let b = binStart; b < binEnd; b++) { sum += freqData[b]; count++; }
          const avg = count > 0 ? sum / count / 255 : 0;

          // Amplify: pow(x, 0.6) compresses range so quiet speech still shows
          const amplified = Math.pow(avg, 0.45);
          // Apply energy boost — even at rest the boost pushes bars up
          const scaled = amplified * (0.5 + boost * 0.5);
          const target = Math.max(4, scaled * 28);

          // Smooth descent (bars fall slowly, rise fast)
          const prev = prevHeights.current[i] || 3;
          const h = target > prev ? target : prev * 0.88 + target * 0.12;
          prevHeights.current[i] = h;

          // Opacity: taller bars glow brighter (0.35 base → 1.0 at full height)
          const opac = 0.35 + (h / 28) * 0.65;

          // Mirror: left half = reversed, right half = normal
          const leftIdx = half - 1 - i;
          const rightIdx = half + i;
          if (bars[leftIdx]) { bars[leftIdx].style.height = h + 'px'; bars[leftIdx].style.opacity = opac; }
          if (rightIdx < bars.length && bars[rightIdx]) { bars[rightIdx].style.height = h + 'px'; bars[rightIdx].style.opacity = opac; }
        }

        rafRef.current = requestAnimationFrame(draw);
      };

      rafRef.current = requestAnimationFrame(draw);
      return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
    }, [analyserRef]);

    return html`
      <div ref=${containerRef} class="audio-waveform">
        ${Array.from({ length: barCount }, (_, i) => html`
          <div
            key=${i}
            class="wave-bar"
            ref=${el => { if (el) barsRef.current[i] = el; }}
            style=${{ height: '3px' }}
          />
        `)}
      </div>
    `;
  }

  function InputArea({ onSend, onStop, onQueueMessage, onShellExecute, executing, shouldQueue, viewMode, setViewMode, activeKey, labsVoice, labsShell }) {
    const textareaRef = useRef(null);
    const fileInputRef = useRef(null);
    const [pendingImages, setPendingImages] = useState([]);
    const draftsRef = useRef(new Map());
    const prevKeyRef = useRef(activeKey);
    const pendingImagesRef = useRef(pendingImages);
    pendingImagesRef.current = pendingImages;
    const [slashOpen, setSlashOpen] = useState(false);
    const [slashFilter, setSlashFilter] = useState('');
    const [slashActiveIndex, setSlashActiveIndex] = useState(0);
    const [voiceState, setVoiceState] = useState('idle'); // idle | recording | transcribing
    const [voiceDuration, setVoiceDuration] = useState(0);
    const [sttReady, setSttReady] = useState(null); // null = unchecked, true = ready, false = needs download
    const [sttDownloading, setSttDownloading] = useState(false);
    const [showDownloadBanner, setShowDownloadBanner] = useState(false);
    const [shellMode, setShellMode] = useState(false);
    const mediaRecorderRef = useRef(null);
    const audioChunksRef = useRef([]);
    const voiceTimerRef = useRef(null);
    const analyserRef = useRef(null);
    const audioCtxRef = useRef(null);

    useEffect(() => {
      const ta = textareaRef.current;
      if (!ta) return;

      // Save outgoing session's draft
      const prevKey = prevKeyRef.current;
      if (prevKey && prevKey !== activeKey) {
        const text = ta.value;
        const images = pendingImagesRef.current;
        if (text || images.length > 0) {
          draftsRef.current.set(prevKey, {
            text,
            images: [...images],
            cursorPos: ta.selectionStart,
          });
        } else {
          draftsRef.current.delete(prevKey);
        }
      }

      // Restore incoming session's draft
      const draft = draftsRef.current.get(activeKey);
      if (draft) {
        ta.value = draft.text || '';
        setPendingImages(draft.images || []);
      } else {
        ta.value = '';
        setPendingImages([]);
      }

      prevKeyRef.current = activeKey;

      // Auto-resize textarea to fit restored content, then focus
      const rafId = window.requestAnimationFrame(() => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
        try { ta.focus(); } catch {}
        // Restore cursor position after focus
        if (draft && draft.cursorPos != null) {
          ta.selectionStart = ta.selectionEnd = Math.min(draft.cursorPos, ta.value.length);
        }
      });
      return () => window.cancelAnimationFrame(rafId);
    }, [activeKey]);

    const autoResize = useCallback(() => {
      const ta = textareaRef.current;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    }, []);

    const addImages = useCallback((files) => {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
          setPendingImages(prev => [...prev, e.target.result]);
        };
        reader.readAsDataURL(file);
      });
    }, []);

    const handlePaste = useCallback((e) => {
      const items = e.clipboardData?.items || [];
      const hasImage = Array.from(items).some(i => i.type.startsWith('image/'));
      if (!hasImage) return;
      e.preventDefault();
      const files = Array.from(items)
        .filter(i => i.type.startsWith('image/'))
        .map(i => i.getAsFile());
      addImages(files);
    }, [addImages]);

    const doSend = useCallback(() => {
      const ta = textareaRef.current;
      if (!ta) return;
      const content = ta.value.trim();
      if (!content && pendingImages.length === 0) return;

      // Slash commands always bypass the queue and send directly
      if (shouldQueue && !content.startsWith('/')) {
        if (content || pendingImages.length > 0) {
          onQueueMessage(content, pendingImages.map(d => d.split(',')[1]));
          ta.value = '';
          ta.style.height = 'auto';
          setPendingImages([]);
          draftsRef.current.delete(activeKey);
          setSlashOpen(false);
        }
        return;
      }

      // Shell mode: bypass AI, execute directly
      if (shellMode) {
        if (content && onShellExecute) {
          onShellExecute(content);
          ta.value = '';
          ta.style.height = 'auto';
          setShellMode(false);
          setPendingImages([]);
        }
        return;
      }

      // Normal send path
      const images = pendingImages.map(d => d.split(',')[1]);
      onSend(content, images);
      ta.value = '';
      ta.style.height = 'auto';
      setPendingImages([]);
      draftsRef.current.delete(activeKey);
      setSlashOpen(false);
    }, [onSend, onQueueMessage, onShellExecute, pendingImages, shouldQueue, shellMode, activeKey]);

    const applySlashCommand = useCallback((cmdName) => {
      const ta = textareaRef.current;
      if (!ta) return;
      ta.value = cmdName + ' ';
      ta.focus();
      autoResize();
      setSlashOpen(false);
      setSlashActiveIndex(0);
    }, [autoResize]);

    const filteredCmds = SLASH_COMMANDS.filter(c =>
      c.name.slice(1).startsWith(slashFilter)
    );
    const slashMenuOpen = slashOpen && filteredCmds.length > 0;
    const activeSlashIndex = Math.max(0, Math.min(slashActiveIndex, filteredCmds.length - 1));
    const slashPopupId = 'slash-command-popup';
    const activeSlashOptionId = slashMenuOpen
      ? ('slash-command-option-' + activeSlashIndex)
      : null;

    useEffect(() => {
      if (!slashMenuOpen) return;
      setSlashActiveIndex(i => Math.max(0, Math.min(i, filteredCmds.length - 1)));
    }, [slashMenuOpen, filteredCmds.length]);

    const handleKeyDown = useCallback((e) => {
      if (slashMenuOpen) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          setSlashActiveIndex(i => (i + 1) % filteredCmds.length);
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          setSlashActiveIndex(i => (i - 1 + filteredCmds.length) % filteredCmds.length);
          return;
        }
        if ((e.key === 'Enter' && !e.shiftKey) || e.key === 'Tab') {
          e.preventDefault();
          const cmd = filteredCmds[activeSlashIndex];
          if (cmd) applySlashCommand(cmd.name);
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          setSlashOpen(false);
          setSlashActiveIndex(0);
          return;
        }
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSend();
      }
      if (e.key === 'Escape') {
        setSlashOpen(false);
        setSlashActiveIndex(0);
        if (shellMode) {
          e.preventDefault();
          setShellMode(false);
          const ta = textareaRef.current;
          if (ta) { ta.value = ''; ta.style.height = 'auto'; }
        }
      }
    }, [doSend, slashMenuOpen, filteredCmds, activeSlashIndex, applySlashCommand]);

    const handleInput = useCallback((e) => {
      autoResize();
      const val = e.target.value;
      if (!shellMode && val.startsWith('/')) {
        setSlashOpen(true);
        setSlashFilter(val.slice(1).toLowerCase());
        setSlashActiveIndex(0);
      } else if (labsShell && !shellMode && val === '!') {
        // '!' is a trigger to enter shell mode — consume it and clear
        e.target.value = '';
        setShellMode(true);
        setSlashOpen(false);
        setSlashActiveIndex(0);
        // Re-focus after Preact swaps to the shell textarea
        requestAnimationFrame(() => {
          const ta = textareaRef.current;
          if (ta) ta.focus();
        });
      } else if (!shellMode) {
        setSlashOpen(false);
        setSlashActiveIndex(0);
      }
      // In shell mode, no slash detection — just let user type freely
    }, [autoResize, shellMode, labsShell]);

    const stopRecording = useCallback(() => {
      if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
        mediaRecorderRef.current.stop();
      }
      clearInterval(voiceTimerRef.current);
      // Clean up audio context
      if (audioCtxRef.current) {
        audioCtxRef.current.close().catch(() => {});
        audioCtxRef.current = null;
      }
      analyserRef.current = null;
    }, []);

    const startRecording = useCallback(async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : 'audio/webm';
        const mr = new MediaRecorder(stream, { mimeType });
        audioChunksRef.current = [];

        mr.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };

        mr.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          setVoiceState('transcribing');

          const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => {
            const b64 = reader.result.split(',')[1];
            try {
              const resp = await fetch('/chat/transcribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audio_data: b64, audio_format: 'webm' }),
              });
              if (resp.ok) {
                const data = await resp.json();
                if (data.text) {
                  const ta = textareaRef.current;
                  if (ta) {
                    const cur = ta.value;
                    ta.value = cur + (cur && !cur.endsWith(' ') ? ' ' : '') + data.text;
                    ta.focus();
                    ta.style.height = 'auto';
                    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
                  }
                }
              }
            } catch (err) {
              console.error('Transcription error:', err);
            }
            setVoiceState('idle');
            setVoiceDuration(0);
          };
          reader.readAsDataURL(blob);
        };

        // Set up Web Audio API analyser for waveform visualization
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          // AudioContext may be suspended after await — force resume
          if (audioCtx.state === 'suspended') await audioCtx.resume();

  const _isMac = typeof navigator !== 'undefined' && (/Mac|iPhone|iPad|iPod/.test(navigator.platform) || navigator.userAgentData?.platform === 'macOS');
  const MOD_KEY = _isMac ? 'metaKey' : 'ctrlKey';
  const MOD_LABEL = _isMac ? '\u2318' : 'Ctrl';
  const SHIFT_LABEL = _isMac ? '\u21E7' : 'Shift';
  const ALT_LABEL = _isMac ? '\u2325' : 'Alt';
  // "App" modifier: Ctrl on Mac (unused by browsers), Alt on Win/Linux (unused by browsers)

  function createActionRegistry() {
    const actions = new Map();
    const listeners = new Set();
    const usage = new Map();
    function register(id, def) { actions.set(id, { ...def, id }); }
    function registerAll(defs) { for (const [id, def] of Object.entries(defs)) register(id, def); }
    function get(id) { return actions.get(id); }
    function getAll() { return Array.from(actions.values()); }
    function getVisible(ctx) {
      return getAll()
        .filter(a => !a.hidden && (!a.when || a.when(ctx)))
        .sort((a, b) => {
          const ua = usage.get(a.id) || 0, ub = usage.get(b.id) || 0;
          if (ub !== ua) return ub - ua;
          return (a.order || 99) - (b.order || 99);
        });
    }
    function execute(id, ctx) {
      const action = actions.get(id);
      if (action && action.handler) {
        usage.set(id, (usage.get(id) || 0) + 1);
        action.handler(ctx);
        listeners.forEach(fn => fn({ type: 'execute', id, label: action.label }));
      }
    }
    function onEvent(fn) { listeners.add(fn); return () => listeners.delete(fn); }
    function matchShortcut(e) {
      for (const action of actions.values()) {
        if (!action.shortcut) continue;
        const parts = action.shortcut.split('+');
        const needsMod = parts.includes('Mod');
        const needsShift = parts.includes('Shift');
        const needsAlt = parts.includes('Alt');
        const needsApp = parts.includes('App');
        const key = parts[parts.length - 1];
        if (needsMod && !e[MOD_KEY]) continue;
        if (!needsMod && !needsApp && e[MOD_KEY]) continue;
        if (needsApp && !e[APP_KEY]) continue;
        if (!needsApp && !needsMod && e[APP_KEY]) continue;
        if (needsShift && !e.shiftKey) continue;
        if (!needsShift && e.shiftKey) continue;
        if (needsAlt && !e.altKey) continue;
        if (!needsAlt && !needsApp && e.altKey) continue;
        // Match by e.code first (physical key, unaffected by modifiers), then e.key
        const code = e.code;
        const eKey = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        const target = key.toLowerCase();
        const matched = eKey === target
          || code === 'Key' + key.toUpperCase()
          || code === 'Digit' + key
          || (key === '[' && code === 'BracketLeft')
          || (key === ']' && code === 'BracketRight')
          || (key === '.' && (code === 'Period' || e.key === '.'))
          || (key === '/' && (code === 'Slash' || e.key === '/'));
        if (matched) return action;
      }
      return null;
    }
    return { register, registerAll, get, getAll, getVisible, execute, onEvent, matchShortcut };
  }

  function useShortcutListener(registry, ctxRef, isOpen) {
    useEffect(() => {
      function handler(e) {
        const tag = e.target?.tagName;
        const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || e.target?.isContentEditable;
        // Always let Mod+K and Escape through; also let App-modified keys through
        // (Ctrl on Mac / Alt on Win are never used for typing in inputs)
        const hasAppMod = e[APP_KEY];
        const isModK = e[MOD_KEY] && e.key.toLowerCase() === 'k';
        if (isInput && !isModK && !hasAppMod && e.key !== 'Escape') return;
        if (isOpen) return;
        const action = registry.matchShortcut(e);
        if (action && (!action.when || action.when(ctxRef.current))) {
          e.preventDefault();
          e.stopPropagation();
          registry.execute(action.id, ctxRef.current);
        }
      }
      window.addEventListener('keydown', handler, true);
      return () => window.removeEventListener('keydown', handler, true);
    }, [registry, isOpen]);
  }

  function ToastContainer() {

          setToasts(prev => prev.map(t => t.id === toast.id ? { ...t, exiting: true } : t));
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== toast.id)), 160);
        }, toast.duration);

      _toastListeners.add(handler);
      return () => _toastListeners.delete(handler);

  // Command Palette Component
  function CommandPalette({ open, onClose, registry, appCtx }) {
    const [query, setQuery] = useState('');

    useEffect(() => { if (open && inputRef.current) requestAnimationFrame(() => inputRef.current?.focus()); }, [open]);

    const close = useCallback(() => { setClosing(true); setTimeout(onClose, 100); }, [onClose]);

    const items = useMemo(() => {
      const all = registry.getVisible(appCtx);
      if (!query) return all;
      const q = query.toLowerCase();
      return all.filter(a =>
        a.label.toLowerCase().includes(q)
        || (a.keywords && a.keywords.some(k => k.includes(q)))
        || (a.category && a.category.toLowerCase().includes(q))
      );
    }, [query, registry, appCtx]);

    const grouped = useMemo(() => {
      const groups = new Map();
      for (const item of items) {
        const cat = item.category || 'Actions';
        if (!groups.has(cat)) groups.set(cat, []);
        groups.get(cat).push(item);
      }
      return groups;
    }, [items]);

    useEffect(() => { if (selectedIndex >= items.length) setSelectedIndex(Math.max(0, items.length - 1)); }, [items.length, selectedIndex]);
    useEffect(() => {
      if (!listRef.current) return;
      const el = listRef.current.querySelector('.cmd-palette-item.selected');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }, [selectedIndex]);

    const handleKeyDown = useCallback((e) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIndex(i => (i + 1) % Math.max(1, items.length)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedIndex(i => (i - 1 + items.length) % Math.max(1, items.length)); }
      else if (e.key === 'Enter') { e.preventDefault(); if (items[selectedIndex]) { registry.execute(items[selectedIndex].id, appCtx); close(); } }
      else if (e.key === 'Escape') { e.preventDefault(); close(); }

    }, [open, onClose]);
    if (!open) return null;

    const items = registry.getAll().filter(a => a.shortcut && !a.hidden);
    const groups = new Map();
    for (const item of items) {
      const cat = item.category || 'Actions';
      if (!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(item);
    }

    return html`
      <div class="cheatsheet-backdrop" onClick=${(e) => { if (e.target === e.currentTarget) onClose(); }}>
        <div class="cheatsheet" role="dialog" aria-label="Keyboard shortcuts">
          <div class="cheatsheet-header">

            </button>
          </div>
          <div class="cheatsheet-body">
            ${Array.from(groups.entries()).map(([cat, groupItems]) => html`
              <div class="cheatsheet-group">
                <h3>${cat}</h3>
                ${groupItems.map(item => html`
                  <div class="cheatsheet-row">
                    <span>${item.label}</span>
                    <kbd>${fmtShortcut(item.shortcut)}</kbd>
                  </div>`)}
              </div>`)}
          </div>
        </div>
      </div>`;
  }

    const childToToolRef = useRef({});
    const pendingChildEventsRef = useRef(new Map()); // childSessionId -> buffered msgs before session_fork
    const childAgentRef = useRef({});
    const sessionParentByIdRef = useRef({});
    const activeKeyRef = useRef(null);
    const sessionsRef = useRef(new Map());
    const visibleSessionKeysRef = useRef([]);
    const chronoItemsRef = useRef([]);
    const activityScrollRef = useRef(null);
    const turnCountRef = useRef(0);

    const defaultCwdRef = useRef('~');

    const dragStateRef = useRef(null);

    const watchdogTimerRef = useRef(null);
    const seenDeltasRef = useRef(new Set());
    const syntheticAnimRef = useRef(new Map());
